<body>
<div id="wrap"><canvas id="cv"></canvas></div>
<div id="nameOv">
  <h1>DEEP GARDEN<br>WHO TENDS THIS TANK?</h1>
  <input id="nameIn" maxlength="14" placeholder="YOUR NAME">
  <button id="nameOk">START</button>
</div>
<script>
(function(){
'use strict';

/* ============================================================
   DEEP GARDEN — evolution aquarium
   Phase 1: core loop (swim / feed / grow / breed / merge / evolve)
   ============================================================ */

var VERSION = 'v3.3';
var W = 960, H = 540;
var SAVE_KEY = 'deepgarden_save_v1';
var FLOOR = 476;          // substrate top
var SURFACE = 34;         // water surface
var PEARL_CAP = 99999;
var SPAWN_COOLDOWN = 30;  // seconds, NEW LIFE button
var FRAMES = 6;           // swim animation frames
var EVENT_T = 1.5;        // how long a discovery card holds the screen, seconds
var RIPEN = 60;           // seconds an adult needs before it will pair up on its own

/* ---------- 1. PIXEL PRIMITIVES (PIXEL_ART_SPEC §1) ---------- */
function rp(c,x,y,w,h,col){ c.fillStyle=col; c.fillRect(x|0,y|0,Math.max(1,w|0),Math.max(1,h|0)); }
function px(c,x,y,col){ rp(c,x,y,1,1,col); }
function circ(c,cx,cy,r,col){
  cx|=0; cy|=0; r=Math.round(r); if(r<1) return;
  c.fillStyle=col;
  for(var y=-r;y<=r;y++){ var w=Math.floor(Math.sqrt(Math.max(0,r*r-y*y))); c.fillRect(cx-w,cy+y,2*w+1,1); }
}
function ell(c,cx,cy,rx,ry,col){
  cx|=0; cy|=0; rx=Math.round(rx); ry=Math.round(ry); if(rx<1||ry<1) return;
  c.fillStyle=col;
  for(var y=-ry;y<=ry;y++){ var w=Math.floor(rx*Math.sqrt(Math.max(0,1-(y*y)/(ry*ry)))); c.fillRect(cx-w,cy+y,2*w+1,1); }
}
/* wedge: base at (x0,cy) tapering to (x0-len, cy+off) */
function wedge(c,x0,cy,len,off,th0,th1,col){
  len=Math.max(1,Math.round(len));
  for(var i=0;i<=len;i++){
    var t=i/len, y=Math.round(cy+off*t), h=Math.max(1,Math.round(th0+(th1-th0)*t));
    rp(c,x0-i,y-h,1,2*h,col);
  }
}
/* tri: triangular fin/tail */
function tri(c,x0,cy,len,halfEnd,off,col,inflate){
  inflate=inflate||0; len=Math.max(1,Math.round(len));
  for(var i=0;i<=len+inflate;i++){
    var t=Math.min(1,i/len), h=Math.max(1,Math.round(2+halfEnd*t)+inflate), y=Math.round(cy+off*t);
    rp(c,x0-i,y-h,1,2*h,col);
  }
}

/* dome: only the half above the base line - decor is rooted on the floor */
function dome(c,cx,baseY,rx,ry,col){
  cx|=0; baseY|=0; rx=Math.round(rx); ry=Math.round(ry);
  if(rx<1||ry<1) return;
  c.fillStyle=col;
  for(var y=0;y<=ry;y++){
    var w=Math.floor(rx*Math.sqrt(Math.max(0,1-(y*y)/(ry*ry))));
    c.fillRect(cx-w, baseY-y, 2*w+1, 1);
  }
}
/* flatEll: an ellipse whose bottom is cut off at an absolute y.
   A bottom-dweller needs a flat belly - but the belly must be exactly as wide as
   the body is at that height, or it sticks out past the silhouette like a plank. */
function flatEll(c,cx,cy,rx,ry,cutY,col){
  cx|=0; cy|=0; rx=Math.round(rx); ry=Math.round(ry); cutY=Math.round(cutY);
  if(rx<1||ry<1) return;
  c.fillStyle=col;
  for(var y=-ry;y<=ry;y++){
    if(cy+y>cutY) break;
    var w=Math.floor(rx*Math.sqrt(Math.max(0,1-(y*y)/(ry*ry))));
    c.fillRect(cx-w,cy+y,2*w+1,1);
  }
}

/* spike: a triangle growing UP from a base (tri() points sideways) */
function spike(c,cx,baseY,halfW,height,tipDx,col){
  cx|=0; baseY|=0; height=Math.max(1,Math.round(height));
  c.fillStyle=col;
  for(var i=0;i<=height;i++){
    var t=i/height, hw=Math.max(1,Math.round(halfW*(1-t*0.92)));
    c.fillRect(Math.round(cx+tipDx*t)-hw, baseY-i, hw*2+1, 1);
  }
}

/* ---------- 2. SEEDED PRNG (PIXEL_ART_SPEC §2) ---------- */
function mulberry32(a){ return function(){
  a|=0; a=a+0x6D2B79F5|0;
  var t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t;
  return ((t^t>>>14)>>>0)/4294967296;
};}
var gameRnd = mulberry32(0xBEEF01); // gameplay randomness (not graphics)

/* ---------- 3. NOISE (PIXEL_ART_SPEC §5) ---------- */
function makeWaves(rnd,n){
  var w=[];
  for(var i=0;i<n;i++) w.push({amp:1/(i+1),a:0.006+rnd()*0.05,b:0.006+rnd()*0.05,p:rnd()*6.283,q:rnd()*6.283});
  return w;
}
function noise(waves,x,y){
  var s=0,t=0;
  for(var i=0;i<waves.length;i++){ var w=waves[i]; s+=w.amp*Math.sin(x*w.a+w.p)*Math.cos(y*w.b+w.q); t+=w.amp; }
  return s/t; // -1..1
}
function step(v,n){ var i=Math.floor((v*0.5+0.5)*n); return i<0?0:(i>n-1?n-1:i); }

/* ---------- 4. SPRITE BAKERY ---------- */
function makeSprite(w,h,draw){
  var c=document.createElement('canvas');
  c.width=Math.max(1,w|0); c.height=Math.max(1,h|0);
  var x=c.getContext('2d');
  draw(x,c.width,c.height);
  return c;
}

/* ============================================================
   SOUND - WebAudio synthesis, no files (template §5)
   Rules that are not negotiable:
   - AudioContext is created ONLY after the first touch (iOS)
   - start() ALWAYS before stop(), or sound dies on a real device
   - no audio available -> silent fallback, the game never crashes
   ============================================================ */
var AU = { ctx:null, master:null, delay:null, wet:null, muted:false,
           nextStep:0, step:0, bpm:58, breathe:0, dead:false };

/* iOS mutes WebAudio when the physical Ring/Silent switch is on - the volume buttons
   do nothing about it. Playing an HTMLAudioElement moves the session to the
   'playback' category, and then WebAudio is heard regardless of the switch.
   The silent wav is built in code: no external asset. */
function unlockSession(){
  try{
    if(AU.el || typeof Blob==='undefined') return;
    var sr=8000, n=Math.round(sr*0.2), buf=new ArrayBuffer(44+n*2), v=new DataView(buf);
    function w(o,str){ for(var i=0;i<str.length;i++) v.setUint8(o+i,str.charCodeAt(i)); }
    w(0,'RIFF'); v.setUint32(4,36+n*2,true); w(8,'WAVE'); w(12,'fmt ');
    v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
    v.setUint32(24,sr,true); v.setUint32(28,sr*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true);
    w(36,'data'); v.setUint32(40,n*2,true);
    var el=document.createElement('audio');
    el.src=URL.createObjectURL(new Blob([buf],{type:'audio/wav'}));
    el.loop=true; el.volume=0.001;
    el.setAttribute('playsinline','');
    el.setAttribute('webkit-playsinline','');
    var pr=el.play();
    if(pr && pr.catch) pr.catch(function(){});
    AU.el=el;
  }catch(e){}
}
function audioReady(){ return !!(AU.ctx && AU.ctx.state==='running'); }
function audioInit(){
  if(AU.ctx || AU.dead) return;
  try{
    unlockSession();
    var C = window.AudioContext || window.webkitAudioContext;
    if(!C){ AU.dead=true; return; }
    AU.ctx = new C();
    AU.master = AU.ctx.createGain();
    AU.master.gain.value = AU.muted ? 0 : 0.5;
    AU.master.connect(AU.ctx.destination);
    /* a little space, so the tank does not sound like a phone speaker */
    AU.delay = AU.ctx.createDelay(1.0);
    AU.delay.delayTime.value = 0.42;
    var fb = AU.ctx.createGain(); fb.gain.value = 0.30;
    AU.wet = AU.ctx.createGain(); AU.wet.gain.value = 0.30;
    AU.delay.connect(fb); fb.connect(AU.delay);
    AU.delay.connect(AU.wet); AU.wet.connect(AU.master);
    AU.nextStep = AU.ctx.currentTime + 0.1;
    if(AU.ctx.state==='suspended' && AU.ctx.resume) AU.ctx.resume();
  }catch(e){ AU.ctx=null; AU.dead=true; }
}
/* Any first gesture counts, not just one on the canvas: the name overlay is a DOM
   button, and some browsers do not deliver pointerdown at all. */
function armAudio(){
  audioInit();
  if(AU.ctx && AU.ctx.state==='suspended'){ try{ AU.ctx.resume(); }catch(e){} }
  if(AU.el && AU.el.paused){ try{ var p=AU.el.play(); if(p&&p.catch) p.catch(function(){}); }catch(e){} }
}
function audioMute(m){
  AU.muted=m;
  if(AU.master && AU.ctx){
    try{ AU.master.gain.setTargetAtTime(m?0:0.5, AU.ctx.currentTime, 0.05); }catch(e){}
  }
  save();
}
/* one note = two slightly detuned oscillators through a shared filter (template §5) */
function voice(freq,t,dur,o){
  if(!AU.ctx || AU.muted) return;
  o=o||{};
  try{
    var g=AU.ctx.createGain(), f=AU.ctx.createBiquadFilter();
    f.type='lowpass'; f.frequency.value=o.cut||1400; f.Q.value=o.q||0.6;
    var a=AU.ctx.createOscillator(), b=AU.ctx.createOscillator();
    a.type=o.type||'sine'; b.type=o.type||'sine';
    a.frequency.value=freq; b.frequency.value=freq;
    a.detune.value=-(o.detune===undefined?7:o.detune);
    b.detune.value= (o.detune===undefined?7:o.detune);
    a.connect(f); b.connect(f); f.connect(g);
    g.connect(AU.master);
    if(AU.delay && o.wet!==false) g.connect(AU.delay);
    var att=o.att||0.03, rel=o.rel||0.5, pk=o.gain||0.12;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(pk,t+att);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur+rel);
    a.start(t); b.start(t);                       // start BEFORE stop, always
    a.stop(t+dur+rel+0.05); b.stop(t+dur+rel+0.05);
  }catch(e){}
}
/* percussion out of filtered noise */
var NOISEBUF=null;
function noiseBuf(){
  if(NOISEBUF || !AU.ctx) return NOISEBUF;
  try{
    var n=AU.ctx.sampleRate*1.0, b=AU.ctx.createBuffer(1,n,AU.ctx.sampleRate), d=b.getChannelData(0);
    var r=mulberry32(0x5011);
    for(var i=0;i<n;i++) d[i]=r()*2-1;
    NOISEBUF=b;
  }catch(e){}
  return NOISEBUF;
}
function hit(t,dur,cut,gain,type){
  if(!AU.ctx || AU.muted) return;
  var buf=noiseBuf(); if(!buf) return;
  try{
    var src=AU.ctx.createBufferSource(); src.buffer=buf; src.loop=true;
    var f=AU.ctx.createBiquadFilter(); f.type=type||'bandpass'; f.frequency.value=cut; f.Q.value=1.2;
    var g=AU.ctx.createGain();
    src.connect(f); f.connect(g); g.connect(AU.master);
    g.gain.setValueAtTime(gain||0.10,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    src.start(t); src.stop(t+dur+0.02);           // start BEFORE stop
  }catch(e){}
}

/* ---- the tank theme: lydian, slow, layered ---- */
var SC = [0,2,4,6,7,9,11];                        // set from the biome: each place has its own mode AND tempo
function hz(deg,oct){
  var n=SC[((deg%7)+7)%7] + 12*(oct + Math.floor(deg/7) + (G.biome?biomeDef(G.biome).oct:0));
  return 55*Math.pow(2,(n+3)/12);
}
var MEL = [0,2,4,2, 6,4,2,0, 3,5,4,2, 1,0,-2,0];
function musicStep(st,t){
  var bar = Math.floor(st/8) % 8;
  var live = G.fish.length;
  var busy = Math.min(1, live/18);
  var known = speciesCount();

  /* bass: always there */
  if(st%8===0) voice(hz(bar%3===2?3:0,1), t, 1.6, {type:'triangle',gain:0.10,cut:420,rel:0.9});
  /* pad: a held chord every two bars */
  if(st%16===0){
    var root=(bar%4===3)?3:(bar%4===2?4:0);
    voice(hz(root,2), t, 3.2, {type:'sine',gain:0.045,cut:900,att:0.6,rel:1.6});
    voice(hz(root+2,2), t, 3.2, {type:'sine',gain:0.035,cut:900,att:0.8,rel:1.6});
    voice(hz(root+4,2), t, 3.2, {type:'sine',gain:0.03,cut:900,att:1.0,rel:1.6});
  }
  /* melody */
  if(st%2===0){
    var d=MEL[(st/2)%MEL.length];
    voice(hz(d,3), t, 0.5, {type:'sine',gain:0.075,cut:1800,rel:0.7});
    /* a harmony voice a third above once the tank is alive */
    if(busy>0.35) voice(hz(d+2,3), t+0.02, 0.5, {type:'sine',gain:0.032,cut:1500,rel:0.7});
  }
  /* arpeggio when the tank is crowded */
  if(busy>0.55 && st%1===0 && st%8!==0)
    voice(hz((st*3)%7,3), t, 0.14, {type:'triangle',gain:0.028,cut:2400,rel:0.25});
  /* airy shimmer as the codex fills - the reward for progress */
  if(known>8 && st%32===0)
    voice(hz(6,4), t, 2.0, {type:'sine',gain:0.03,cut:4000,att:0.9,rel:1.8});
  /* soft pulse instead of drums: this is a place to relax, not to march */
  if(st%8===0) hit(t,0.25,180,0.05*busy,'lowpass');
  if(busy>0.5 && st%8===4) hit(t,0.10,1800,0.018,'bandpass');
}
function musicTick(){
  if(!AU.ctx || AU.muted) return;
  try{
    var now=AU.ctx.currentTime, spb=60/AU.bpm/2;
    if(AU.nextStep < now) AU.nextStep = now + 0.05;
    while(AU.nextStep < now + 0.3){
      musicStep(AU.step, AU.nextStep);
      AU.step++; AU.nextStep += spb;
    }
    /* dynamics: the mix breathes over 8 bars, or the loop goes flat */
    AU.breathe += 0.016;
    AU.master.gain.setTargetAtTime((AU.muted?0:0.5)*(0.85+Math.sin(AU.breathe*0.06)*0.15), now, 0.4);
  }catch(e){}
}

/* ---- stingers ---- */
function sfx(kind){
  if(!AU.ctx || AU.muted) return;
  var t=AU.ctx.currentTime, i;
  if(kind==='feed')        voice(hz(4,4),t,0.05,{type:'sine',gain:0.05,cut:3000,rel:0.10,wet:false});
  else if(kind==='merge'){ voice(hz(0,3),t,0.10,{type:'triangle',gain:0.09,cut:2200,rel:0.2});
                           voice(hz(4,3),t+0.09,0.14,{type:'triangle',gain:0.09,cut:2600,rel:0.3}); }
  else if(kind==='rank'){  for(i=0;i<3;i++) voice(hz(i*2,3),t+i*0.07,0.12,{type:'sine',gain:0.08,cut:2600,rel:0.3}); }
  else if(kind==='evolve'){for(i=0;i<5;i++) voice(hz(i*2,3),t+i*0.09,0.22,{type:'sine',gain:0.09,cut:3200,rel:0.6}); }
  else if(kind==='discover'){                        // triumphant passage
    var d=[0,2,4,6,7];
    for(i=0;i<d.length;i++) voice(hz(d[i],3),t+i*0.10,0.30,{type:'triangle',gain:0.10,cut:3400,rel:0.8});
    voice(hz(7,4),t+0.5,0.9,{type:'sine',gain:0.06,cut:4000,att:0.1,rel:1.2});
    hit(t,0.4,120,0.10,'lowpass');
  }
  else if(kind==='mutant'){                          // uneasy: a tritone, then a low thud
    voice(hz(0,2),t,0.7,{type:'sawtooth',gain:0.05,cut:600,rel:0.8});
    voice(hz(3,2),t,0.7,{type:'sawtooth',gain:0.05,cut:600,rel:0.8});
    voice(hz(3,4),t+0.15,0.3,{type:'triangle',gain:0.05,cut:3000,rel:0.6});
    hit(t,0.5,90,0.14,'lowpass');
  }
  else if(kind==='chimera'){                         // the big one
    for(i=0;i<7;i++) voice(hz(i,3),t+i*0.07,0.5,{type:'triangle',gain:0.09,cut:4000,rel:1.2});
    voice(hz(0,4),t+0.6,1.6,{type:'sine',gain:0.08,cut:5000,att:0.1,rel:2.0});
    hit(t,0.7,110,0.16,'lowpass'); hit(t+0.6,0.5,2600,0.05,'bandpass');
  }
  else if(kind==='fail'){                            // tense descending chord + a roll
    for(i=0;i<4;i++) voice(hz(6-i*2,2),t+i*0.11,0.4,{type:'sawtooth',gain:0.05,cut:700,rel:0.7});
    for(i=0;i<6;i++) hit(t+i*0.05,0.06,320,0.05,'lowpass');
  }
  else if(kind==='quest')  { for(i=0;i<3;i++) voice(hz(4+i*2,3),t+i*0.08,0.2,{type:'sine',gain:0.07,cut:3000,rel:0.5}); }
  else if(kind==='ach'){                             // a milestone deserves a fanfare
    var a=[0,4,7,11];
    for(i=0;i<a.length;i++) voice(hz(a[i],3),t+i*0.11,0.5,{type:'triangle',gain:0.10,cut:3600,rel:1.0});
    hit(t,0.5,140,0.12,'lowpass');
  }
  else if(kind==='release'){ voice(hz(4,3),t,0.4,{type:'sine',gain:0.05,cut:2200,att:0.05,rel:0.9});
                             voice(hz(6,4),t+0.1,0.5,{type:'sine',gain:0.03,cut:3600,rel:1.0}); }
  else if(kind==='decor')  { voice(hz(0,2),t,0.2,{type:'triangle',gain:0.07,cut:800,rel:0.4}); hit(t,0.15,240,0.06,'lowpass'); }
  else if(kind==='nope')   { voice(hz(0,2),t,0.12,{type:'square',gain:0.04,cut:500,rel:0.2}); }
}

/* ---------- CLOUD LEADERBOARD (Firebase REST) ----------
   Paste your database URL below. Use a NEW node for this game so it never mixes
   with an older one. Leave it empty and the game simply runs offline. */
var LB_URL = '';   // e.g. 'https://YOUR-DB.firebaseio.com/scores_aqua1.json'
var LB = { status:'Offline', rows:[], tab:'all', t:0, sending:false };
function lbSubmit(){
  if(!LB_URL || !G.name) return;
  LB.status='Syncing...';
  var body = JSON.stringify({
    name:String(G.name).slice(0,24),
    species:speciesCount(),
    merges:G.stats.merges|0,
    ts:Date.now()
  });
  try{
    fetch(LB_URL,{method:'POST',cache:'no-store',headers:{'Content-Type':'application/json'},body:body})
      .then(function(){ LB.status='Synced'; lbFetch(); })
      .catch(function(){ LB.status='Offline'; });
  }catch(e){ LB.status='Offline'; }
}
function lbFetch(){
  if(!LB_URL){ LB.status='Not set up'; return; }
  LB.status='Syncing...';
  try{
    fetch(LB_URL,{cache:'no-store'})
      .then(function(r){ return r.json(); })
      .then(function(j){
        var rows=[], k;
        for(k in j){
          var r=j[k];
          if(!r || typeof r!=='object') continue;
          rows.push({ name:String(r.name||'?').slice(0,24), species:num(r.species,0,0,999),
                      merges:num(r.merges,0,0,999999), ts:num(r.ts,0,0,1e15) });
        }
        LB.rows=rows;
        LB.status='Synced';
      })
      .catch(function(){ LB.status='Offline'; });
  }catch(e){ LB.status='Offline'; }
}
function lbVisible(){
  var wk=Date.now()-7*24*3600*1000;
  var rows=LB.rows.filter(function(x){ return LB.tab==='all' || x.ts>=wk; });
  var best={}, i;                                  // one row per player: their best run, not their last
  for(i=0;i<rows.length;i++){
    var e=best[rows[i].name];
    if(!e || rows[i].species>e.species || (rows[i].species===e.species && rows[i].merges>e.merges)) best[rows[i].name]=rows[i];
  }
  var out=Object.keys(best).map(function(n){ return best[n]; });
  out.sort(function(a,b){ return (b.species-a.species) || (b.merges-a.merges); });
  return out.slice(0,10);
}

/* ---------- 9. RANKS ---------- */
var RANK_LEN = [50,80,116];
var RANK_O2  = [6,10,17];
var AGE_STAGE = ['FRY','JUVENILE','ADULT'];

/* ============================================================
   CREATURE RENDERER — one function draws every species
   ============================================================ */
/* canvas sized per species: a sail needs headroom, a tetra does not (template §11.13) */
function creatureExtent(sp){
  var d=bodyDims(sp,1), rx=d[0], ry=d[1];
  var up=ry+0.10, dn=ry+0.24, lf=rx+0.06, rt=rx+0.10;
  if(sp.dorsal==='sail')      up=Math.max(up, ry+0.38*1.52+0.05);
  else if(sp.dorsal==='small')up=Math.max(up, ry+0.24);
  if(sp.tail==='veil')      lf=Math.max(lf, rx+0.44);
  else if(sp.tail==='lobe') lf=Math.max(lf, rx+0.24);
  else                      lf=Math.max(lf, rx+0.34);
  if(sp.tail==='fork'){ up=Math.max(up, ry+0.30); dn=Math.max(dn, ry+0.30); }
  if(sp.tail==='veil'){ up=Math.max(up, ry+0.28); dn=Math.max(dn, ry+0.28); }
  if(sp.tail==='fan'){  up=Math.max(up, ry+0.22); dn=Math.max(dn, ry+0.22); }
  var EX=extrasOf(sp);
  if(EX.indexOf('tendrils')>=0) lf=Math.max(lf, rx+0.46);
  if(EX.indexOf('whiskers')>=0) rt=Math.max(rt, rx+0.36);
  if(EX.indexOf('spines')>=0||EX.indexOf('crystal')>=0||EX.indexOf('moss')>=0) up=Math.max(up, ry+0.26);
  if(EX.indexOf('crown')>=0){ rt=Math.max(rt, rx+0.16); up=Math.max(up, ry+0.20); dn=Math.max(dn, ry+0.20); }
  if(EX.indexOf('orb')>=0){
    rt=Math.max(rt, rx*1.15+0.08); lf=Math.max(lf, rx*1.15+0.08);
    up=Math.max(up, ry*1.5+0.08);  dn=Math.max(dn, ry*1.5+0.08);
  }
  if(sp.body==='snail'){ up=Math.max(up, ry+0.30); rt=Math.max(rt, rx+0.30); dn=Math.max(dn, ry+0.14); }
  if(sp.body==='bell'){ dn=Math.max(dn, ry+0.62); lf=Math.max(lf, rx+0.16); rt=Math.max(rt, rx+0.16); }
  if(sp.body==='horse'){ up=Math.max(up, ry+0.26); rt=Math.max(rt, rx+0.34); lf=Math.max(lf, rx+0.40); dn=Math.max(dn, ry+0.20); }
  if(sp.body==='shrimp'){ rt=Math.max(rt, rx+0.46); dn=Math.max(dn, ry+0.32); up=Math.max(up, ry+0.20); }
  dn=Math.max(dn, ry+0.26); // pectoral fin
  return { hx:Math.max(lf,rt), hy:Math.max(up,dn) };
}
function creatureCanvasSize(sp,rank){
  var L=RANK_LEN[rank], e=creatureExtent(sp);
  return { w: Math.round(e.hx*2*L)+8, h: Math.round(e.hy*2*L)+8 };
}
function extrasOf(sp){
  if(Array.isArray(sp.extra)) return sp.extra;
  return (sp.extra && sp.extra!=='none') ? [sp.extra] : [];
}
function bodyDims(sp,L){
  switch(sp.body){
    case 'shrimp': return [L*0.38,L*0.22];
    case 'snail':  return [L*0.34,L*0.24];
    case 'bell':   return [L*0.30,L*0.28];
    case 'horse':  return [L*0.17,L*0.40];
    case 'slim':   return [L*0.46,L*0.17];
    case 'flat':   return [L*0.44,L*0.21];
    case 'disc':   return [L*0.32,L*0.36];
    case 'blob':   return [L*0.34,L*0.33];
    default:       return [L*0.42,L*0.26];
  }
}
function drawCreature(c,sp,rank,frame){
  var L = RANK_LEN[rank];
  var sz = creatureCanvasSize(sp,rank);
  var cx = sz.w>>1, cy = sz.h>>1;
  var P = sp.pal;
  var rnd = mulberry32(sp.seed*31 + rank*7 + 3);
  var d = bodyDims(sp,L), rx = d[0], ry = d[1];
  var ph = frame/FRAMES*Math.PI*2;
  var sway = Math.sin(ph);
  var flex = Math.round(Math.cos(ph)*Math.max(1,L*0.02));
  var x0 = Math.round(cx-rx);   // tail root
  var detail = rank;            // higher rank = richer

  /* --- tail (behind body) --- */
  if(sp.tail!=='none'){
  var tlen = (sp.tail==='veil') ? L*0.40 : (sp.tail==='lobe' ? L*0.20 : L*0.28);
  var off  = sway*L*0.10;
  if(sp.tail==='fork'){
    wedge(c,x0+1,cy,tlen+1,off-L*0.22,3,3,P[0]); wedge(c,x0+1,cy,tlen+1,off+L*0.22,3,3,P[0]);
    wedge(c,x0,cy,tlen,off-L*0.22,2,2,P[1]);     wedge(c,x0,cy,tlen,off+L*0.22,2,2,P[1]);
    wedge(c,x0-1,cy-1,tlen-2,off-L*0.20,1,1,P[2]); wedge(c,x0-1,cy-1,tlen-2,off+L*0.20,1,1,P[2]);
  } else {
    var half = (sp.tail==='veil') ? L*0.34 : (sp.tail==='lobe' ? L*0.16 : L*0.26);
    tri(c,x0+1,cy,tlen,half,off,P[0],1);
    tri(c,x0,cy,tlen,half,off,P[1],0);
    tri(c,x0-1,cy-1,tlen-2,half*0.7,off,P[2],0);
    if(detail>0) tri(c,x0-2,cy-2,tlen-4,half*0.42,off,P[3],0);
  }
  }

  /* --- dorsal fin --- */
  if(sp.dorsal==='sail'){
    var sh = Math.round(L*0.38);
    tri(c,cx+Math.round(rx*0.35),cy-ry-1,rx*0.9,sh,-sh*0.5,P[0],1);
    tri(c,cx+Math.round(rx*0.35),cy-ry-1,rx*0.9,sh,-sh*0.5,P[1],0);
    tri(c,cx+Math.round(rx*0.30),cy-ry-2,rx*0.7,sh*0.6,-sh*0.45,P[2],0);
  } else if(sp.dorsal==='small'){
    tri(c,cx+Math.round(rx*0.1),cy-ry,rx*0.5,L*0.12,-L*0.10,P[0],1);
    tri(c,cx+Math.round(rx*0.1),cy-ry,rx*0.5,L*0.12,-L*0.10,P[1],0);
  }

  /* --- body: outline / base / light / highlight (PIXEL_ART_SPEC §4).
         Four anatomies are not fish at all and get their own silhouette. --- */
  var by = cy+flex, i2;
  if(sp.body==='snail'){
    /* a foot on the floor and a spiral shell above it */
    var fy=by+Math.round(ry*0.7);
    rp(c,cx-rx-1,fy-1,rx*2+2,Math.round(ry*0.5)+2,P[0]);
    rp(c,cx-rx,fy,rx*2,Math.round(ry*0.5),P[1]);
    rp(c,cx-rx+1,fy+1,rx*2-3,Math.max(1,Math.round(ry*0.28)),P[2]);
    for(i2=0;i2<Math.round(rx*1.6);i2++) px(c,cx-rx+2+i2,fy+Math.round(ry*0.5)+Math.round(Math.sin(i2*0.9+ph)*1.2),P[0]);
    var sr=Math.round(ry*1.05), scx=cx-Math.round(rx*0.15), scy=by-Math.round(ry*0.35);
    circ(c,scx,scy,sr+1,P[0]); circ(c,scx,scy,sr,P[1]);
    for(i2=0;i2<3;i2++){                                  // the spiral
      var rr=Math.round(sr*(0.74-i2*0.20));
      var ox2=Math.round(Math.cos(i2*2.1)*sr*0.22), oy2=Math.round(Math.sin(i2*2.1)*sr*0.22);
      circ(c,scx+ox2,scy+oy2,rr,i2%2?P[2]:P[3]);
      circ(c,scx+ox2,scy+oy2,Math.max(1,rr-2),i2%2?P[3]:P[2]);
    }
    circ(c,scx-Math.round(sr*0.3),scy-Math.round(sr*0.35),Math.max(1,Math.round(sr*0.16)),P[4]);
  } else if(sp.body==='bell'){
    /* a pulsing dome with a curtain underneath - no fish parts at all */
    var pul=Math.round(Math.sin(ph)*L*0.03);
    var brx=rx+pul, bry=ry-pul;
    dome(c,cx,by+bry,brx+1,bry*2+1,P[0]);
    dome(c,cx,by+bry,brx,bry*2,P[1]);
    dome(c,cx-1,by+bry-1,brx-3,bry*2-3,P[2]);
    dome(c,cx-2,by+bry-3,Math.round(brx*0.5),Math.round(bry*1.1),P[3]);
    rp(c,cx-brx,by+bry,brx*2+1,2,P[0]);
    for(i2=-3;i2<=3;i2++){                                 // the curtain
      var tx2=cx+Math.round(i2*brx*0.28);
      var tl2=Math.round(L*(0.30+Math.abs(Math.sin(i2+ph))*0.16));
      for(var q2=0;q2<tl2;q2++){
        var wq=Math.round(Math.sin(q2*0.3+ph+i2)*L*0.035);
        px(c,tx2+wq,by+bry+2+q2, q2%4===0?P[4]:P[1]);
        if(detail>0) px(c,tx2+wq+1,by+bry+2+q2,P[0]);
      }
    }
  } else if(sp.body==='horse'){
    /* upright body, snout forward, tail curled under */
    var seg=Math.round(ry*0.34);
    for(i2=-2;i2<=2;i2++){
      var syy=by+i2*seg, sxx=cx+Math.round(Math.sin(i2*0.7)*rx*0.5);
      var swd=rx+ (i2===-2?-1:0);
      ell(c,sxx,syy,swd+1,seg,P[0]);
      ell(c,sxx,syy,swd,seg-1,P[1]);
      ell(c,sxx-1,syy-1,Math.max(1,swd-2),Math.max(1,seg-2),P[2]);
      if(detail>0) px(c,sxx-1,syy-1,P[3]);
    }
    var hx2=cx+Math.round(Math.sin(-2*0.7)*rx*0.5), hy2=by-2*seg;
    ell(c,hx2,hy2-seg,rx+1,seg+2,P[0]); ell(c,hx2,hy2-seg,rx,seg+1,P[1]);
    rp(c,hx2,hy2-seg-1,Math.round(rx*2.0),3,P[0]);            // snout
    rp(c,hx2,hy2-seg-1,Math.round(rx*1.8),1,P[3]);
    var tcx=cx+Math.round(Math.sin(2*0.7)*rx*0.5), tcy=by+2*seg;
    for(i2=0;i2<Math.round(L*0.34);i2++){                     // curled tail
      var an=i2*0.30+ph*0.2;
      px(c,tcx-Math.round(Math.cos(an)*i2*0.42), tcy+Math.round(Math.sin(an)*i2*0.30)+Math.round(i2*0.30), P[0]);
      px(c,tcx-Math.round(Math.cos(an)*i2*0.42), tcy+Math.round(Math.sin(an)*i2*0.30)+Math.round(i2*0.30)-1, P[2]);
    }
  } else if(sp.body==='shrimp'){
    /* arched, segmented, legs under, antennae forward */
    for(i2=-3;i2<=3;i2++){
      var ax2=cx+Math.round(i2*rx*0.30);
      var arch=Math.round(Math.cos(i2*0.42)*ry*0.55);
      var sry=Math.round(ry*(0.95-Math.abs(i2)*0.10));
      ell(c,ax2,by-arch,Math.round(rx*0.22)+1,sry+1,P[0]);
      ell(c,ax2,by-arch,Math.round(rx*0.22),sry,P[1]);
      ell(c,ax2-1,by-arch-1,Math.max(1,Math.round(rx*0.16)),Math.max(1,sry-2),P[2]);
      if(detail>0) rp(c,ax2-1,by-arch-sry+1,1,Math.max(1,sry),P[3]);
      for(var lg=0;lg<2;lg++){                                // legs
        var lx2=ax2, ly2=by-arch+sry;
        for(var lp=0;lp<Math.round(L*0.11);lp++)
          px(c,lx2+Math.round(Math.sin(lp*0.5+i2+ph)*2)-lg, ly2+lp, P[0]);
      }
    }
    var hxx=cx+Math.round(3*rx*0.30);
    for(i2=0;i2<Math.round(L*0.40);i2++){                      // antennae
      px(c,hxx+i2, by-Math.round(ry*0.4)-Math.round(Math.sin(i2*0.16+ph)*L*0.05), P[0]);
      px(c,hxx+i2, by-Math.round(ry*0.1)+Math.round(i2*0.16), P[0]);
    }
  } else if(sp.body==='flat'){
    /* flat belly, arched back - the shape of a fish that lives on the floor */
    var bl=Math.round(by+ry*0.55);
    flatEll(c,cx,by,rx+1,ry+1,bl+1,P[0]);
    flatEll(c,cx,by,rx,ry,bl,P[1]);
    flatEll(c,cx-1,by-1,rx-2,ry-2,bl-1,P[2]);
    if(detail>0) flatEll(c,cx-2,by-2,rx-4,ry-4,bl-2,P[3]);
  } else {
    ell(c,cx,by,rx+1,ry+1,P[0]);
    ell(c,cx,by,rx,ry,P[1]);
    ell(c,cx-1,by-1,rx-2,ry-2,P[2]);
    if(detail>0) ell(c,cx-2,by-2,rx-4,ry-4,P[3]);
  }
  var oddBody = (sp.body==='snail'||sp.body==='bell'||sp.body==='horse'||sp.body==='shrimp');

  /* --- pectoral fin --- */
  if(!oddBody){
    tri(c,cx+Math.round(rx*0.2),by+Math.round(ry*0.4),L*0.20,L*0.09,L*0.06+sway*2,P[0],1);
    tri(c,cx+Math.round(rx*0.2),by+Math.round(ry*0.4),L*0.20,L*0.09,L*0.06+sway*2,P[2],0);
  }

  /* --- pattern --- */
  var i,t;
  if(sp.pattern==='stripes'){
    for(i=-2;i<=2;i++){
      var sx = Math.round(cx+i*rx*0.34);
      var sHalf = Math.round(ry*Math.sqrt(Math.max(0,1-Math.pow((sx-cx)/rx,2))));
      if(sHalf>1) rp(c,sx,by-sHalf+1,Math.max(1,Math.round(L*0.035)),sHalf*2-2,P[0]);
    }
  } else if(sp.pattern==='spots'){
    for(i=0;i<10+detail*6;i++){
      var a=rnd()*6.283, r=Math.sqrt(rnd());
      var qx=Math.round(cx+Math.cos(a)*rx*r*0.8), qy=Math.round(by+Math.sin(a)*ry*r*0.8);
      rp(c,qx,qy,Math.max(1,Math.round(L*0.05)),Math.max(1,Math.round(L*0.05)), rnd()<0.5?P[0]:P[4]);
    }
  } else if(sp.pattern==='neon'){
    rp(c,cx-rx+2,by-1,rx*2-4,Math.max(1,Math.round(L*0.055)),P[4]);
    rp(c,cx-rx+2,by+Math.round(ry*0.45),rx*2-6,Math.max(1,Math.round(L*0.045)),P[3]);
  }

  /* --- extras: what makes a branch a real branch, not a recolour (template §8).
         A species may STACK several - that is how chimeras get their own silhouette. --- */
  function drawExtra(kind){
    var i;
    if(kind==='glow'){
      for(i=0;i<4+detail*2;i++){
        var gx=Math.round(cx-rx*0.6+i*(rx*1.2)/(4+detail*2));
        rp(c,gx,by+Math.round(ry*0.45),Math.max(1,Math.round(L*0.05)),Math.max(1,Math.round(L*0.05)),P[4]);
      }
    } else if(kind==='moss'){
      for(i=0;i<6+detail*3;i++){
        var mx=Math.round(cx-rx*0.7+rnd()*rx*1.4);
        var mh=Math.max(2,Math.round(L*(0.06+rnd()*0.10)));
        var mHalf=Math.round(ry*Math.sqrt(Math.max(0,1-Math.pow((mx-cx)/rx,2))));
        rp(c,mx,by-mHalf-mh,1,mh,P[0]);
        rp(c,mx,by-mHalf-mh,1,Math.max(1,mh-1),P[4]);
      }
    } else if(kind==='plates'){
      for(i=-2;i<=2;i++){
        var pxx=Math.round(cx+i*rx*0.36);
        var pHalf=Math.round(ry*Math.sqrt(Math.max(0,1-Math.pow((pxx-cx)/rx,2))));
        if(pHalf>1){ rp(c,pxx-1,by-pHalf,2,pHalf+1,P[0]); rp(c,pxx,by-pHalf+1,1,pHalf,P[3]); }
      }
    } else if(kind==='whiskers'){
      for(i=0;i<Math.round(L*0.30);i++){
        rp(c,cx+Math.round(rx*0.85)+i,by+Math.round(ry*0.3)+Math.round(i*0.45+sway),1,1,P[0]);
        rp(c,cx+Math.round(rx*0.85)+i,by+Math.round(ry*0.1)-Math.round(i*0.25-sway),1,1,P[0]);
      }
    } else if(kind==='tendrils'){
      for(var k=0;k<3;k++){
        var ty=by+Math.round((k-1)*ry*0.7);
        for(i=0;i<Math.round(L*0.36);i++){
          var wob=Math.round(Math.sin(i*0.4+ph+k)*L*0.05);
          rp(c,x0-i-2,ty+wob,1,1, i%3===0?P[4]:P[1]);
        }
      }
    } else if(kind==='spines'){
      for(i=-2;i<=2;i++){
        var qx2=Math.round(cx+i*rx*0.3);
        var qHalf=Math.round(ry*Math.sqrt(Math.max(0,1-Math.pow((qx2-cx)/rx,2))));
        var shh=Math.max(2,Math.round(L*0.11));
        tri(c,qx2,by-qHalf,shh,1,-shh,P[0],0);
        rp(c,qx2,by-qHalf-shh,1,shh,P[3]);
      }
    } else if(kind==='crystal'){
      for(i=0;i<4+detail*2;i++){
        var ax=Math.round(cx-rx*0.6+rnd()*rx*1.2);
        var aHalf=Math.round(ry*Math.sqrt(Math.max(0,1-Math.pow((ax-cx)/rx,2))));
        var ah=Math.max(2,Math.round(L*(0.08+rnd()*0.10)));
        tri(c,ax+1,by-aHalf,ah,2,-ah,P[0],0);
        tri(c,ax,by-aHalf-1,ah-1,1,-ah,P[4],0);
      }
    } else if(kind==='orb'){
      for(i=0;i<5;i++){
        var oa=ph+i*1.25, orr=rx*1.15;
        var ox=Math.round(cx+Math.cos(oa)*orr), oy=Math.round(by+Math.sin(oa)*ry*1.5);
        circ(c,ox,oy,Math.max(1,Math.round(L*0.045)),P[0]);
        circ(c,ox,oy,Math.max(1,Math.round(L*0.03)),P[4]);
      }
    } else if(kind==='crown'){
      /* chimera only: a ring of spikes around the head */
      for(i=0;i<7;i++){
        var ca=-1.6+i*0.45;
        var hx=Math.round(cx+rx*0.45+Math.cos(ca)*rx*0.55);
        var hy=Math.round(by+Math.sin(ca)*ry*0.9);
        var chh=Math.max(2,Math.round(L*0.09));
        tri(c,hx+1,hy,chh,2,-chh*0.9,P[0],0);
        tri(c,hx,hy-1,chh-1,1,-chh*0.9,P[3],0);
      }
    }
  }
  var EX=extrasOf(sp);
  for(var e=0;e<EX.length;e++) drawExtra(EX[e]);

  /* --- eye --- */
  var ex=Math.round(cx+rx*0.58), ey=Math.round(by-ry*0.22);
  if(sp.body==='snail'){ ex=Math.round(cx+rx*0.85); ey=Math.round(by+ry*0.45); }
  else if(sp.body==='bell'){ ex=Math.round(cx-rx*0.35); ey=Math.round(by+ry*0.15); }
  else if(sp.body==='horse'){ ex=Math.round(cx+rx*0.4); ey=Math.round(by-ry*0.72); }
  else if(sp.body==='shrimp'){ ex=Math.round(cx+rx*0.78); ey=Math.round(by-ry*0.30); }
  var er=Math.max(1,Math.round(L*0.055));
  if(sp.id==='siltlurker'){
    circ(c,ex,ey,er,P[0]); // blind: sealed socket
  } else {
    circ(c,ex,ey,er+1,P[0]);
    circ(c,ex,ey,er,'#f2fbff');
    circ(c,ex+Math.max(1,Math.round(er*0.3)),ey,Math.max(1,Math.round(er*0.55)),'#101820');
    if(er>1) px(c,ex-1,ey-1,'#ffffff');
  }
  /* --- mouth --- */
  if(!oddBody) rp(c,cx+Math.round(rx*0.86),by+Math.round(ry*0.12),Math.max(1,Math.round(L*0.06)),1,P[0]);

  /* --- texture (PIXEL_ART_SPEC §4.5) --- */
  var n = 20+detail*6;
  for(i=0;i<n;i++){
    var a2=rnd()*6.283, r2=Math.sqrt(rnd())*0.85;
    var tx=Math.round(cx+Math.cos(a2)*rx*r2), ty2=Math.round(by+Math.sin(a2)*ry*r2);
    px(c,tx,ty2, rnd()<0.5?P[1]:P[3]);
  }
}

/* ---------- target ring: a DASHED OUTLINE, deliberately unlike any soft creature halo.
     Baked once at start - never generated inside the game loop (PIXEL_ART_SPEC §7). ---------- */
function makeRing(r,th,col,dashes){
  var sz=r*2+3;
  return makeSprite(sz,sz,function(c,w,h){
    var cx=w>>1, cy=h>>1, ri=r-th;
    for(var y=-r;y<=r;y++){
      for(var x=-r;x<=r;x++){
        var d2=x*x+y*y;
        if(d2>r*r || d2<ri*ri) continue;
        var seg=Math.floor(((Math.atan2(y,x)+Math.PI)/(Math.PI*2))*dashes*2);
        if(seg%2===0) px(c,cx+x,cy+y,col);
      }
    }
  });
}

/* ---------- glow halo (separate additive layer, never inside silhouette) ---------- */
function makeGlow(r,col){
  return makeSprite(r*2+2,r*2+2,function(c,w,h){
    var cx=w>>1, cy=h>>1;
    for(var i=r;i>=1;i--){
      var a=Math.pow(1-i/r,2)*0.5;
      c.fillStyle='rgba('+col+','+a.toFixed(3)+')';
      circ(c,cx,cy,i,'rgba('+col+','+a.toFixed(3)+')');
    }
  });
}

/* ============================================================
   ASSET BAKE
   ============================================================ */
var SPR = { fish:{}, glow:{}, ring:{}, decor:{}, food:{}, bg:null, far:null, mid:null, floorL:null,
            front:null, rays:null, glass:null, caustic:[], plantsMid:[], egg:null };

/* Sprites are baked on FIRST USE, not all at boot. With 46 species x 3 ranks x 6 frames
   an eager bake would be ~830 canvases and well over 50 MB on a phone. */
function fishFrames(id,rank){
  var sp=SPECIES[id];
  if(!sp){ sp=SPECIES.guppy; id='guppy'; }              // render must never crash
  rank=Math.max(0,Math.min(2,rank|0));
  var byId=SPR.fish[id] || (SPR.fish[id]=[]);
  if(byId[rank]) return byId[rank];
  var arr=[], sz=creatureCanvasSize(sp,rank);
  for(var f=0;f<FRAMES;f++){
    (function(f){ arr.push(makeSprite(sz.w,sz.h,function(c){ drawCreature(c,sp,rank,f); })); })(f);
  }
  byId[rank]=arr;
  return arr;
}
function fishGlow(id){
  var sp=SPECIES[id];
  if(!sp || !sp.glow) return null;
  if(SPR.glow[id]===undefined) SPR.glow[id]=makeGlow(Math.round(RANK_LEN[2]*0.55),hexToRgb(sp.glow));
  return SPR.glow[id];
}
function hexToRgb(h){
  var n=parseInt(h.slice(1),16);
  return ((n>>16)&255)+','+((n>>8)&255)+','+(n&255);
}

function bakeFood(){
  for(var i=0;i<FOODS.length;i++){
    (function(f){
      SPR.food[f.id]=makeSprite(6,6,function(c){
        circ(c,3,3,2,'#1a1208'); circ(c,3,3,1,f.col); px(c,2,2,'#ffffff');
      });
    })(FOODS[i]);
  }
  SPR.egg = makeSprite(10,12,function(c){
    ell(c,5,6,4,5,'#0e2a33'); ell(c,5,6,3,4,'#4fb0a8'); ell(c,4,5,2,3,'#9ff0e0'); px(c,3,4,'#ffffff');
  });
}

/* water background: value noise + dithering, no flat fills (PIXEL_ART_SPEC §5) */
function bakeBackground(){
  var B0=biome(), WATER=B0.water;
  var rnd=mulberry32(0xA11CE), wv=makeWaves(rnd,4);
  SPR.bg = makeSprite(W,H,function(c){
    var B=3;
    for(var y=0;y<H;y+=B){
      for(var x=0;x<W;x+=B){
        var depth = 1 - (y/H);
        var n = noise(wv,x,y)*0.22 + (rnd()-0.5)*0.14;
        var v = depth*1.5 + n - 0.35;
        var s = step(v*2-1,WATER.length);
        rp(c,x,y,Math.min(B,W-x),B,WATER[s]);
      }
    }
    if(B0.surface){
      for(var x2=0;x2<W;x2++){
        var hh = 2 + Math.round(Math.sin(x2*0.05)*1.5 + Math.sin(x2*0.017)*1.5);
        rp(c,x2,SURFACE-6+hh,1,3,'#3ab4c0');
        rp(c,x2,SURFACE-3+hh,1,2,'#7fe0e0');
      }
    } else {
      /* no surface down here - just the dark closing over you */
      for(var x3=0;x3<W;x3+=2){
        for(var y3=0;y3<SURFACE+40;y3+=2){
          if(rnd()<0.25) rp(c,x3,y3,2,2,'#04070e');
        }
      }
    }
  });
}
/* FAR LAYER - the shape of the horizon is what makes a place a place */
function bakeFar(){
  var B0=biome(), T=B0.far;
  var rnd=mulberry32(0xFA71), wv=makeWaves(rnd,3);
  SPR.far = makeSprite(W,H,function(c){
    var x,y,n,s2;
    if(B0.id==='pond'){                      /* rolling hills */
      for(x=0;x<W;x+=3){
        var h1 = 300 + noise(wv,x*2,0)*40;
        for(y=Math.round(h1);y<FLOOR+40;y+=3){
          n=noise(wv,x,y)*0.5+(rnd()-0.5)*0.14;
          rp(c,x,y,Math.min(3,W-x),Math.min(3,FLOOR+40-y),T[step(n,T.length)]);
        }
      }
    } else if(B0.id==='reef'){                /* a wall pierced with arches */
      for(x=0;x<W;x+=3){
        var h2 = 250 + noise(wv,x*1.5,0)*70;
        for(y=Math.round(h2);y<FLOOR+40;y+=3){
          var hole = noise(wv,x*3+100,y*3);
          if(hole>0.42) continue;             /* the holes ARE the reef */
          n=noise(wv,x,y)*0.5+(rnd()-0.5)*0.14;
          rp(c,x,y,Math.min(3,W-x),Math.min(3,FLOOR+40-y),T[step(n,T.length)]);
        }
      }
    } else if(B0.id==='kelp'){                /* a canopy overhead, strands hanging down */
      for(x=0;x<W;x+=3) for(y=SURFACE;y<SURFACE+70;y+=3){
        n=noise(wv,x,y*2)*0.6+(rnd()-0.5)*0.14;
        if(n>-0.2) rp(c,x,y,3,3,T[step(n,T.length)]);
      }
      for(var k=0;k<22;k++){
        var sx=Math.round(rnd()*W), len=120+rnd()*260;
        for(y=SURFACE+40;y<SURFACE+40+len;y+=3){
          var xo=Math.round(Math.sin(y*0.02+k)*10);
          rp(c,sx+xo,y,4,3,T[y%6<3?0:1]);
        }
      }
    } else {                                  /* trench: two walls closing in */
      for(y=0;y<FLOOR+40;y+=3){
        var t=y/(FLOOR+40);
        var lw = Math.round(60 + t*210 + noise(wv,0,y*2)*40);
        var rw = Math.round(60 + t*210 + noise(wv,500,y*2)*40);
        for(x=0;x<lw;x+=3){ n=noise(wv,x,y)*0.5+(rnd()-0.5)*0.14; rp(c,x,y,3,3,T[step(n,T.length)]); }
        for(x=W-rw;x<W;x+=3){ n=noise(wv,x,y)*0.5+(rnd()-0.5)*0.14; rp(c,x,y,Math.min(3,W-x),3,T[step(n,T.length)]); }
      }
    }
  });
}
/* MID LAYER - the geometry the eye actually reads */
function bakeMid(){
  var B0=biome(), T=B0.mid;
  var rnd=mulberry32(0x31D2), wv=makeWaves(rnd,3);
  SPR.mid = makeSprite(W,H,function(c){
    var x,y,n,i;
    if(B0.id==='pond'){
      for(x=0;x<W;x+=2){
        var h1 = 392 + noise(wv,x*2,0)*28;
        for(y=Math.round(h1);y<FLOOR+40;y+=2){
          n=noise(wv,x,y)*0.5+(rnd()-0.5)*0.14;
          rp(c,x,y,Math.min(2,W-x),Math.min(2,FLOOR+40-y),T[step(n,T.length)]);
        }
      }
    } else if(B0.id==='reef'){                /* rounded coral heads */
      for(i=0;i<14;i++){
        var cx=Math.round(rnd()*W), r=26+Math.round(rnd()*54);
        dome(c,cx,FLOOR,r,r,T[0]);
        dome(c,cx,FLOOR,r-3,r-4,T[1]);
        dome(c,cx-2,FLOOR,Math.round(r*0.6),Math.round(r*0.7),T[2]);
        for(var q=0;q<50;q++) px(c,cx-r+Math.round(rnd()*r*2),FLOOR-Math.round(rnd()*r),T[rnd()<0.5?0:2]);
      }
    } else if(B0.id==='kelp'){                /* vertical columns, floor to canopy */
      for(i=0;i<20;i++){
        var kx=Math.round(rnd()*W), kw=5+Math.round(rnd()*9);
        for(y=FLOOR;y>SURFACE+30;y-=2){
          var xo=Math.round(Math.sin(y*0.014+i)*16);
          rp(c,kx+xo-kw,y,kw*2,2,T[0]);
          rp(c,kx+xo-kw+2,y,Math.max(1,kw),2,T[1]);
          if(y%14===0){ rp(c,kx+xo-kw-6,y,6,3,T[2]); rp(c,kx+xo+kw,y,6,3,T[2]); }
        }
      }
    } else {                                  /* trench: spires off the floor */
      for(i=0;i<11;i++){
        var sx2=Math.round(rnd()*W), sh=90+Math.round(rnd()*230), sw=8+Math.round(rnd()*16);
        for(y=FLOOR;y>FLOOR-sh;y-=2){
          var t2=(FLOOR-y)/sh, ww=Math.max(2,Math.round(sw*(1-t2*0.85)));
          var xo2=Math.round(Math.sin(t2*2+i)*7);
          rp(c,sx2+xo2-ww,y,ww*2,2,T[0]);
          rp(c,sx2+xo2-ww+1,y,Math.max(1,ww),2,T[2]);
        }
      }
      for(i=0;i<200;i++) px(c,Math.round(rnd()*W),Math.round(SURFACE+rnd()*(FLOOR-SURFACE)),T[2]);
    }
  });
}
function bakeFloor(){
  var B0=biome(), T=B0.floor;
  var rnd=mulberry32(0xF1007), wv=makeWaves(rnd,4);
  SPR.floorL = makeSprite(W,H-FLOOR+8,function(c,w,h){
    var i,y,x;
    for(y=0;y<h;y+=2){
      for(x=0;x<W;x+=2){
        var n=noise(wv,x,y)*0.7+(rnd()-0.5)*0.14 - (y/h)*0.5;
        rp(c,x,y,Math.min(2,W-x),Math.min(2,h-y),T[step(n,T.length)]);
      }
    }
    if(B0.id==='pond'){                        /* pebbles */
      for(i=0;i<170;i++){
        var r=2+Math.round(rnd()*3);

/* ---------- save / load with sanitising (template §10) ---------- */
function save(){
  try{
    var d={ v:3, name:G.name, pearls:G.pearls, discovered:G.discovered, spawnTimer:G.spawnTimer,
      unlocked:G.unlocked, achs:G.achs, stats:G.stats, muted:AU.muted?1:0, tips:G.tips,
      savedAt:Date.now(),
      biome:G.biome, biomesOwned:G.biomesOwned,
      decor:G.decor.map(function(x){ return {id:x.id,x:x.x,v:x.v}; }),
      quests:G.quests.map(function(q){ return {id:q.id,prog:q.prog}; }),
      fish:G.fish.map(function(f){ return {s:f.sp,r:f.rank,a:f.age,x:f.x,y:f.y,d:f.diet,rp:f.ripe}; }) };
    localStorage.setItem(SAVE_KEY,JSON.stringify(d));
  }catch(e){}
}
function num(v,def,lo,hi){
  v=Number(v);
  if(!isFinite(v)) return def;
  if(v<lo) return lo; if(v>hi) return hi;
  return v;
}
function load(){
  var d=null;
  try{ d=JSON.parse(localStorage.getItem(SAVE_KEY)||'null'); }catch(e){ d=null; }
  if(!d||typeof d!=='object') return false;
  G.name = (typeof d.name==='string')? d.name.slice(0,14) : '';
  G.pearls = num(d.pearls,60,0,PEARL_CAP);
  G.spawnTimer = num(d.spawnTimer,0,0,SPAWN_COOLDOWN);
  G.discovered = {};
  if(d.discovered && typeof d.discovered==='object'){
    for(var k in d.discovered) if(SPECIES[k]) G.discovered[k]=true;
  }
  G.unlocked = {};
  if(d.unlocked && typeof d.unlocked==='object'){
    for(var k2 in d.unlocked) if(LOCKED_BASE.indexOf(k2)>=0) G.unlocked[k2]=true;
  }
  G.achs = {};
  if(d.achs && typeof d.achs==='object'){
    for(var k3 in d.achs){ for(var ai=0;ai<ACHS.length;ai++) if(ACHS[ai].id===k3) G.achs[k3]=true; }
  }
  AU.muted = !!d.muted;
  G.tips = {};
  if(d.tips && typeof d.tips==='object'){
    for(var k5 in d.tips) if(tipDef(k5)) G.tips[k5]=true;
  }
  G.tip=null; G.tipGap=0;
  G.stats = {merges:0,mutants:0,chimeras:0,released:0,fed:0};
  if(d.stats && typeof d.stats==='object'){
    for(var k4 in G.stats) G.stats[k4]=num(d.stats[k4],0,0,999999);
  }
  G.biomesOwned={pond:true};
  if(d.biomesOwned && typeof d.biomesOwned==='object'){
    for(var b0 in d.biomesOwned) if(biomeDef(b0).id===b0) G.biomesOwned[b0]=true;
  }
  G.biome = (typeof d.biome==='string' && biomeDef(d.biome).id===d.biome && G.biomesOwned[d.biome]) ? d.biome : 'pond';
  G.decor=[];
  if(Array.isArray(d.decor)){
    for(var q0=0;q0<d.decor.length && G.decor.length<DECOR_MAX;q0++){
      var dd0=d.decor[q0];
      if(!dd0 || !decorDef(dd0.id)) continue;                      // unknown decor -> dropped
      G.decor.push({ id:dd0.id, x:num(dd0.x,W/2,20,W-20)|0, v:num(dd0.v,0,0,1)|0 });
    }
  }
  G.quests=[];
  if(Array.isArray(d.quests)){
    for(var q1=0;q1<d.quests.length && G.quests.length<3;q1++){
      var qq=d.quests[q1];
      if(!qq || !questDef(qq.id)) continue;
      G.quests.push({ id:qq.id, prog:num(qq.prog,0,0,9999) });
    }
  }
  fillQuests();
  recalcEnv();
  G._savedAt = num(d.savedAt,0,0,1e15);
  G.fish=[];
  if(Array.isArray(d.fish)){
    for(var i=0;i<d.fish.length && i<80;i++){
      var f=d.fish[i];
      if(!f||!SPECIES[f.s]) continue;                    // unknown skin -> drop
      var nf=makeFish(f.s, num(f.r,0,0,2)|0, num(f.x,W/2,20,W-20), num(f.y,240,SURFACE+10,FLOOR-10));
      nf.age = num(f.a,0,0,1);
      nf.ripe = num(f.rp,RIPEN,0,RIPEN);
      nf.ready = (nf.age>=1 && nf.ripe<=0);
      if(f.d) for(var a=0;a<AXES.length;a++) nf.diet[AXES[a]] = num(f.d[AXES[a]],0,0,100);
      G.fish.push(nf);
    }
  }
  return true;
}

/* ---------- fish factory ---------- */
var fishId=1;
function makeFish(spId,rank,x,y){
  var sp=SPECIES[spId];
  return {
    id:fishId++, sp:spId, rank:rank|0, age:0,
    x:x, y:y, vx:(gameRnd()-0.5)*30, vy:0, dir:gameRnd()<0.5?-1:1,
    tx:x, ty:y, hunger:0.4, frame:gameRnd()*FRAMES, diet:newDiet(),
    z: 0.5+gameRnd()*0.5, held:false, breed: 12+gameRnd()*20, bob:gameRnd()*6.28,
    flash:0, bottom: (sp.body==='flat'||sp.move==='crawl'||sp.body==='snail'),
    /* every fish owns a patch of the tank - without this they all drift to the middle.
       homes are handed out along a golden-ratio sequence, so they spread evenly
       instead of clumping the way plain random does. */
    homeX: 60+((fishId*0.6180339887)%1)*(W-120),
    homeY: (sp.body==='flat'||sp.move==='crawl'||sp.body==='snail') ? (FLOOR-40-((fishId*0.7548776662)%1)*40)
         : (sp.move==='drift') ? (SURFACE+50+((fishId*0.7548776662)%1)*160)
         : (SURFACE+56+((fishId*0.7548776662)%1)*(FLOOR-SURFACE-130)),
    roam: 80+gameRnd()*110,
    retarget: gameRnd()*4,
    pace: 0.8+gameRnd()*0.5,
    _flip:false,
    ripe: RIPEN,        // counts down once the fish is an adult
    ready:false, mate:null
  };
}
function discover(id){
  if(G.discovered[id]) return false;
  G.discovered[id]=true; addPearls(120);
  if(G.sess && G.sess.found.length<8) G.sess.found.push(id);
  sfx('discover');
  recalcEnv();                 // a wider codex needs a roomier tank
  questEvent('discover',1);
  return true;
}
function addPearls(n){ G.pearls=Math.min(PEARL_CAP,Math.max(0,G.pearls+n)); }
function speciesCount(){ var n=0; for(var k in G.discovered) if(G.discovered[k]) n++; return n; }

/* ---------- oxygen ---------- */
function recalcEnv(){
  var i, a;
  for(a=0;a<AXES.length;a++) G.env[AXES[a]]=0;
  /* Merging needs a PAIR of the same species and rank. Every species you discover
     adds three more buckets to sort fish into, so pairs get rarer as you get better.
     Capacity has to grow with the codex or a good player gets punished with a stall. */
  var cap=150 + Math.max(0, speciesCount()-4)*9;
  var B0=biome();
  for(a in B0.axes) G.env[a]=(G.env[a]||0)+B0.axes[a];   // the biome itself leans
  for(i=0;i<G.decor.length;i++){
    var d=decorDef(G.decor[i].id);
    if(!d) continue;
    G.env[d.axis]+=1;
    cap+=d.o2;
  }
  G.oxyCap=cap;
}
function recalcOxygen(){
  var u=0;
  for(var i=0;i<G.fish.length;i++) u+=RANK_O2[G.fish[i].rank];
  G.oxyUse=u; G.stagnant = u>G.oxyCap;
}

/* ============================================================
   MERGE — the heart of the game
   ============================================================ */
/* what would happen if these two met? null = nothing */
function mergeKind(a,b){
  if(!a||!b||a===b) return null;
  if(a.age<1||b.age<1) return null;
  var spA=SPECIES[a.sp], spB=SPECIES[b.sp];
  if(!spA||!spB) return null;
  /* mutants are unstable: two ADULT L3 mutants cross, even across different lines */
  if(spA.mutantOf && spB.mutantOf && a.rank===2 && b.rank===2)
    return CHIMERA[chimeraKey(a.sp,b.sp)] ? 'chimera' : null;
  if(a.sp!==b.sp) return null;
  if(a.rank===b.rank) return a.rank<2 ? 'rank' : 'evolve';
  return 'unstable';
}
function tryMerge(a,b){
  var kind=mergeKind(a,b);
  if(!kind) return false;
  var sp=SPECIES[a.sp];
  var x=(a.x+b.x)/2, y=(a.y+b.y)/2;
  var diet=newDiet(), i;
  for(i=0;i<AXES.length;i++) diet[AXES[i]]=a.diet[AXES[i]]+b.diet[AXES[i]];
  var spA=a.sp, spB=b.sp;
  removeFish(a); removeFish(b);

  var res=null, coins=0, title=null, sub=null, isNew=false;

  if(kind==='chimera'){
    var target=CHIMERA[chimeraKey(spA,spB)];
    if(target && gameRnd()<CHIMERA_CHANCE){
      res=makeFish(target,0,x,y); res.age=1;
      coins=200; isNew=discover(target);
      title='CHIMERA!'; sub=SPECIES[target].name;
    } else {
      /* 90%: the cross collapses and takes both parents with it */
      addPearls(15);
      burst(x,y,44,'#7fa8b8');
      questEvent('merge',1); questEvent('cross',1); bumpStat('merges',1); sfx('fail');
      G.event={ title:'CROSS FAILED', sub:'BOTH DISSOLVED', id:null, t:EVENT_T, new:false, fail:true };
      G.timeScale=0.15;
      recalcOxygen(); save();
      return true;
    }
  } else if(kind==='rank'){
    res=makeFish(spA,a.rank+1,x,y); res.diet=diet; res.age=1;
    coins = a.rank===0 ? 10 : 25;
  } else if(kind==='evolve'){
    var axis=null, best=-1;
    for(var k=0;k<sp.axes.length;k++){
      var ax=sp.axes[k];
      if(diet[ax]>best){ best=diet[ax]; axis=ax; }
    }
    if(best<=0 && sp.axes.length) axis=sp.axes[Math.floor(gameRnd()*sp.axes.length)];
    var tgt = axis ? sp.evolveTo[axis] : null;
    if(!tgt){
      res=makeFish(spA,2,x,y); res.diet=diet; res.age=1; coins=20;
      toast('THIS LINE ENDS HERE - FOR NOW');
    } else {
      res=makeFish(tgt,0,x,y); res.age=1;
      coins=60; isNew=discover(tgt);
      title=isNew?'NEW SPECIES':'EVOLVED'; sub=SPECIES[tgt].name;
    }
  } else { /* unstable: mismatched ranks */
    if(gameRnd()<0.25 && sp.mutant){
      res=makeFish(sp.mutant,0,x,y); res.age=1;
      coins=50; isNew=discover(sp.mutant);
      title='MUTANT!'; sub=SPECIES[sp.mutant].name;
    } else {
      res=makeFish(spA,Math.min(a.rank,b.rank),x,y); res.diet=diet; res.age=1;
      coins=8; toast('UNSTABLE CROSS - FELL BACK');
    }
  }
  if(res){ res.ripe=RIPEN; res.ready=false; res.mate=null; }
  addPearls(coins);
  sfx(kind==='evolve' && title ? 'evolve' : 'merge');
  bumpStat('merges',1);
  questEvent('merge',1);
  if(kind==='evolve' && title) questEvent('evolve',1);
  if(title==='MUTANT!'){ questEvent('mutant',1); bumpStat('mutants',1); sfx('mutant'); }
  if(title==='CHIMERA!'){ questEvent('cross',1); bumpStat('chimeras',1); sfx('chimera'); }
  if(res.rank===2) questEvent('l3',1);
  G.fish.push(res);
  burst(x,y,title?30:12,title?'#b8f6ff':'#8fd8c8');
  if(title){ G.event={title:title,sub:sub,id:res.sp,t:EVENT_T,new:isNew}; G.timeScale=0.15; }
  recalcOxygen(); save();
  return true;
}
function removeFish(f){
  var i=G.fish.indexOf(f);
  if(i>=0) G.fish.splice(i,1);
}
function releaseFish(f){
  if(!f) return;
  removeFish(f);
  burst(f.x,f.y,18,'#bff0ff');
  for(var i=0;i<10;i++) G.bubbles.push({x:f.x+(gameRnd()-0.5)*20,y:f.y,r:1+Math.round(gameRnd()*2),v:40+gameRnd()*30,w:gameRnd()*6.28});
  sfx('release');
  G.stats.released=(G.stats.released||0)+1;
  recalcOxygen(); save();
  toast('RELEASED - IT STAYS IN YOUR CODEX FOREVER');
}
function toast(msg){ G.toast={msg:msg,t:2.2}; }
function rollQuest(exclude){
  var taken={}, i;
  for(i=0;i<G.quests.length;i++) taken[G.quests[i].id]=true;
  if(exclude) taken[exclude]=true;                 // the one just finished must not come straight back
  var pool=QUEST_POOL.filter(function(q){ return !taken[q.id]; });
  if(!pool.length) pool=QUEST_POOL.filter(function(q){ return !taken[q.id] || q.id!==exclude; });
  if(!pool.length) pool=QUEST_POOL;
  var q=pool[Math.floor(gameRnd()*pool.length)];
  return { id:q.id, prog:0 };
}
function fillQuests(exclude){ while(G.quests.length<3) G.quests.push(rollQuest(exclude)); }
function checkAchs(){
  for(var i=0;i<ACHS.length;i++){
    var a=ACHS[i];
    if(G.achs[a.id]) continue;
    if((G.stats[a.stat]||0) < a.goal) continue;
    G.achs[a.id]=true;
    G.unlocked[a.gives]=true;
    var sp=SPECIES[a.gives];
    G.event={ title:'UNLOCKED', sub:sp?sp.name:a.gives, id:a.gives, t:EVENT_T, new:true, ach:true };
    G.timeScale=0.15;
    addPearls(150);
    sfx('ach');
    save();
  }
}
function bumpStat(k,n){ G.stats[k]=(G.stats[k]||0)+(n||1); checkAchs(); }
function questEvent(ev,n){
  n=n||1;
  for(var i=0;i<G.quests.length;i++){
    var q=G.quests[i], d=questDef(q.id);
    if(!d || d.ev!==ev) continue;
    q.prog+=n;
    if(q.prog>=d.goal){
      addPearls(d.reward);
      sfx('quest');
      toast('QUEST DONE: +'+d.reward+' PEARLS');
      var done=q.id;
      G.quests.splice(i,1); i--;
      fillQuests(done);
    }
  }
}
function burst(x,y,n,col){
  for(var i=0;i<n;i++){
    var a=gameRnd()*6.283, s=20+gameRnd()*120;
    G.parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.5+gameRnd()*0.7,t:0,col:col});
  }
}

/* ============================================================
   SIMULATION
   ============================================================ */
function tankFull(){ return G.oxyUse+RANK_O2[0] > G.oxyCap; }
function setBiome(id){
  var d=biomeDef(id);
  if(!G.biomesOwned[id]){
    if(G.pearls<d.cost){ toast('NOT ENOUGH PEARLS'); sfx('nope'); return false; }
    addPearls(-d.cost); G.biomesOwned[id]=true;
  }
  G.biome=id;
  bakeScene();                       // every layer is regenerated, not recoloured
  AU.bpm=d.bpm; SC=d.scale; AU.step=0;
  recalcEnv(); recalcOxygen();
  sfx('decor');
  toast(d.name+'  -  '+d.desc);
  save();
  return true;
}
function decorAt(x){
  for(var i=G.decor.length-1;i>=0;i--){
    var d=decorDef(G.decor[i].id);
    if(!d) continue;
    if(Math.abs(x-G.decor[i].x) < d.w*0.5+4) return i;
  }
  return -1;
}
function placeDecor(x){
  var d=DECOR[G.buildIdx];
  if(!d) return;
  if(G.decor.length>=DECOR_MAX){ toast('NO ROOM LEFT ON THE FLOOR'); return; }
  if(G.pearls<d.cost){ toast('NOT ENOUGH PEARLS'); sfx('nope'); return; }
  x=Math.max(40,Math.min(W-40,x));
  if(decorAt(x)>=0){ toast('SOMETHING IS ALREADY THERE'); return; }
  addPearls(-d.cost);
  G.decor.push({ id:d.id, x:Math.round(x), v:Math.floor(gameRnd()*2) });
  recalcEnv(); recalcOxygen(); questEvent('decor',1);
  sfx('decor');
  burst(x,FLOOR-10,14,'#9ee08a');
  toast(d.name+' PLANTED  (+'+d.axis+(d.o2?'  +'+d.o2+' O2':'')+')');
  save();
}
function removeDecor(i){
  var d=decorDef(G.decor[i].id);
  if(!d) return;
  G.decor.splice(i,1);
  addPearls(Math.round(d.cost*0.5));
  recalcEnv(); recalcOxygen(); save();
  toast('REMOVED  +'+Math.round(d.cost*0.5)+' PEARLS');
}
function spawnFry(){
  var pool=availableBase();
  var id=pool[Math.floor(gameRnd()*pool.length)];
  var f=makeFish(id,0,80+gameRnd()*(W-160),SURFACE+40+gameRnd()*60);
  G.fish.push(f); discover(id);
  G.parts.push({x:f.x,y:f.y,vx:0,vy:0,life:0.6,t:0,col:'#9ff0e0'});
  burst(f.x,f.y,10,'#9ff0e0');
  recalcOxygen(); save();
}
function dropFood(x,y){
  var f=FOODS[G.foodIdx];
  if(f.cost>0){
    if(G.pearls<f.cost){ toast('NOT ENOUGH PEARLS'); sfx('nope'); return; }
    addPearls(-f.cost);
  }
  for(var i=0;i<4;i++){
    G.pellets.push({x:x+(gameRnd()-0.5)*26,y:y+(gameRnd()-0.5)*14,vy:14+gameRnd()*10,food:f.id,axis:f.axis,taken:false});
  }
  if(f.axis) questEvent('special',1);
  G.stats.fed=(G.stats.fed||0)+1;
  sfx('feed');
}
function update(dt){
  G.t+=dt; G.frames++;
  musicTick();
  tipTick(dt);
  var i,f;

  if(G.event){
    G.event.t-=dt;
    if(G.event.t<=0){ G.event=null; G.timeScale=1; }
  }
  if(G.toast){ G.toast.t-=dt; if(G.toast.t<=0) G.toast=null; }
  if(G.spawnTimer>0){ G.spawnTimer=Math.max(0,G.spawnTimer-dt); }

  /* pellets sink */
  for(i=G.pellets.length-1;i>=0;i--){
    var p=G.pellets[i];
    p.y+=p.vy*dt; p.x+=Math.sin(G.t*2+p.y*0.05)*6*dt;
    if(p.y>FLOOR-4 || p.taken) G.pellets.splice(i,1);
  }

  /* fish */
  var pending=[];
  for(i=0;i<G.fish.length;i++){
    f=G.fish[i];
    var sp=SPECIES[f.sp];
    if(f.flash>0) f.flash-=dt;

    if(f.held) continue;

    f.hunger=Math.min(1,f.hunger+dt*0.022);

    /* seek food */
    var target=null, bd=1e9;
    for(var j=0;j<G.pellets.length;j++){
      var q=G.pellets[j];
      var d2=(q.x-f.x)*(q.x-f.x)+(q.y-f.y)*(q.y-f.y);
      if(d2<bd && d2<230*230){ bd=d2; target=q; }
    }
    if(target){
      f.tx=target.x; f.ty=target.y;
      if(bd<12*12){
        target.taken=true;
        f.hunger=Math.max(0,f.hunger-0.34);
        f.age=Math.min(1,f.age+(0.10+(target.axis?0.06:0))*(G.stagnant?0.5:1));
        if(target.axis) f.diet[target.axis]=Math.min(100,f.diet[target.axis]+2.5);
        burst(target.x,target.y,3,'#cfe9d8');
      }
    } else if(f.ready && f.mate){
      f.tx=f.mate.x; f.ty=f.mate.y;       // courtship beats wandering
    } else {
      f.retarget-=dt;
      f.homeX += (gameRnd()-0.5)*14*dt;   // the patch itself drifts, slowly
      f.homeY += (gameRnd()-0.5)*8*dt;
      f.homeX = Math.max(70,Math.min(W-70,f.homeX));
      f.homeY = Math.max(SURFACE+50,Math.min(FLOOR-40,f.homeY));
      if((Math.abs(f.tx-f.x)<26 && Math.abs(f.ty-f.y)<26) || f.retarget<=0){
        f.retarget = 3.5+gameRnd()*5;
        f.tx = Math.max(36,Math.min(W-36, f.homeX+(gameRnd()*2-1)*f.roam));
        f.ty = Math.max(SURFACE+26,Math.min(FLOOR-26, f.homeY+(gameRnd()*2-1)*f.roam*0.45));
      }
    }

    /* move */
    var mv = sp.move||'swim';
    var spd = RANK_LEN[f.rank]*0.75 * f.pace
            * (G.stagnant?0.45:1)
            * (sp.axes.indexOf('FLOW')>=0?1.4:1)
            * (f.bottom?0.7:1)
            * (mv==='drift'?0.30:(mv==='hover'?0.42:(mv==='crawl'?0.55:1)));
    var dx=f.tx-f.x, dy=f.ty-f.y, dl=Math.hypot(dx,dy)||1;
    f.vx += (dx/dl*spd - f.vx)*Math.min(1,dt*1.6);
    f.vy += (dy/dl*spd*0.7 - f.vy)*Math.min(1,dt*1.6);
    /* who is my kind, ripe, and closest? Home ranges mean they would never
       bump into each other by chance, so ripe fish go looking. */
    f.mate=null;
    if(f.ready && !f.held && !G.event){
      var mb=1e9;
      for(var m2=0;m2<G.fish.length;m2++){
        var cand=G.fish[m2];
        if(cand===f || !cand.ready || cand.held) continue;
        var mk=mergeKind(f,cand);
        /* AUTO only climbs the ladder. Two ripe MUTANTS are also "same kind and
           rank" - but that pairing is the 10%/90% gamble, and the game must never
           gamble the player's mutants away on its own. */
        if(mk!=='rank' && mk!=='evolve') continue;
        var md=Math.hypot(cand.x-f.x,cand.y-f.y);
        if(md<mb){ mb=md; f.mate=cand; }
      }
      if(f.mate && mb < (RANK_LEN[f.rank]+RANK_LEN[f.mate.rank])*0.24) pending.push([f,f.mate]);
    }

    /* separation */
    var sx=0, sy=0;
    for(var s2=0;s2<G.fish.length;s2++){
      var o=G.fish[s2];
      if(o===f || o===f.mate) continue;   // a courting pair must be allowed to touch
      var ox=f.x-o.x, oy=f.y-o.y, od=Math.hypot(ox,oy);
      var need=(RANK_LEN[f.rank]+RANK_LEN[o.rank])*0.40;
      if(od<need && od>0.001){ sx+=ox/od*(need-od); sy+=oy/od*(need-od); }
      else if(od<=0.001){ sx+=1; sy+=1; }
    }
    f.vx += Math.max(-90,Math.min(90,sx*3))*dt*2;
    f.vy += Math.max(-90,Math.min(90,sy*3))*dt*2;
    f.x+=f.vx*dt; f.y+=f.vy*dt;
    f.bob+=dt*(mv==='drift'?1.2:3);
    f.y+=Math.sin(f.bob)*(mv==='drift'?22:6)*dt;   // jellyfish pulse instead of swim
    if(f.x<26){ f.x=26; f.tx=f.x+80+gameRnd()*160; f.homeX=Math.max(f.homeX,90); f.vx=Math.abs(f.vx); }
    if(f.x>W-26){ f.x=W-26; f.tx=f.x-80-gameRnd()*160; f.homeX=Math.min(f.homeX,W-90); f.vx=-Math.abs(f.vx); }
    if(f.y<SURFACE+16){ f.y=SURFACE+16; f.ty=f.y+60+gameRnd()*90; f.vy=Math.abs(f.vy); }
    if(f.y>FLOOR-10){ f.y=FLOOR-10; f.ty=f.y-60-gameRnd()*90; f.vy=-Math.abs(f.vy); }
    if(Math.abs(f.vx)>3) f.dir = f.vx<0?-1:1;
    f.frame = (f.frame + dt*(4+Math.min(6,Math.abs(f.vx)*0.12))) % FRAMES;

    /* The tank leans on every fish - and old leanings fade.
       Without the decay every axis creeps to 100, argmax becomes a coin toss and the
       player's whole lever dies: you could never re-steer a fish either. */
    for(var ea=0;ea<AXES.length;ea++){
      var eax=AXES[ea];
      f.diet[eax] *= (1 - dt*0.004);                 // half-life about three minutes
      if(G.env[eax]>0) f.diet[eax]=Math.min(100,f.diet[eax]+G.env[eax]*dt*0.10);
    }
    if(!f._ax40){
      for(var eb=0;eb<AXES.length;eb++) if(f.diet[AXES[eb]]>=40){ f._ax40=true; questEvent('axis40',1); break; }
    }

    /* an adult ripens for a minute, then looks for its own kind (RIPEN) */
    if(f.age>=1){
      if(f.ripe>0){ f.ripe-=dt; if(f.ripe<=0){ f.ripe=0; f.ready=true; } }
    } else { f.ripe=RIPEN; f.ready=false; }

    /* grow with time when fed */
    if(f.hunger<0.6) f.age=Math.min(1,f.age+dt*0.02*(G.stagnant?0.5:1));

    /* breed. Base species are prolific; everything else is slow but never zero -
       an evolved fish with no possible partner would be a dead end. */
    if(f.age>=1 && f.hunger<0.45 && !G.stagnant){
      f.breed-=dt*(sp.base?1:0.4);
      if(f.breed<=0){
        f.breed=20+gameRnd()*20;
        if(G.oxyUse+RANK_O2[0] <= G.oxyCap && G.fish.length<44){
          var kid=makeFish(f.sp,0,f.x+(gameRnd()-0.5)*30,f.y+10);
          G.fish.push(kid); recalcOxygen();
          burst(kid.x,kid.y,6,'#bff0ff');
        }
      }
    }
  }

  /* couples that touched this frame - merged after the loop, never during it */
  for(i=0;i<pending.length;i++){
    var pa=pending[i][0], pb=pending[i][1];
    if(G.fish.indexOf(pa)<0 || G.fish.indexOf(pb)<0) continue;
    tryMerge(pa,pb);
  }

  /* particles */
  for(i=G.parts.length-1;i>=0;i--){
    var pt=G.parts[i];
    pt.t+=dt; pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.vy+=12*dt; pt.vx*=0.96;
    if(pt.t>=pt.life) G.parts.splice(i,1);
  }
  /* ambient bubbles */
  if(G.bubbles.length<40 && gameRnd()<dt*8){
    G.bubbles.push({x:20+gameRnd()*(W-40),y:FLOOR-4,r:1+Math.round(gameRnd()*2),v:16+gameRnd()*24,w:gameRnd()*6.28});
  }
  for(i=0;i<G.decor.length;i++){
    if(G.decor[i].id==='vent' && G.bubbles.length<70 && gameRnd()<dt*7){
      G.bubbles.push({x:G.decor[i].x+(gameRnd()-0.5)*8,y:FLOOR-26,r:1+Math.round(gameRnd()*2),v:34+gameRnd()*30,w:gameRnd()*6.28});
    }
  }
  for(i=G.bubbles.length-1;i>=0;i--){
    var b=G.bubbles[i]; b.y-=b.v*dt; b.w+=dt*2;
    if(b.y<SURFACE) G.bubbles.splice(i,1);
  }
  recalcOxygen();
}

function drawScene(c){

    }
  }

  c.drawImage(SPR.caustic[Math.floor(G.t*6)%6],0,FLOOR-30);
  c.globalCompositeOperation='source-over';

  /* far-plane fish, then haze, then near-plane fish */
  var far=[], near=[];
  for(var k=0;k<G.fish.length;k++) (G.fish[k].z<0.75?far:near).push(G.fish[k]);
  far.sort(byY); near.sort(byY);
  for(var a=0;a<far.length;a++) drawFish(c,far[a],0.78);
  c.fillStyle='rgba(28,110,126,0.28)'; c.fillRect(0,SURFACE-8,W,FLOOR-SURFACE+16);
  for(var b=0;b<near.length;b++) drawFish(c,near[b],1);

  /* pellets */
  for(var p2=0;p2<G.pellets.length;p2++){
    var q=G.pellets[p2];
    c.drawImage(SPR.food[q.food], Math.round(q.x-3), Math.round(q.y-3));
  }
  /* particles */
  for(var t=0;t<G.parts.length;t++){
    var pt=G.parts[t];
    var al=1-pt.t/pt.life;
    c.globalAlpha=Math.max(0,al); c.fillStyle=pt.col;
    c.fillRect(pt.x|0,pt.y|0,2,2); c.globalAlpha=1;
  }
  /* bubbles */
  c.globalAlpha=0.5;
  for(var u=0;u<G.bubbles.length;u++){
    var bb=G.bubbles[u];
    circ(c,bb.x+Math.sin(bb.w)*4,bb.y,bb.r,'#bff2ff');
  }
  c.globalAlpha=1;
  /* light */
  c.globalCompositeOperation='lighter';
  c.drawImage(SPR.rays,0,0);
  c.globalCompositeOperation='source-over';
  c.drawImage(SPR.front,0,0);
  c.drawImage(SPR.glass,0,0);
}
function byY(a,b){ return a.y-b.y; }
function drawFish(c,f,alpha){
  var sp=SPECIES[f.sp];
  var arr=fishFrames(f.sp,f.rank);
  var img=arr[Math.floor(f.frame)%FRAMES] || arr[0];
  if(!img) return;
  var scale = (f.age<0.34?0.62:(f.age<1?0.82:1)) * (alpha<1?0.88:1);
  var w=Math.max(2,Math.round(img.width*scale)), h=Math.max(2,Math.round(img.height*scale));
  var x=Math.round(f.x-w/2), y=Math.round(f.y-h/2);
  var gl=fishGlow(f.sp);
  if(gl){
    var g=gl;
    var gw=Math.max(4,Math.round(g.width*(RANK_LEN[f.rank]/RANK_LEN[2])*scale));
    c.globalCompositeOperation='lighter';
    c.globalAlpha=0.6*alpha;
    c.drawImage(g,Math.round(f.x-gw/2),Math.round(f.y-gw/2),gw,gw);
    c.globalAlpha=1; c.globalCompositeOperation='source-over';
  }
  c.globalAlpha=alpha * (G.stagnant?0.7:1);
  if(f.held){ c.globalAlpha=1; }
  f._flip = (f.dir<0);
  if(f._flip){
    c.save(); c.translate(x+w,y); c.scale(-1,1); c.drawImage(img,0,0,w,h); c.restore();
  } else {
    c.drawImage(img,x,y,w,h);
  }
  c.globalAlpha=1;
  /* ready glyph + the minute ticking away */
  if(f.age>=1 && !f.held && alpha>0.9){
    var topY=Math.round(f.y-RANK_LEN[f.rank]*0.42)-12;
    if(f.ready && SPR.ready){
      var rimg2=SPR.ready;
      var bobY=Math.round(Math.sin(G.t*4+f.bob)*2);
      c.globalAlpha=0.85+Math.sin(G.t*5+f.bob)*0.15;
      c.drawImage(rimg2,Math.round(f.x-rimg2.width/2),topY+bobY);
      c.globalAlpha=1;
    } else if(f.ripe>0 && f.ripe<RIPEN){
      var bw=Math.round(RANK_LEN[f.rank]*0.42);
      var fw=Math.round((1-f.ripe/RIPEN)*bw);
      rp(c,Math.round(f.x-bw/2)-1,topY+8,bw+2,3,'rgba(6,32,42,0.55)');
      if(fw>0) rp(c,Math.round(f.x-bw/2),topY+9,fw,1,'rgba(190,240,250,0.75)');
    }
  }

  /* drag target hint: dashed ring in a reserved signal colour, never a soft halo.
     green = safe, orange = risky, red = you may lose both. */
  if(G.drag && G.drag!==f){
    var kind=mergeKind(G.drag,f);
    if(kind){
      var key = kind==='chimera' ? 'chimera' : (kind==='unstable' ? 'unstable' : 'ok');
      var rimg = SPR.ring[key] ? SPR.ring[key][f.rank] : null;
      if(rimg){
        c.globalAlpha=0.6+Math.sin(G.t*9)*0.35;
        c.drawImage(rimg,Math.round(f.x-rimg.width/2),Math.round(f.y-rimg.height/2));
        c.globalAlpha=1;
      }
      var ly=Math.round(f.y-RANK_LEN[f.rank]*0.78)-16;
      if(kind==='chimera')      text(c,'10% OR BOTH DIE',f.x,ly,9,SIGNAL.chimera,'center');
      else if(kind==='unstable')text(c,'25% MUTANT',f.x,ly,8,SIGNAL.unstable,'center');
    }
  }
}

/* ---------- MEMORY ----------
   The tank used to just run and run, and yesterday left no mark. */
function sessionStart(){
  G.sess = { species:speciesCount(), merges:G.stats.merges|0, pearls:G.pearls,
             mutants:G.stats.mutants|0, chimeras:G.stats.chimeras|0,
             fish:G.fish.length, t:Date.now(), found:[] };
}
function sessionEmpty(){
  if(!G.sess) return true;
  return (G.stats.merges|0)===G.sess.merges && speciesCount()===G.sess.species;
}
/* THE RULE: the tank grows and breeds while you are gone, but it NEVER merges.
   A merge is the moment a new creature appears, and that has to happen in front
   of the child - not in an empty room. You come back to a tank full of ripe fish. */
var AWAY_CAP = 8*3600;
function runAway(sec){
  sec=Math.max(0,Math.min(AWAY_CAP,sec));
  if(sec<120) return null;
  var grown=0, hatched=0, i;
  for(i=0;i<G.fish.length;i++){
    var f=G.fish[i];
    if(f.age<1){
      var before=f.age;
      f.age=Math.min(1, f.age + sec*0.006);      // slow: nobody was feeding them
      if(before<1 && f.age>=1){ grown++; f.ripe=RIPEN; }
    }
    if(f.age>=1) f.ripe=Math.max(0, f.ripe - sec);
    f.ready = (f.age>=1 && f.ripe<=0);
    f.hunger=Math.min(1, f.hunger + sec*0.0004);  // and they are hungry when you return
  }
  var adults=G.fish.filter(function(x){ return x.age>=1; });
  var want=Math.floor(adults.length * sec/900);
  for(i=0;i<want && i<10;i++){
    recalcOxygen();
    if(G.oxyUse+RANK_O2[0] > G.oxyCap || G.fish.length>=44) break;
    var par=adults[Math.floor(gameRnd()*adults.length)];
    if(!par) break;
    var kid=makeFish(par.sp,0,80+gameRnd()*(W-160),SURFACE+60+gameRnd()*180);
    G.fish.push(kid); hatched++;
  }
  recalcOxygen();
  if(!grown && !hatched) return null;
  return { grown:grown, hatched:hatched, sec:sec };
}
function awayText(sec){
  var h=Math.floor(sec/3600), m=Math.round((sec%3600)/60);
  if(h>0) return h+'h '+m+'m';
  return m+'m';
}

function nameOf(id){ return SPECIES[id] ? SPECIES[id].name : '?'; }
function foodForAxis(ax){
  for(var i=0;i<FOODS.length;i++) if(FOODS[i].axis===ax) return FOODS[i].name;
  return 'ANY FOOD';
}
/* where does this creature come from? shown even for locked ones - it IS the hint */
function codexHint(id){
  var sp=SPECIES[id], k;
  if(sp.base && !sp.locked) return 'ALREADY IN YOUR TANK';
  if(sp.base && sp.locked){
    for(var ac=0;ac<ACHS.length;ac++) if(ACHS[ac].gives===id) return 'ACHIEVEMENT: '+ACHS[ac].text;
    return 'EARNED WITH AN ACHIEVEMENT';
  }
  if(sp.chimera){
    for(k in CHIMERA) if(CHIMERA[k]===id){
      var pr=k.split('+');
      return nameOf(pr[0])+' L3  +  '+nameOf(pr[1])+' L3   (10%)';
    }
  }
  if(sp.mutantOf) return 'MISMATCHED RANKS OF '+nameOf(sp.mutantOf)+'   (25%)';
  for(k in SPECIES){
    var par=SPECIES[k];
    for(var ax in par.evolveTo){
      if(par.evolveTo[ax]===id) return 'FEED '+foodForAxis(ax)+' TO '+par.name+', THEN L3 + L3';
    }
  }
  return 'UNKNOWN';
}
function wrapText(c,str,x,y,size,col,perLine,lineH){
  var words=str.split(' '), line='', n=0;
  for(var i=0;i<words.length;i++){
    if((line+words[i]).length>perLine){ text(c,line,x,y+n*lineH,size,col); n++; line=''; }
    line+=words[i]+' ';
  }
  if(line.trim()) text(c,line,x,y+n*lineH,size,col);
  return n+1;
}
function speciesTint(sp,known){
  if(!known) return '#456770';
  if(sp.rare==='LEGENDARY') return '#ffd98a';
  if(sp.chimera||sp.mutantOf) return '#f0b8ff';
  return '#9fe8dc';
}

  drawUI(c);
  drawEvent(c);

var view={sx:1,ox:0,oy:0};
function resize(){
  var pad=0;
  var aw=window.innerWidth-pad, ah=window.innerHeight-pad;
  var s=Math.min(aw/W,ah/H);
  var dpr=Math.min(2,window.devicePixelRatio||1);
  cv.style.width=Math.round(W*s)+'px'; cv.style.height=Math.round(H*s)+'px';
  cv.width=Math.round(W*dpr); cv.height=Math.round(H*dpr);
  ctx=cv.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  view.sx=s;
}
function toLogical(e){
  var r=cv.getBoundingClientRect();
  return { x:(e.clientX-r.left)/r.width*W, y:(e.clientY-r.top)/r.height*H };
}
function hit(b,p){ return b && p.x>=b.x && p.x<=b.x+b.w && p.y>=b.y && p.y<=b.y+b.h; }
function fishAt(p){
  for(var i=G.fish.length-1;i>=0;i--){
    var f=G.fish[i];
    var L=RANK_LEN[f.rank];
    if(Math.abs(p.x-f.x)<L*0.6 && Math.abs(p.y-f.y)<Math.max(14,L*0.42)) return f;
  }
  return null;
}
function onDown(e){
  armAudio();                        // iOS: never before the first touch
  var p=toLogical(e);
  G.ptr.x=p.x; G.ptr.y=p.y;
  if(G.scene==='menu'){
    if(G.confirmNew){
      if(hit(BTN.yes,p)){ G.confirmNew=false; newGame(); G.scene='tank'; }
      else if(hit(BTN.no,p)) G.confirmNew=false;
      return;
    }
    if(hit(BTN.cont,p)){ G.scene='tank'; sessionStart(); save(); }
    else if(hit(BTN.newg,p)) G.confirmNew=true;
    else if(hit(BTN.board,p)){ G.scene='board'; lbSubmit(); lbFetch(); }
    return;
  }
  if(G.scene==='summary'){
    if(hit(BTN.sumOk,p)){ G.scene='menu'; sessionStart(); save(); }
    return;
  }
  if(G.scene==='board'){
    if(hit(BTN.back,p)) G.scene='menu';
    else if(hit(BTN.week,p)) LB.tab='week';
    else if(hit(BTN.all,p)) LB.tab='all';
    else if(hit(BTN.refresh,p)) lbFetch();
    return;
  }
  if(G.scene==='codex'){
    if(G.codexSel){ if(hit(BTN.back,p)) G.codexSel=null; return; }
    if(hit(BTN.back,p)){ G.scene='tank'; return; }
    for(var ci=0;ci<SPECIES_ORDER.length;ci++){
      if(hit(codexCell(ci),p)){ G.codexSel=SPECIES_ORDER[ci]; return; }
    }
    return;
  }
  if(G.event) return;
  if(dismissTip()) return;
  /* food tray */
  if(G.feedOpen){
    var ty=H-58-FOODS.length*30-8;
    for(var i=0;i<FOODS.length;i++){
      if(p.x>16 && p.x<256 && p.y>ty+4+i*30 && p.y<ty+30+i*30){ G.foodIdx=i; G.feedOpen=false; return; }
    }
  }
  if(G.buildOpen){
    for(var vj=0;vj<BIOMES.length;vj++){
      if(hit(BTN['bio'+vj],p)){ if(BIOMES[vj].id!==G.biome) setBiome(BIOMES[vj].id); return; }
    }
    var bty=H-58-DECOR.length*30-52;
    for(var bj=0;bj<DECOR.length;bj++){
      if(p.x>120 && p.x<540 && p.y>bty+48+bj*30 && p.y<bty+74+bj*30){ G.buildIdx=bj; return; }
    }
  }
  if(G.away){ if(hit(BTN.awayOk,p) || true){ G.away=null; } return; }
  if(hit(BTN.mute,p)){ audioMute(!AU.muted); return; }
  if(hit(BTN.menu,p)){ G.scene = sessionEmpty() ? 'menu' : 'summary'; G.feedOpen=G.buildOpen=G.questsOpen=false; save(); lbSubmit(); return; }
  if(hit(BTN.feed,p)){ G.feedOpen=!G.feedOpen; G.buildOpen=false; G.questsOpen=false; return; }
  if(hit(BTN.build,p)){ G.buildOpen=!G.buildOpen; G.feedOpen=false; G.questsOpen=false; return; }
  if(hit(BTN.quests,p)){ G.questsOpen=!G.questsOpen; G.feedOpen=false; G.buildOpen=false; return; }
  if(hit(BTN.life,p)){
    if(tankFull()) toast('TANK IS FULL - MERGE SOME FISH FIRST');
    else if(G.spawnTimer<=0){ spawnFry(); G.spawnTimer=SPAWN_COOLDOWN; }
    else toast('EGG NOT READY');
    return;
  }
  if(hit(BTN.speed,p)){ G.speed = G.speed===1?2:(G.speed===2?4:1); return; }
  if(hit(BTN.codex,p)){ G.scene='codex'; G.codexSel=null; return; }
  if(p.y>H-64 || p.y<40) return;
  if(G.buildOpen){
    var ex=decorAt(p.x);
    if(ex>=0 && p.y>FLOOR-140) removeDecor(ex);
    else placeDecor(p.x);
    return;
  }
  G.feedOpen=false; G.questsOpen=false;
  var f=fishAt(p);
  if(f && f.age>=1){ G.drag=f; f.held=true; G.dragOff.x=f.x-p.x; G.dragOff.y=f.y-p.y; }
  else dropFood(p.x,p.y);
}
function onMove(e){
  if(!G.drag) return;
  var p=toLogical(e);
  G.ptr.x=p.x; G.ptr.y=p.y;
  G.drag.x=Math.max(24,Math.min(W-24,p.x+G.dragOff.x));
  G.drag.y=Math.max(SURFACE+14,Math.min(FLOOR-8,p.y+G.dragOff.y));
  G.drag.vx=0; G.drag.vy=0;
}
function onUp(){
  if(!G.drag) return;
  var d=G.drag; d.held=false; G.drag=null;
  if(G.ptr.y>H-64){ releaseFish(d); return; }      // dropped on the bar = let it go
  var best=null,bd=1e9;
  for(var i=0;i<G.fish.length;i++){
    var f=G.fish[i];
    if(f===d) continue;
    var dd=Math.hypot(f.x-d.x,f.y-d.y);
    if(dd<bd){ bd=dd; best=f; }
  }
  if(best && bd<52){ if(!tryMerge(d,best)) toast('THEY MUST BE THE SAME KIND, BOTH ADULT'); }
}

function newGame(){
  G.pearls=60; G.discovered={}; G.unlocked={}; G.achs={};
  G.stats={merges:0,mutants:0,chimeras:0,released:0,fed:0};
  G.tips={}; G.tip=null; G.tipGap=0;
  G.fish=[]; G.decor=[]; G.quests=[]; G.pellets=[]; G.parts=[]; G.bubbles=[];
  G.biome='pond'; G.biomesOwned={pond:true};
  G.event=null; G.timeScale=1; G.spawnTimer=0; G.codexSel=null; G.speed=1;
  G.sess=null; G.away=null;
  firstFish(); fillQuests(); recalcEnv(); recalcOxygen();
  AU.bpm=biomeDef('pond').bpm; SC=biomeDef('pond').scale;
  bakeScene(); save();
}
function firstFish(){
  for(var i=0;i<BASE_IDS.length;i++){
    for(var k=0;k<3;k++){
      var f=makeFish(BASE_IDS[i],0,110+i*210+k*36,120+gameRnd()*260);
      f.age = k<2 ? 1 : 0.4;   // two adults of each kind: a merge is possible immediately
      G.fish.push(f);
    }
    discover(BASE_IDS[i]);
  }
  G.pearls=60;
  recalcOxygen();
}
var lastT=0;
function frame(ts){
  try{
    if(!lastT) lastT=ts;
    var dt=Math.min(0.05,(ts-lastT)/1000); lastT=ts;
    var steps = (G.scene==='tank'? G.speed:1);
    var sdt=dt*G.timeScale;
    for(var i=0;i<steps;i++) update(sdt);
    render();
  }catch(err){
    if(typeof console!=='undefined') console.error('loop error',err);
  }
  requestAnimationFrame(frame);
}
function boot(){
  bakeAll();
  var had=load();
  if(!had || !G.fish.length){ newGame(); }
  fillQuests(); recalcEnv(); recalcOxygen(); checkAchs();
  if(had && G._savedAt) G.away = runAway((Date.now()-G._savedAt)/1000);
  sessionStart();
  AU.bpm=biome().bpm; SC=biome().scale;
  if(G.biome!=='pond') bakeScene();
  if(LB_URL) lbFetch();
  resize();
  window.addEventListener('resize',resize);
  cv.addEventListener('pointerdown',onDown);
  cv.addEventListener('pointermove',onMove);
  cv.addEventListener('pointerup',onUp);

/* ---------- PWA ----------
   The service worker is skipped inside sandboxes (itch.io) and on localhost:
   there it only fights the host. index.html is network-first inside sw.js,
   otherwise an update never reaches a phone that already has the app. */
try{
  var host = (window.location && window.location.hostname) || '';
  var proto = (window.location && window.location.protocol) || '';
  /* A service worker must not run inside a sandbox. itch.io does NOT serve from
     itch.io - it serves from a CDN like v6p9d9t4.ssl.hwcdn.net, inside an iframe.
     Checking the hostname alone would have missed it, so the iframe test is the
     one that actually does the work. */
  var framed = false;
  try{ framed = (window.self !== window.top); }catch(err){ framed = true; }
  var USE_SW = proto==='https:' && !framed &&
               !/itch|hwcdn|itch\.zone|localhost|127\.0\.0\.1/.test(host);
  if(USE_SW && typeof navigator!=='undefined' && navigator.serviceWorker){
    window.addEventListener('load',function(){
      navigator.serviceWorker.register('./sw.js').catch(function(){});
    });
  }
}catch(e){}
