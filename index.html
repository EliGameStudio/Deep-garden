<div id="wrap"><canvas id="cv"></canvas></div>
<div id="nameOv">
  <h1>DEEP GARDEN<br>WHO TENDS THIS TANK?</h1>
  <input id="nameIn" maxlength="14" placeholder="YOUR NAME">
  <button id="nameOk">START</button>
</div>
<script>
(function(){
'use strict';

/* ============================================================
   DEEP GARDEN — evolution aquarium
   Phase 1: core loop (swim / feed / grow / breed / merge / evolve)
   ============================================================ */

var VERSION = 'v6.5';
var W = 960, H = 540;
var SAVE_KEY = 'deepgarden_save_v1';
var FLOOR = 476;          // substrate top
var SURFACE = 34;         // water surface
var PEARL_CAP = 99999;
var SPAWN_COOLDOWN = 30;  // seconds, NEW LIFE button
var FRAMES = 6;           // swim animation frames
var EVENT_T = 0.75;       // how long a discovery card holds the screen, seconds
var RIPEN = 60;           // seconds an adult needs before it will pair up on its own

/* ---------- 1. PIXEL PRIMITIVES (PIXEL_ART_SPEC §1) ---------- */
function rp(c,x,y,w,h,col){ c.fillStyle=col; c.fillRect(x|0,y|0,Math.max(1,w|0),Math.max(1,h|0)); }
function px(c,x,y,col){ rp(c,x,y,1,1,col); }
function circ(c,cx,cy,r,col){
  cx|=0; cy|=0; r=Math.round(r); if(r<1) return;
  c.fillStyle=col;
  for(var y=-r;y<=r;y++){ var w=Math.floor(Math.sqrt(Math.max(0,r*r-y*y))); c.fillRect(cx-w,cy+y,2*w+1,1); }
}
function ell(c,cx,cy,rx,ry,col){
  cx|=0; cy|=0; rx=Math.round(rx); ry=Math.round(ry); if(rx<1||ry<1) return;
  c.fillStyle=col;
  for(var y=-ry;y<=ry;y++){ var w=Math.floor(rx*Math.sqrt(Math.max(0,1-(y*y)/(ry*ry)))); c.fillRect(cx-w,cy+y,2*w+1,1); }
}
/* wedge: base at (x0,cy) tapering to (x0-len, cy+off) */
function wedge(c,x0,cy,len,off,th0,th1,col){
  len=Math.max(1,Math.round(len));
  for(var i=0;i<=len;i++){
    var t=i/len, y=Math.round(cy+off*t), h=Math.max(1,Math.round(th0+(th1-th0)*t));
    rp(c,x0-i,y-h,1,2*h,col);
  }
}
/* tri: triangular fin/tail */
function tri(c,x0,cy,len,halfEnd,off,col,inflate){
  inflate=inflate||0; len=Math.max(1,Math.round(len));
  for(var i=0;i<=len+inflate;i++){
    var t=Math.min(1,i/len), h=Math.max(1,Math.round(2+halfEnd*t)+inflate), y=Math.round(cy+off*t);
    rp(c,x0-i,y-h,1,2*h,col);
  }
}

/* dome: only the half above the base line - decor is rooted on the floor */
function dome(c,cx,baseY,rx,ry,col){
  cx|=0; baseY|=0; rx=Math.round(rx); ry=Math.round(ry);
  if(rx<1||ry<1) return;
  c.fillStyle=col;
  for(var y=0;y<=ry;y++){
    var w=Math.floor(rx*Math.sqrt(Math.max(0,1-(y*y)/(ry*ry))));
    c.fillRect(cx-w, baseY-y, 2*w+1, 1);
  }
}
/* flatEll: an ellipse whose bottom is cut off at an absolute y.
   A bottom-dweller needs a flat belly - but the belly must be exactly as wide as
   the body is at that height, or it sticks out past the silhouette like a plank. */
function flatEll(c,cx,cy,rx,ry,cutY,col){
  cx|=0; cy|=0; rx=Math.round(rx); ry=Math.round(ry); cutY=Math.round(cutY);
  if(rx<1||ry<1) return;
  c.fillStyle=col;
  for(var y=-ry;y<=ry;y++){
    if(cy+y>cutY) break;
    var w=Math.floor(rx*Math.sqrt(Math.max(0,1-(y*y)/(ry*ry))));
    c.fillRect(cx-w,cy+y,2*w+1,1);
  }
}

/* spike: a triangle growing UP from a base (tri() points sideways) */
function spike(c,cx,baseY,halfW,height,tipDx,col){
  cx|=0; baseY|=0; height=Math.max(1,Math.round(height));
  c.fillStyle=col;
  for(var i=0;i<=height;i++){
    var t=i/height, hw=Math.max(1,Math.round(halfW*(1-t*0.92)));
    c.fillRect(Math.round(cx+tipDx*t)-hw, baseY-i, hw*2+1, 1);
  }
}

/* ---------- 2. SEEDED PRNG (PIXEL_ART_SPEC §2) ---------- */
function mulberry32(a){ return function(){
  a|=0; a=a+0x6D2B79F5|0;
  var t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t;
  return ((t^t>>>14)>>>0)/4294967296;
};}
var gameRnd = mulberry32(0xBEEF01); // gameplay randomness (not graphics)

/* ---------- 3. NOISE (PIXEL_ART_SPEC §5) ---------- */
function makeWaves(rnd,n){
  var w=[];
  for(var i=0;i<n;i++) w.push({amp:1/(i+1),a:0.006+rnd()*0.05,b:0.006+rnd()*0.05,p:rnd()*6.283,q:rnd()*6.283});
  return w;
}
function noise(waves,x,y){
  var s=0,t=0;
  for(var i=0;i<waves.length;i++){ var w=waves[i]; s+=w.amp*Math.sin(x*w.a+w.p)*Math.cos(y*w.b+w.q); t+=w.amp; }
  return s/t; // -1..1
}
function step(v,n){ var i=Math.floor((v*0.5+0.5)*n); return i<0?0:(i>n-1?n-1:i); }

/* ---------- 4. SPRITE BAKERY ---------- */
function makeSprite(w,h,draw){
  var c=document.createElement('canvas');
  c.width=Math.max(1,w|0); c.height=Math.max(1,h|0);
  var x=c.getContext('2d');
  draw(x,c.width,c.height);
  return c;
}

/* ============================================================
   SOUND - WebAudio synthesis, no files (template §5)
   Rules that are not negotiable:
   - AudioContext is created ONLY after the first touch (iOS)
   - start() ALWAYS before stop(), or sound dies on a real device
   - no audio available -> silent fallback, the game never crashes
   ============================================================ */
var AU = { ctx:null, master:null, delay:null, wet:null, muted:false,
           nextStep:0, step:0, bpm:58, breathe:0, dead:false, lastTick:0 };

/* iOS mutes WebAudio when the physical Ring/Silent switch is on - the volume buttons
   do nothing about it. Playing an HTMLAudioElement moves the session to the
   'playback' category, and then WebAudio is heard regardless of the switch.
   The silent wav is built in code: no external asset. */
function unlockSession(){
  try{
    if(AU.el || typeof Blob==='undefined') return;
    var sr=8000, n=Math.round(sr*0.2), buf=new ArrayBuffer(44+n*2), v=new DataView(buf);
    function w(o,str){ for(var i=0;i<str.length;i++) v.setUint8(o+i,str.charCodeAt(i)); }
    w(0,'RIFF'); v.setUint32(4,36+n*2,true); w(8,'WAVE'); w(12,'fmt ');
    v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
    v.setUint32(24,sr,true); v.setUint32(28,sr*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true);
    w(36,'data'); v.setUint32(40,n*2,true);
    var el=document.createElement('audio');
    el.src=URL.createObjectURL(new Blob([buf],{type:'audio/wav'}));
    el.loop=true; el.volume=0.001;
    el.setAttribute('playsinline','');
    el.setAttribute('webkit-playsinline','');
    var pr=el.play();
    if(pr && pr.catch) pr.catch(function(){});
    AU.el=el;
  }catch(e){}
}
function audioReady(){ return !!(AU.ctx && AU.ctx.state==='running'); }
/* A real report from THIS device - so we stop guessing which link is broken. */
function audioReport(){
  var r=[];
  var C = window.AudioContext || window.webkitAudioContext;
  r.push(['WebAudio API', C ? 'present' : 'MISSING']);
  r.push(['prefixed', (window.AudioContext?'std':(window.webkitAudioContext?'webkit-only':'none'))]);
  r.push(['context', AU.ctx ? 'created' : 'not created']);
  r.push(['state', AU.ctx ? AU.ctx.state : '-']);
  r.push(['dead flag', AU.dead ? 'YES' : 'no']);
  r.push(['muted', AU.muted ? 'YES' : 'no']);
  r.push(['master gain', AU.master ? (''+AU.master.gain.value.toFixed(2)) : '-']);
  r.push(['unlock el', AU.el ? (AU.el.paused?'made, paused':'made, playing') : 'not made']);
  var lat = AU.ctx && AU.ctx.baseLatency!==undefined ? AU.ctx.baseLatency : null;
  r.push(['baseLatency', lat===null?'-':lat.toFixed(3)]);
  r.push(['sampleRate', AU.ctx ? (''+AU.ctx.sampleRate) : '-']);
  r.push(['destination', AU.ctx&&AU.ctx.destination ? (''+ (AU.ctx.destination.maxChannelCount||'?') +'ch') : '-']);
  r.push(['notes sent', ''+(AU._notes||0)]);
  var vv=window.visualViewport;
  r.push(['standalone', (window.navigator&&window.navigator.standalone)?'home-screen app':'browser tab']);
  return r;
}
/* a loud, unmissable test tone - a second of a clear sine, bypassing music/mute */
function audioTest(){
  armAudio();
  if(!AU.ctx){ toast('NO AUDIO CONTEXT ON THIS DEVICE'); return; }
  tryResume();
  try{
    var t=AU.ctx.currentTime;
    var g=AU.ctx.createGain(); g.connect(AU.ctx.destination);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.5,t+0.05);   // deliberately loud
    g.gain.exponentialRampToValueAtTime(0.0001,t+1.0);
    var o=AU.ctx.createOscillator(); o.type='sine'; o.frequency.value=440;
    o.connect(g); o.start(t); o.stop(t+1.05);
    G.audioTestAt=Date.now();
    toast('PLAYING A TEST TONE - state: '+AU.ctx.state);
  }catch(e){ toast('TEST TONE FAILED: '+e.message); }
}
function audioInit(){
  if(AU.ctx || AU.dead) return;
  try{
    unlockSession();
    var C = window.AudioContext || window.webkitAudioContext;
    if(!C){ AU.dead=true; return; }
    AU.ctx = new C();
    AU.master = AU.ctx.createGain();
    AU.master.gain.value = AU.muted ? 0 : 0.5;
    AU.master.connect(AU.ctx.destination);
    /* a little space, so the tank does not sound like a phone speaker */
    AU.delay = AU.ctx.createDelay(1.0);
    AU.delay.delayTime.value = 0.42;
    var fb = AU.ctx.createGain(); fb.gain.value = 0.30;
    AU.wet = AU.ctx.createGain(); AU.wet.gain.value = 0.30;
    AU.delay.connect(fb); fb.connect(AU.delay);
    AU.delay.connect(AU.wet); AU.wet.connect(AU.master);
    AU.nextStep = AU.ctx.currentTime + 0.1;
  }catch(e){ AU.ctx=null; AU.dead=true; }
}
function tryResume(){
  if(!AU.ctx || AU.ctx.state==='running') return;
  try{
    var pr=AU.ctx.resume();
    /* the promise tells us if it actually woke; if not, the next gesture tries again */
    if(pr && pr.then) pr.then(function(){}, function(){});
  }catch(e){}
}
/* Any first gesture counts, not just one on the canvas: the name overlay is a DOM
   button, and some browsers do not deliver pointerdown at all. */
function armAudio(){
  audioInit();
  tryResume();                                    // retries every gesture until it sticks
  if(AU.el && AU.el.paused){ try{ var p=AU.el.play(); if(p&&p.catch) p.catch(function(){}); }catch(e){} }
}
function audioMute(m){
  AU.muted=m;
  if(AU.master && AU.ctx){
    try{ AU.master.gain.setTargetAtTime(m?0:0.5, AU.ctx.currentTime, 0.05); }catch(e){}
  }
  save();
}
/* one note = two slightly detuned oscillators through a shared filter (template §5) */
function voice(freq,t,dur,o){
  if(!AU.ctx || AU.muted) return;
  o=o||{};
  try{
    var g=AU.ctx.createGain(), f=AU.ctx.createBiquadFilter();
    f.type='lowpass'; f.frequency.value=o.cut||1400; f.Q.value=o.q||0.6;
    var a=AU.ctx.createOscillator(), b=AU.ctx.createOscillator();
    a.type=o.type||'sine'; b.type=o.type||'sine';
    a.frequency.value=freq; b.frequency.value=freq;
    a.detune.value=-(o.detune===undefined?7:o.detune);
    b.detune.value= (o.detune===undefined?7:o.detune);
    a.connect(f); b.connect(f); f.connect(g);
    g.connect(AU.master);
    if(AU.delay && o.wet!==false) g.connect(AU.delay);
    var att=o.att||0.03, rel=o.rel||0.5, pk=o.gain||0.12;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(pk,t+att);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur+rel);
    a.start(t); b.start(t); AU._notes=(AU._notes||0)+1;   // start BEFORE stop, always
    a.stop(t+dur+rel+0.05); b.stop(t+dur+rel+0.05);
  }catch(e){}
}
/* percussion out of filtered noise */
var NOISEBUF=null;
function noiseBuf(){
  if(NOISEBUF || !AU.ctx) return NOISEBUF;
  try{
    var n=AU.ctx.sampleRate*1.0, b=AU.ctx.createBuffer(1,n,AU.ctx.sampleRate), d=b.getChannelData(0);
    var r=mulberry32(0x5011);
    for(var i=0;i<n;i++) d[i]=r()*2-1;
    NOISEBUF=b;
  }catch(e){}
  return NOISEBUF;
}
function hit(t,dur,cut,gain,type){
  if(!AU.ctx || AU.muted) return;
  var buf=noiseBuf(); if(!buf) return;
  try{
    var src=AU.ctx.createBufferSource(); src.buffer=buf; src.loop=true;
    var f=AU.ctx.createBiquadFilter(); f.type=type||'bandpass'; f.frequency.value=cut; f.Q.value=1.2;
    var g=AU.ctx.createGain();
    src.connect(f); f.connect(g); g.connect(AU.master);
    g.gain.setValueAtTime(gain||0.10,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    src.start(t); src.stop(t+dur+0.02);           // start BEFORE stop
  }catch(e){}
}

/* ---- the tank theme: lydian, slow, layered ---- */
var SC = [0,2,4,6,7,9,11];                        // set from the biome: each place has its own mode AND tempo
function hz(deg,oct){
  var n=SC[((deg%7)+7)%7] + 12*(oct + Math.floor(deg/7) + (G.biome?biomeDef(G.biome).oct:0));
  return 55*Math.pow(2,(n+3)/12);
}
var MEL = [0,2,4,2, 6,4,2,0, 3,5,4,2, 1,0,-2,0];
function musicStep(st,t){
  var bar = Math.floor(st/8) % 8;
  var live = G.fish.length;
  var busy = Math.min(1, live/18);
  var known = speciesCount();

  /* bass: always there */
  if(st%8===0) voice(hz(bar%3===2?3:0,1), t, 1.6, {type:'triangle',gain:0.10,cut:420,rel:0.9});
  /* pad: a held chord every two bars */
  if(st%16===0){
    var root=(bar%4===3)?3:(bar%4===2?4:0);
    voice(hz(root,2), t, 3.2, {type:'sine',gain:0.045,cut:900,att:0.6,rel:1.6});
    voice(hz(root+2,2), t, 3.2, {type:'sine',gain:0.035,cut:900,att:0.8,rel:1.6});
    voice(hz(root+4,2), t, 3.2, {type:'sine',gain:0.03,cut:900,att:1.0,rel:1.6});
  }
  /* melody */
  if(st%2===0){
    var d=MEL[(st/2)%MEL.length];
    voice(hz(d,3), t, 0.5, {type:'sine',gain:0.075,cut:1800,rel:0.7});
    /* a harmony voice a third above once the tank is alive */
    if(busy>0.35) voice(hz(d+2,3), t+0.02, 0.5, {type:'sine',gain:0.032,cut:1500,rel:0.7});
  }
  /* arpeggio when the tank is crowded */
  if(busy>0.55 && st%1===0 && st%8!==0)
    voice(hz((st*3)%7,3), t, 0.14, {type:'triangle',gain:0.028,cut:2400,rel:0.25});
  /* airy shimmer as the codex fills - the reward for progress */
  if(known>8 && st%32===0)
    voice(hz(6,4), t, 2.0, {type:'sine',gain:0.03,cut:4000,att:0.9,rel:1.8});
  /* soft pulse instead of drums: this is a place to relax, not to march */
  if(st%8===0) hit(t,0.25,180,0.05*busy,'lowpass');
  if(busy>0.5 && st%8===4) hit(t,0.10,1800,0.018,'bandpass');
}
function musicTick(){
  if(!AU.ctx || AU.muted) return;
  if(AU.ctx.state!=='running'){ tryResume(); return; }   // wake it, then play next tick
  try{
    var now=AU.ctx.currentTime, spb=60/AU.bpm/2;
    /* run the scheduler at most ~33x/sec no matter the frame rate (ProMotion is 120) */
    if(now - AU.lastTick < 0.03) return;
    AU.lastTick=now;
    if(AU.nextStep < now) AU.nextStep = now + 0.05;
    /* a hard cap so a long stall can never spew a hundred notes at once */
    var guard=0;
    while(AU.nextStep < now + 0.2 && guard++ < 16){
      musicStep(AU.step, AU.nextStep);
      AU.step++; AU.nextStep += spb;
    }
    if(AU.nextStep < now) AU.nextStep = now + spb;   // fell far behind: skip ahead, don't catch up
    AU.breathe += 0.016;
    AU.master.gain.setTargetAtTime((AU.muted?0:0.5)*(0.85+Math.sin(AU.breathe*0.06)*0.15), now, 0.4);
  }catch(e){}
}

/* ---- stingers ---- */
function sfx(kind){
  if(!AU.ctx || AU.muted) return;
  var t=AU.ctx.currentTime, i;
  if(kind==='feed')        voice(hz(4,4),t,0.05,{type:'sine',gain:0.05,cut:3000,rel:0.10,wet:false});
  else if(kind==='merge'){ voice(hz(0,3),t,0.10,{type:'triangle',gain:0.09,cut:2200,rel:0.2});
                           voice(hz(4,3),t+0.09,0.14,{type:'triangle',gain:0.09,cut:2600,rel:0.3}); }
  else if(kind==='rank'){  for(i=0;i<3;i++) voice(hz(i*2,3),t+i*0.07,0.12,{type:'sine',gain:0.08,cut:2600,rel:0.3}); }
  else if(kind==='evolve'){for(i=0;i<5;i++) voice(hz(i*2,3),t+i*0.09,0.22,{type:'sine',gain:0.09,cut:3200,rel:0.6}); }
  else if(kind==='discover'){                        // triumphant passage
    var d=[0,2,4,6,7];
    for(i=0;i<d.length;i++) voice(hz(d[i],3),t+i*0.10,0.30,{type:'triangle',gain:0.10,cut:3400,rel:0.8});
    voice(hz(7,4),t+0.5,0.9,{type:'sine',gain:0.06,cut:4000,att:0.1,rel:1.2});
    hit(t,0.4,120,0.10,'lowpass');
  }
  else if(kind==='mutant'){                          // uneasy: a tritone, then a low thud
    voice(hz(0,2),t,0.7,{type:'sawtooth',gain:0.05,cut:600,rel:0.8});
    voice(hz(3,2),t,0.7,{type:'sawtooth',gain:0.05,cut:600,rel:0.8});
    voice(hz(3,4),t+0.15,0.3,{type:'triangle',gain:0.05,cut:3000,rel:0.6});
    hit(t,0.5,90,0.14,'lowpass');
  }
  else if(kind==='chimera'){                         // the big one
    for(i=0;i<7;i++) voice(hz(i,3),t+i*0.07,0.5,{type:'triangle',gain:0.09,cut:4000,rel:1.2});
    voice(hz(0,4),t+0.6,1.6,{type:'sine',gain:0.08,cut:5000,att:0.1,rel:2.0});
    hit(t,0.7,110,0.16,'lowpass'); hit(t+0.6,0.5,2600,0.05,'bandpass');
  }
  else if(kind==='fail'){                            // tense descending chord + a roll
    for(i=0;i<4;i++) voice(hz(6-i*2,2),t+i*0.11,0.4,{type:'sawtooth',gain:0.05,cut:700,rel:0.7});
    for(i=0;i<6;i++) hit(t+i*0.05,0.06,320,0.05,'lowpass');
  }
  else if(kind==='quest')  { for(i=0;i<3;i++) voice(hz(4+i*2,3),t+i*0.08,0.2,{type:'sine',gain:0.07,cut:3000,rel:0.5}); }

/* ---------- CLOUD LEADERBOARD (Firebase REST) ----------
   Paste your database URL below. Use a NEW node for this game so it never mixes
   with an older one. Leave it empty and the game simply runs offline. */
var LB_URL = 'https://deepgarden-b2709-default-rtdb.europe-west1.firebasedatabase.app/scores_aqua1.json';
var LB = { status:'Offline', rows:[], tab:'all', t:0, sending:false };
function lbSubmit(){
  if(!LB_URL || !G.name) return;
  LB.status='Syncing...';
  var body = JSON.stringify({
    name:String(G.name).slice(0,24),
    species:speciesCount(),
    merges:G.stats.merges|0,
    ts:Date.now()
  });
  try{
    fetch(LB_URL,{method:'POST',cache:'no-store',headers:{'Content-Type':'application/json'},body:body})
      .then(function(){ LB.status='Synced'; lbFetch(); })
      .catch(function(){ LB.status='Offline'; });
  }catch(e){ LB.status='Offline'; }
}
function lbFetch(){
  if(!LB_URL){ LB.status='Not set up'; return; }
  LB.status='Syncing...';
  try{
    fetch(LB_URL,{cache:'no-store'})
      .then(function(r){ return r.json(); })
      .then(function(j){
        var rows=[], k;
        for(k in j){
          var r=j[k];
          if(!r || typeof r!=='object') continue;
          rows.push({ name:String(r.name||'?').slice(0,24), species:num(r.species,0,0,999),
                      merges:num(r.merges,0,0,999999), ts:num(r.ts,0,0,1e15) });
        }
        LB.rows=rows;
        LB.status='Synced';
      })
      .catch(function(){ LB.status='Offline'; });
  }catch(e){ LB.status='Offline'; }
}
function lbVisible(){
  var wk=Date.now()-7*24*3600*1000;
  var rows=LB.rows.filter(function(x){ return LB.tab==='all' || x.ts>=wk; });
  var best={}, i;                                  // one row per player: their best run, not their last
  for(i=0;i<rows.length;i++){
    var e=best[rows[i].name];
    if(!e || rows[i].species>e.species || (rows[i].species===e.species && rows[i].merges>e.merges)) best[rows[i].name]=rows[i];
  }
  var out=Object.keys(best).map(function(n){ return best[n]; });
  out.sort(function(a,b){ return (b.species-a.species) || (b.merges-a.merges); });
  return out.slice(0,10);
}

function badgeStat(b){
  if(b.stat==='discovered') return speciesCount();
  if(b.stat==='evolved'){ var n=0; for(var k in G.discovered){ var sp=SPECIES[k]; if(sp && !sp.base && !sp.mutantOf && !sp.chimera) n++; } return n; }
  if(b.stat==='chimeraSpecies'){ var cc=0; for(var k2 in G.discovered){ if(SPECIES[k2] && SPECIES[k2].chimera) cc++; } return cc; }
  if(b.stat==='plaques'){ var pc=0; for(var pi=0;pi<PATRON.length;pi++) if(G.patron[PATRON[pi].id]) pc++; return pc; }
  return G.stats[b.stat]||0;
}

function tipTick(dt){
  if(G.scene!=='tank' || G.event) return;
  if(G.tip){ G.tip.t-=dt; if(G.tip.t<=0){ G.tips[G.tip.id]=true; G.tip=null; G.tipGap=3.5; save(); } return; }
  if(G.tipGap>0){ G.tipGap-=dt; return; }
  for(var i=0;i<TIPS.length;i++){
    var t=TIPS[i];
    if(G.tips[t.id]) continue;
    var ok=false;
    try{ ok=t.when(); }catch(e){ ok=false; }
    if(ok){ G.tip={ id:t.id, t:9 }; return; }
  }
}

  if(!G.tip) return false;

}

function creatureExtent(sp){
  var d=bodyDims(sp,1), rx=d[0], ry=d[1];
  var up=ry+0.10, dn=ry+0.24, lf=rx+0.06, rt=rx+0.10;
  if(sp.dorsal==='sail')      up=Math.max(up, ry+0.38*1.52+0.05);
  else if(sp.dorsal==='small')up=Math.max(up, ry+0.24);
  if(sp.tail==='veil')      lf=Math.max(lf, rx+0.44);
  else if(sp.tail==='lobe') lf=Math.max(lf, rx+0.24);
  else                      lf=Math.max(lf, rx+0.34);
  if(sp.tail==='fork'){ up=Math.max(up, ry+0.30); dn=Math.max(dn, ry+0.30); }
  if(sp.tail==='veil'){ up=Math.max(up, ry+0.28); dn=Math.max(dn, ry+0.28); }
  if(sp.tail==='fan'){  up=Math.max(up, ry+0.22); dn=Math.max(dn, ry+0.22); }
  var EX=extrasOf(sp);
  if(EX.indexOf('tendrils')>=0) lf=Math.max(lf, rx+0.46);
  if(EX.indexOf('whiskers')>=0) rt=Math.max(rt, rx+0.36);
  if(EX.indexOf('spines')>=0||EX.indexOf('crystal')>=0||EX.indexOf('moss')>=0) up=Math.max(up, ry+0.26);
  if(EX.indexOf('crown')>=0){ rt=Math.max(rt, rx+0.16); up=Math.max(up, ry+0.20); dn=Math.max(dn, ry+0.20); }
  if(EX.indexOf('orb')>=0){
    rt=Math.max(rt, rx*1.15+0.08); lf=Math.max(lf, rx*1.15+0.08);
    up=Math.max(up, ry*1.5+0.08);  dn=Math.max(dn, ry*1.5+0.08);
  }
  if(sp.body==='snail'){ up=Math.max(up, ry+0.30); rt=Math.max(rt, rx+0.30); dn=Math.max(dn, ry+0.14); }
  if(sp.body==='bell'){ dn=Math.max(dn, ry+0.62); lf=Math.max(lf, rx+0.16); rt=Math.max(rt, rx+0.16); }
  if(sp.body==='horse'){ up=Math.max(up, ry+0.26); rt=Math.max(rt, rx+0.34); lf=Math.max(lf, rx+0.40); dn=Math.max(dn, ry+0.20); }
  if(sp.body==='shrimp'){ rt=Math.max(rt, rx+0.46); dn=Math.max(dn, ry+0.32); up=Math.max(up, ry+0.20); }
  dn=Math.max(dn, ry+0.26); // pectoral fin
  return { hx:Math.max(lf,rt), hy:Math.max(up,dn) };
}
function creatureCanvasSize(sp,rank){
  var L=RANK_LEN[rank], e=creatureExtent(sp);
  var pad = rank>=3 ? 26 : 8;        // an elder wears a crown and trails filaments
  return { w: Math.round(e.hx*2*L)+pad, h: Math.round(e.hy*2*L)+pad };
}
function extrasOf(sp){
  if(Array.isArray(sp.extra)) return sp.extra;
  return (sp.extra && sp.extra!=='none') ? [sp.extra] : [];
}
function bodyDims(sp,L){
  switch(sp.body){
    case 'shrimp': return [L*0.38,L*0.22];
    case 'snail':  return [L*0.34,L*0.24];
    case 'bell':   return [L*0.30,L*0.28];
    case 'horse':  return [L*0.17,L*0.40];
    case 'slim':   return [L*0.46,L*0.17];
    case 'flat':   return [L*0.44,L*0.21];
    case 'disc':   return [L*0.32,L*0.36];
    case 'blob':   return [L*0.34,L*0.33];
    default:       return [L*0.42,L*0.26];
  }
}
/* Rays inside a fin: thin lines fanning from the fin root to its edge. They stay
   strictly inside the triangle already drawn, so the sprite bbox never grows. */
function finRays(c,xr,yr,len,half,off,col,cnt,dir){
  dir = dir||-1;                       // -1 = fan to the left (tail), +1 = to the right
  len = Math.max(2,Math.round(len)); cnt=Math.max(2,cnt|0);
  for(var r=0;r<cnt;r++){
    var t=(cnt===1)?0.5:r/(cnt-1);
    var dy=Math.round((t*2-1)*half+off);
    var steps=Math.round(len*0.80), prevY=null;
    for(var s2=1;s2<steps;s2++){
      var u=s2/steps;
      var yNow=Math.round(yr+dy*u), xNow=Math.round(xr+dir*s2);
      /* fill the vertical gap to the previous step: a bare diagonal of single pixels
         reads as a dotted line, not a fin ray */
      if(prevY===null) prevY=yNow;
      var y1=Math.min(prevY,yNow), y2=Math.max(prevY,yNow);
      rp(c, xNow, y1, 1, (y2-y1)+1, col);
      prevY=yNow;
    }
  }
}

function drawCreature(c,sp,rank,frame){
  var L = RANK_LEN[rank];
  var sz = creatureCanvasSize(sp,rank);
  var cx = sz.w>>1, cy = sz.h>>1;
  var P = sp.pal;
  var rnd = mulberry32(sp.seed*31 + rank*7 + 3);
  var d = bodyDims(sp,L), rx = d[0], ry = d[1];
  var ph = frame/FRAMES*Math.PI*2;
  var sway = Math.sin(ph);
  var flex = Math.round(Math.cos(ph)*Math.max(1,L*0.02));
  var x0 = Math.round(cx-rx);   // tail root
  var detail = rank;            // higher rank = richer

  /* Extra shading steps derived from this species' own palette. Shadows cool,
     lights warm - a flat darkening of one hex looks dead (PIXEL_ART_SPEC 15.3). */
  var SH = {
    edge : coolHex(P[0],0.22),
    deep : coolHex(mixHex(P[0],P[1],0.40),0.30),
    base : P[1],
    lit  : P[2],
    hi   : warmHex(P[3],0.22),
    acc  : P[4]
  };
  /* A FIXED 8-step ramp, built once per sprite. Every detail below picks a step from
     it instead of blending freely - a limited palette is what keeps this pixel art
     and not a smudge (PIXEL_ART_SPEC 15.3). */
  var RAMP = [
    SH.edge,
    mixHex(SH.edge,SH.base,0.42),
    mixHex(SH.edge,SH.base,0.74),
    SH.base,
    mixHex(SH.base,SH.lit,0.50),
    SH.lit,
    mixHex(SH.lit,SH.hi,0.50),
    SH.hi
  ];
  function ramp(i){ return RAMP[i<0?0:(i>7?7:i)]; }

  /* The "expensive" pass: counter-shading, scales, gill cover. Everything is clipped
     to the body ellipse, so the sprite never grows past its baked canvas. */
  function bodyDetail(bcx,bcy,brx,bry){
    var yy,xx,w2;
    /* 1. counter-shading - dark back, pale belly, gentle so volume survives */
    for(yy=-bry; yy<=bry; yy++){
      w2 = Math.floor(brx*Math.sqrt(Math.max(0,1-(yy*yy)/(bry*bry))));
      if(w2<1) continue;
      var f=(yy+bry)/(2*bry);
      if(f<0.11)      rp(c,bcx-w2,bcy+yy,2*w2+1,1, ramp(3));
      else if(f>0.80) rp(c,bcx-w2,bcy+yy,2*w2+1,1, ramp(6));
    }
    /* 2. scale rows. Each scale takes its step from WHERE IT SITS relative to the
          scene light (top-left), so texture never flattens the volume. */
    if(rank>=1){
      var sw=Math.max(3,Math.round(L*0.040)), sh=Math.max(2,Math.round(L*0.032)), row=0;
      for(yy=-bry+sh; yy<bry-sh; yy+=sh, row++){
        w2 = Math.floor(brx*Math.sqrt(Math.max(0,1-(yy*yy)/(bry*bry))));
        if(w2<sw+2) continue;
        var offs=(row%2)?Math.round(sw/2):0;
        for(xx=-w2+2+offs; xx<w2-sw-1; xx+=sw){
          var t2 = 1 - ((xx/brx)*0.5 + (yy/bry)*0.5 + 1)/2;   // 1 = up-left, 0 = down-right
          var lvl = t2>0.74 ? 7 : (t2>0.50 ? 6 : (t2>0.28 ? 5 : 4));
          var v = rnd();
          rp(c, bcx+xx, bcy+yy,   Math.max(1,sw-1), 1, ramp(lvl - (v<0.28?2:1)));
          rp(c, bcx+xx, bcy+yy-1, Math.max(1,sw-2), 1, ramp(lvl));
        }
      }
    }
    /* 3. specular sheen up-left, dithered at the rim so there is no plastic edge */
    var hrx=Math.round(brx*0.48), hry=Math.round(bry*0.44);
    var hcx=bcx-Math.round(brx*0.18), hcy=bcy-Math.round(bry*0.34);
    /* squared comparisons only - no sqrt per pixel, so the bake stays cheap */
    for(yy=-hry; yy<=hry; yy++){
      var ny=(yy*yy)/(hry*hry);
      var hw=Math.floor(hrx*Math.sqrt(Math.max(0,1-ny)));
      var yAbs=hcy+yy-bcy;
      var bw=Math.floor(brx*Math.sqrt(Math.max(0,1-(yAbs*yAbs)/(bry*bry))));
      for(xx=-hw; xx<=hw; xx++){
        if(Math.abs(hcx+xx-bcx)>bw-1) continue;
        var e2=(xx*xx)/(hrx*hrx)+ny;                  // squared edge distance
        if(e2>0.49 && rnd()<0.55) continue;           // 0.70^2
        px(c, hcx+xx, hcy+yy, ramp(e2>0.3025?6:7));   // 0.55^2
      }
    }
    /* 4. lateral line - the sensory seam every real fish has, dotted along the flank */
    var ly2=Math.round(bry*0.06);
    for(xx=-Math.round(brx*0.72); xx<Math.round(brx*0.80); xx+=3){
      var wl=Math.floor(brx*Math.sqrt(Math.max(0,1-(ly2*ly2)/(bry*bry))));
      if(Math.abs(xx)>wl-2) continue;
      px(c, bcx+xx, bcy+ly2 - Math.round((xx*xx)/(brx*brx)*bry*0.22), ramp(1));
    }
    /* 5. dorsal ridge: a dark spine along the very top */
    for(xx=-Math.round(brx*0.86); xx<Math.round(brx*0.86); xx++){
      var tp=Math.round(bry*Math.sqrt(Math.max(0,1-(xx*xx)/(brx*brx))));
      if(tp<2) continue;
      px(c, bcx+xx, bcy-tp+1, ramp(2));
    }
    /* 6. rim light: the scene light comes from the top-left, so the upper-left edge
          catches a one-pixel warm highlight (template 4: contre-jour on the hero) */
    for(xx=-Math.round(brx*0.92); xx<0; xx++){
      var tp2=Math.round(bry*Math.sqrt(Math.max(0,1-(xx*xx)/(brx*brx))));
      if(tp2<2) continue;
      px(c, bcx+xx, bcy-tp2+2, ramp(7));
    }
    /* 7. jaw line and nostril - small, but they turn a blob into a head */
    var jx=bcx+Math.round(brx*0.70), jy=bcy+Math.round(bry*0.16);
    rp(c, jx, jy, Math.max(2,Math.round(brx*0.18)), 1, ramp(2));
    px(c, bcx+Math.round(brx*0.62), bcy-Math.round(bry*0.10), ramp(1));
    /* --- placeholder marker --- */
  /* 3. gill cover: a curved seam behind the head with a lit edge */
    var gx=bcx+Math.round(brx*0.44), gh=Math.round(bry*0.72);
    for(yy=-gh; yy<=gh; yy++){
      var curve=Math.round((yy*yy)/(bry*bry)*brx*0.14);
      px(c, gx-curve,   bcy+yy, ramp(2));
      px(c, gx-curve+1, bcy+yy, ramp(6));
    }
  }

  /* The same treatment for the four anatomies that are not fish: their own seams,
     ribs and rings, plus one shared light source so nothing looks bolted on. */
  function oddDetail(kind,bcx,bcy,brx,bry){
    var i3,j3,rr3;
    if(kind==='bell'){
      /* radial ribs down the dome + a bright leading rim */
      for(i3=-3;i3<=3;i3++){
        var rxp=bcx+Math.round(i3*brx*0.26);
        for(j3=0;j3<Math.round(bry*1.5);j3++){
          var wj=Math.round(brx*Math.sqrt(Math.max(0,1-Math.pow(j3/(bry*1.6),2))));
          if(Math.abs(rxp-bcx)>wj-1) break;
          if(j3%2===0) px(c,rxp,bcy+j3-Math.round(bry*0.2), ramp(i3<0?6:2));
        }
      }
      for(i3=-Math.round(brx*0.9);i3<0;i3++){
        var tj=Math.round(bry*Math.sqrt(Math.max(0,1-(i3*i3)/(brx*brx))));
        px(c,bcx+i3,bcy-tj+Math.round(bry*0.2), ramp(7));
      }
    } else if(kind==='snail'){
      /* growth rings on the shell + a wet sheen */
      var scx3=bcx-Math.round(brx*0.15), scy3=bcy-Math.round(bry*0.35), sr3=Math.round(bry*1.05);
      for(rr3=Math.round(sr3*0.30); rr3<sr3; rr3+=Math.max(2,Math.round(sr3*0.16))){
        for(var a3=0;a3<64;a3++){
          var an3=a3/64*6.283;
          px(c, scx3+Math.round(Math.cos(an3)*rr3), scy3+Math.round(Math.sin(an3)*rr3),
             (Math.cos(an3)+Math.sin(an3)<0)?ramp(6):ramp(2));
        }
      }
      for(i3=-Math.round(sr3*0.5);i3<Math.round(sr3*0.1);i3++){
        var yj=scy3-Math.round(Math.sqrt(Math.max(0,sr3*sr3-i3*i3))*0.92);
        px(c,scx3+i3,yj,ramp(7));
      }
    } else if(kind==='horse'){
      /* bony rings all the way down, a ridge of spines on the back, and a lit front */
      var seg3=Math.round(bry*0.34), half3=Math.max(2,Math.round(seg3/2));
      for(i3=-4;i3<=4;i3++){
        var t3=i3/2;
        var sy3=bcy+Math.round(t3*seg3), sx3=bcx+Math.round(Math.sin(t3*0.7)*brx*0.5);
        rp(c,sx3-brx+1,sy3,Math.max(2,brx*2-2),1, ramp(2));          // ring seam
        rp(c,sx3-brx+1,sy3-1,Math.max(1,brx),1, ramp(6));            // lit edge of the ring
        px(c,sx3-brx+1,sy3-2, ramp(7));                              // catch-light on the left
        /* a spine on the outer (right) edge of every other ring */
        if(i3%2===0){
          var spx3=sx3+brx-1;
          for(j3=0;j3<Math.max(2,Math.round(brx*0.5));j3++){
            px(c,spx3+j3,sy3-j3,   ramp(1));
            px(c,spx3+j3,sy3-j3+1, ramp(2));   // second pixel keeps the spine solid, not dotted
          }
        }
        /* belly plates on the inner edge */
        px(c,sx3-brx+2,sy3+Math.round(half3*0.5), ramp(5));
      }
    } else if(kind==='shrimp'){
      /* carapace plate seams, each with a lit leading edge */
      for(i3=-3;i3<=3;i3++){
        var ax3=bcx+Math.round(i3*brx*0.30);
        var arch3=Math.round(Math.cos(i3*0.42)*bry*0.55);
        var sry3=Math.round(bry*(0.95-Math.abs(i3)*0.10));
        for(j3=-sry3;j3<=sry3;j3++){
          px(c,ax3+Math.round(brx*0.10),bcy-arch3+j3, ramp(2));
          px(c,ax3+Math.round(brx*0.10)-1,bcy-arch3+j3, ramp(6));
        }
      }
    }
    /* shared: a compact sheen up-left so every creature catches the same light */
    var hrx3=Math.round(brx*0.42), hry3=Math.round(bry*0.34);
    var hcx3=bcx-Math.round(brx*0.22), hcy3=bcy-Math.round(bry*0.30);
    for(var yy3=-hry3; yy3<=hry3; yy3++){
      var ny3=(yy3*yy3)/(hry3*hry3);
      var hw3=Math.floor(hrx3*Math.sqrt(Math.max(0,1-ny3)));
      for(var xx3=-hw3; xx3<=hw3; xx3++){
        var e3=(xx3*xx3)/(hrx3*hrx3)+ny3;
        if(e3>0.3844 && rnd()<0.6) continue;          // 0.62^2
        px(c, hcx3+xx3, hcy3+yy3, ramp(e3>0.25?6:7)); // 0.50^2
      }
    }
  }

  /* --- tail (behind body) --- */
  if(sp.tail!=='none'){
  var tlen = (sp.tail==='veil') ? L*0.40 : (sp.tail==='lobe' ? L*0.20 : L*0.28);
  var off  = sway*L*0.10;
  if(sp.tail==='fork'){
    wedge(c,x0+1,cy,tlen+1,off-L*0.22,3,3,P[0]); wedge(c,x0+1,cy,tlen+1,off+L*0.22,3,3,P[0]);
    wedge(c,x0,cy,tlen,off-L*0.22,2,2,P[1]);     wedge(c,x0,cy,tlen,off+L*0.22,2,2,P[1]);
    wedge(c,x0-1,cy-1,tlen-2,off-L*0.20,1,1,P[2]); wedge(c,x0-1,cy-1,tlen-2,off+L*0.20,1,1,P[2]);
    finRays(c,x0-1,cy,tlen-2,L*0.20,off-L*0.11,mixHex(P[1],P[0],0.38),3+rank,-1);
    finRays(c,x0-1,cy,tlen-2,L*0.20,off+L*0.11,mixHex(P[1],P[0],0.38),3+rank,-1);
  } else {
    var half = (sp.tail==='veil') ? L*0.34 : (sp.tail==='lobe' ? L*0.16 : L*0.26);
    tri(c,x0+1,cy,tlen,half,off,P[0],1);
    tri(c,x0,cy,tlen,half,off,P[1],0);
    tri(c,x0-1,cy-1,tlen-2,half*0.7,off,P[2],0);
    if(detail>0) tri(c,x0-2,cy-2,tlen-4,half*0.42,off,P[3],0);
    finRays(c,x0-1,cy,tlen-1,half*0.86,off,mixHex(P[1],P[0],0.34),4+rank,-1);
  }
  }

  /* --- dorsal fin --- */
  if(sp.dorsal==='sail'){
    var sh = Math.round(L*0.38);
    tri(c,cx+Math.round(rx*0.35),cy-ry-1,rx*0.9,sh,-sh*0.5,P[0],1);
    tri(c,cx+Math.round(rx*0.35),cy-ry-1,rx*0.9,sh,-sh*0.5,P[1],0);
    tri(c,cx+Math.round(rx*0.30),cy-ry-2,rx*0.7,sh*0.6,-sh*0.45,P[2],0);
    finRays(c,cx+Math.round(rx*0.32),cy-ry-2,rx*0.78,sh*0.52,-sh*0.42,mixHex(P[1],P[0],0.38),3+rank,-1);
  } else if(sp.dorsal==='small'){
    tri(c,cx+Math.round(rx*0.1),cy-ry,rx*0.5,L*0.12,-L*0.10,P[0],1);
    tri(c,cx+Math.round(rx*0.1),cy-ry,rx*0.5,L*0.12,-L*0.10,P[1],0);
  }

  /* --- body: outline / base / light / highlight (PIXEL_ART_SPEC §4).
         Four anatomies are not fish at all and get their own silhouette. --- */
  var by = cy+flex, i2;
  if(sp.body==='snail'){
    /* a foot on the floor and a spiral shell above it */
    var fy=by+Math.round(ry*0.7);
    rp(c,cx-rx-1,fy-1,rx*2+2,Math.round(ry*0.5)+2,P[0]);
    rp(c,cx-rx,fy,rx*2,Math.round(ry*0.5),P[1]);
    rp(c,cx-rx+1,fy+1,rx*2-3,Math.max(1,Math.round(ry*0.28)),P[2]);
    for(i2=0;i2<Math.round(rx*1.6);i2++) px(c,cx-rx+2+i2,fy+Math.round(ry*0.5)+Math.round(Math.sin(i2*0.9+ph)*1.2),P[0]);
    var sr=Math.round(ry*1.05), scx=cx-Math.round(rx*0.15), scy=by-Math.round(ry*0.35);
    circ(c,scx,scy,sr+1,P[0]); circ(c,scx,scy,sr,P[1]);
    for(i2=0;i2<3;i2++){                                  // the spiral
      var rr=Math.round(sr*(0.74-i2*0.20));
      var ox2=Math.round(Math.cos(i2*2.1)*sr*0.22), oy2=Math.round(Math.sin(i2*2.1)*sr*0.22);
      circ(c,scx+ox2,scy+oy2,rr,i2%2?P[2]:P[3]);
      circ(c,scx+ox2,scy+oy2,Math.max(1,rr-2),i2%2?P[3]:P[2]);
    }
    circ(c,scx-Math.round(sr*0.3),scy-Math.round(sr*0.35),Math.max(1,Math.round(sr*0.16)),P[4]);
  } else if(sp.body==='bell'){
    /* a pulsing dome with a curtain underneath - no fish parts at all */
    var pul=Math.round(Math.sin(ph)*L*0.03);
    var brx=rx+pul, bry=ry-pul;
    dome(c,cx,by+bry,brx+1,bry*2+1,P[0]);
    dome(c,cx,by+bry,brx,bry*2,P[1]);
    dome(c,cx-1,by+bry-1,brx-3,bry*2-3,P[2]);
    dome(c,cx-2,by+bry-3,Math.round(brx*0.5),Math.round(bry*1.1),P[3]);
    rp(c,cx-brx,by+bry,brx*2+1,2,P[0]);
    for(i2=-3;i2<=3;i2++){                                 // the curtain
      var tx2=cx+Math.round(i2*brx*0.28);
      var tl2=Math.round(L*(0.30+Math.abs(Math.sin(i2+ph))*0.16));
      for(var q2=0;q2<tl2;q2++){
        var wq=Math.round(Math.sin(q2*0.3+ph+i2)*L*0.035);
        px(c,tx2+wq,by+bry+2+q2, q2%4===0?P[4]:P[1]);
        if(detail>0) px(c,tx2+wq+1,by+bry+2+q2,P[0]);
      }
    }
  } else if(sp.body==='horse'){
    /* upright body, snout forward, tail curled under */
    var seg=Math.round(ry*0.34);
    for(i2=-2;i2<=2;i2++){
      var syy=by+i2*seg, sxx=cx+Math.round(Math.sin(i2*0.7)*rx*0.5);
      var swd=rx+ (i2===-2?-1:0);
      ell(c,sxx,syy,swd+1,seg,P[0]);
      ell(c,sxx,syy,swd,seg-1,P[1]);
      ell(c,sxx-1,syy-1,Math.max(1,swd-2),Math.max(1,seg-2),P[2]);
      if(detail>0) px(c,sxx-1,syy-1,P[3]);
    }
    var hx2=cx+Math.round(Math.sin(-2*0.7)*rx*0.5), hy2=by-2*seg;
    ell(c,hx2,hy2-seg,rx+1,seg+2,P[0]); ell(c,hx2,hy2-seg,rx,seg+1,P[1]);
    rp(c,hx2,hy2-seg-1,Math.round(rx*2.0),3,P[0]);            // snout
    rp(c,hx2,hy2-seg-1,Math.round(rx*1.8),1,P[3]);
    var tcx=cx+Math.round(Math.sin(2*0.7)*rx*0.5), tcy=by+2*seg;
    for(i2=0;i2<Math.round(L*0.34);i2++){                     // curled tail
      var an=i2*0.30+ph*0.2;
      px(c,tcx-Math.round(Math.cos(an)*i2*0.42), tcy+Math.round(Math.sin(an)*i2*0.30)+Math.round(i2*0.30), P[0]);
      px(c,tcx-Math.round(Math.cos(an)*i2*0.42), tcy+Math.round(Math.sin(an)*i2*0.30)+Math.round(i2*0.30)-1, P[2]);
    }
  } else if(sp.body==='shrimp'){
    /* arched, segmented, legs under, antennae forward */
    for(i2=-3;i2<=3;i2++){
      var ax2=cx+Math.round(i2*rx*0.30);
      var arch=Math.round(Math.cos(i2*0.42)*ry*0.55);
      var sry=Math.round(ry*(0.95-Math.abs(i2)*0.10));
      ell(c,ax2,by-arch,Math.round(rx*0.22)+1,sry+1,P[0]);
      ell(c,ax2,by-arch,Math.round(rx*0.22),sry,P[1]);
      ell(c,ax2-1,by-arch-1,Math.max(1,Math.round(rx*0.16)),Math.max(1,sry-2),P[2]);
      if(detail>0) rp(c,ax2-1,by-arch-sry+1,1,Math.max(1,sry),P[3]);
      for(var lg=0;lg<2;lg++){                                // legs
        var lx2=ax2, ly2=by-arch+sry;
        for(var lp=0;lp<Math.round(L*0.11);lp++)
          px(c,lx2+Math.round(Math.sin(lp*0.5+i2+ph)*2)-lg, ly2+lp, P[0]);
      }
    }
    var hxx=cx+Math.round(3*rx*0.30);
    for(i2=0;i2<Math.round(L*0.40);i2++){                      // antennae
      px(c,hxx+i2, by-Math.round(ry*0.4)-Math.round(Math.sin(i2*0.16+ph)*L*0.05), P[0]);
      px(c,hxx+i2, by-Math.round(ry*0.1)+Math.round(i2*0.16), P[0]);
    }
  } else if(sp.body==='flat'){
    /* flat belly, arched back - the shape of a fish that lives on the floor */
    var bl=Math.round(by+ry*0.55);
    flatEll(c,cx,by,rx+1,ry+1,bl+1,P[0]);
    flatEll(c,cx,by,rx,ry,bl,P[1]);
    flatEll(c,cx-1,by-1,rx-2,ry-2,bl-1,P[2]);
    if(detail>0) flatEll(c,cx-2,by-2,rx-4,ry-4,bl-2,P[3]);
  } else {
    ell(c,cx,by,rx+1,ry+1,P[0]);
    ell(c,cx,by,rx,ry,P[1]);
    ell(c,cx-1,by-1,rx-2,ry-2,P[2]);
    if(detail>0) ell(c,cx-2,by-2,rx-4,ry-4,P[3]);
  }
  var oddBody = (sp.body==='snail'||sp.body==='bell'||sp.body==='horse'||sp.body==='shrimp');
  if(!oddBody) bodyDetail(cx,by,rx,ry);
  else oddDetail(sp.body,cx,by,rx,ry);

  /* --- pectoral fin --- */
  if(!oddBody){
    tri(c,cx+Math.round(rx*0.2),by+Math.round(ry*0.4),L*0.20,L*0.09,L*0.06+sway*2,P[0],1);
    tri(c,cx+Math.round(rx*0.2),by+Math.round(ry*0.4),L*0.20,L*0.09,L*0.06+sway*2,P[2],0);
    finRays(c,cx+Math.round(rx*0.2),by+Math.round(ry*0.4),L*0.18,L*0.075,L*0.06+sway*2,mixHex(P[1],P[0],0.34),3,-1);
  }

  /* --- pattern --- */
  var i,t;
  if(sp.pattern==='stripes'){
    for(i=-2;i<=2;i++){
      var sx = Math.round(cx+i*rx*0.34);
      var sHalf = Math.round(ry*Math.sqrt(Math.max(0,1-Math.pow((sx-cx)/rx,2))));
      if(sHalf>1) rp(c,sx,by-sHalf+1,Math.max(1,Math.round(L*0.035)),sHalf*2-2,P[0]);
    }
  } else if(sp.pattern==='spots'){
    for(i=0;i<10+detail*6;i++){
      var a=rnd()*6.283, r=Math.sqrt(rnd());
      var qx=Math.round(cx+Math.cos(a)*rx*r*0.8), qy=Math.round(by+Math.sin(a)*ry*r*0.8);
      rp(c,qx,qy,Math.max(1,Math.round(L*0.05)),Math.max(1,Math.round(L*0.05)), rnd()<0.5?P[0]:P[4]);
    }
  } else if(sp.pattern==='neon'){
    rp(c,cx-rx+2,by-1,rx*2-4,Math.max(1,Math.round(L*0.055)),P[4]);
    rp(c,cx-rx+2,by+Math.round(ry*0.45),rx*2-6,Math.max(1,Math.round(L*0.045)),P[3]);
  }

  /* --- extras: what makes a branch a real branch, not a recolour (template §8).
         A species may STACK several - that is how chimeras get their own silhouette. --- */
  function drawExtra(kind){
    var i;
    if(kind==='glow'){
      for(i=0;i<4+detail*2;i++){
        var gx=Math.round(cx-rx*0.6+i*(rx*1.2)/(4+detail*2));
        rp(c,gx,by+Math.round(ry*0.45),Math.max(1,Math.round(L*0.05)),Math.max(1,Math.round(L*0.05)),P[4]);
      }
    } else if(kind==='moss'){
      for(i=0;i<6+detail*3;i++){
        var mx=Math.round(cx-rx*0.7+rnd()*rx*1.4);
        var mh=Math.max(2,Math.round(L*(0.06+rnd()*0.10)));
        var mHalf=Math.round(ry*Math.sqrt(Math.max(0,1-Math.pow((mx-cx)/rx,2))));
        rp(c,mx,by-mHalf-mh,1,mh,P[0]);
        rp(c,mx,by-mHalf-mh,1,Math.max(1,mh-1),P[4]);
      }
    } else if(kind==='plates'){
      for(i=-2;i<=2;i++){
        var pxx=Math.round(cx+i*rx*0.36);
        var pHalf=Math.round(ry*Math.sqrt(Math.max(0,1-Math.pow((pxx-cx)/rx,2))));
        if(pHalf>1){ rp(c,pxx-1,by-pHalf,2,pHalf+1,P[0]); rp(c,pxx,by-pHalf+1,1,pHalf,P[3]); }
      }
    } else if(kind==='whiskers'){
      for(i=0;i<Math.round(L*0.30);i++){
        rp(c,cx+Math.round(rx*0.85)+i,by+Math.round(ry*0.3)+Math.round(i*0.45+sway),1,1,P[0]);
        rp(c,cx+Math.round(rx*0.85)+i,by+Math.round(ry*0.1)-Math.round(i*0.25-sway),1,1,P[0]);
      }
    } else if(kind==='tendrils'){
      for(var k=0;k<3;k++){
        var ty=by+Math.round((k-1)*ry*0.7);
        for(i=0;i<Math.round(L*0.36);i++){
          var wob=Math.round(Math.sin(i*0.4+ph+k)*L*0.05);
          rp(c,x0-i-2,ty+wob,1,1, i%3===0?P[4]:P[1]);
        }
      }
    } else if(kind==='spines'){
      for(i=-2;i<=2;i++){
        var qx2=Math.round(cx+i*rx*0.3);
        var qHalf=Math.round(ry*Math.sqrt(Math.max(0,1-Math.pow((qx2-cx)/rx,2))));
        var shh=Math.max(2,Math.round(L*0.11));
        tri(c,qx2,by-qHalf,shh,1,-shh,P[0],0);
        rp(c,qx2,by-qHalf-shh,1,shh,P[3]);
      }
    } else if(kind==='crystal'){
      for(i=0;i<4+detail*2;i++){
        var ax=Math.round(cx-rx*0.6+rnd()*rx*1.2);
        var aHalf=Math.round(ry*Math.sqrt(Math.max(0,1-Math.pow((ax-cx)/rx,2))));
        var ah=Math.max(2,Math.round(L*(0.08+rnd()*0.10)));
        tri(c,ax+1,by-aHalf,ah,2,-ah,P[0],0);
        tri(c,ax,by-aHalf-1,ah-1,1,-ah,P[4],0);
      }
    } else if(kind==='orb'){
      for(i=0;i<5;i++){
        var oa=ph+i*1.25, orr=rx*1.15;
        var ox=Math.round(cx+Math.cos(oa)*orr), oy=Math.round(by+Math.sin(oa)*ry*1.5);
        circ(c,ox,oy,Math.max(1,Math.round(L*0.045)),P[0]);
        circ(c,ox,oy,Math.max(1,Math.round(L*0.03)),P[4]);
      }
    } else if(kind==='crown'){
      /* chimera only: a ring of spikes around the head */
      for(i=0;i<7;i++){
        var ca=-1.6+i*0.45;
        var hx=Math.round(cx+rx*0.45+Math.cos(ca)*rx*0.55);
        var hy=Math.round(by+Math.sin(ca)*ry*0.9);
        var chh=Math.max(2,Math.round(L*0.09));
        tri(c,hx+1,hy,chh,2,-chh*0.9,P[0],0);
        tri(c,hx,hy-1,chh-1,1,-chh*0.9,P[3],0);
      }
    }
  }
  var EX=extrasOf(sp);
  for(var e=0;e<EX.length;e++) drawExtra(EX[e]);

  /* --- the marks of an elder: only rank 3 wears these --- */
  if(rank>=3){
    var gold=['#7a5a1e','#b8891f','#e8c35a','#fff0b8'];
    /* a crown of spines over the brow */
    var crx=cx+Math.round(rx*0.30), cry=by-ry;
    for(var ci=0;ci<5;ci++){
      var cxp=crx-Math.round(ci*rx*0.13), chh=6+((ci%2)?3:6);
      for(var cj=0;cj<chh;cj++){
        var cw=Math.max(1,Math.round((chh-cj)/2));
        rp(c, cxp-cw, cry-cj-1, cw*2, 1, cj>chh-3?gold[3]:(cj>chh*0.4?gold[2]:gold[1]));
      }
      px(c,cxp,cry-chh-1,gold[3]);
    }
    rp(c, crx-Math.round(rx*0.56), cry-1, Math.round(rx*0.60), 2, gold[1]);
    rp(c, crx-Math.round(rx*0.56), cry-1, Math.round(rx*0.40), 1, gold[2]);
    /* old scars across the flank */
    for(var si=0;si<3;si++){
      var sxx=cx-Math.round(rx*(0.10+si*0.22)), syy=by-Math.round(ry*0.30)+si*Math.round(ry*0.32);
      for(var sj2=0;sj2<Math.max(3,Math.round(L*0.06));sj2++){
        px(c, sxx+sj2, syy+Math.round(sj2*0.5), ramp(7));
        px(c, sxx+sj2, syy+Math.round(sj2*0.5)+1, ramp(2));
      }
    }
    /* filaments trailing from the tail, drifting with the frame */
    for(var fi=0;fi<3;fi++){
      var fy=cy+Math.round((fi-1)*ry*0.42), fx=x0-Math.round(L*0.16);
      for(var fj=0;fj<Math.round(L*0.11);fj++){
        var fw=Math.round(Math.sin(ph*1.4+fj*0.32+fi)*2.2);
        px(c, fx-fj, fy+fw+Math.round(fj*0.10), fj%3===0?ramp(6):ramp(4));
      }
    }
    /* barbels at the jaw */
    for(var bi=0;bi<2;bi++){
      var bxx=cx+Math.round(rx*0.78), byy3=by+Math.round(ry*(0.18+bi*0.20));
      for(var bj2=0;bj2<Math.round(L*0.10);bj2++)
        px(c, bxx+bj2, byy3+Math.round(Math.sin(ph+bj2*0.3+bi)*1.6)+Math.round(bj2*0.28), ramp(5));
    }
  }

  /* --- eye --- */
  var ex=Math.round(cx+rx*0.58), ey=Math.round(by-ry*0.22);
  if(sp.body==='snail'){ ex=Math.round(cx+rx*0.85); ey=Math.round(by+ry*0.45); }
  else if(sp.body==='bell'){ ex=Math.round(cx-rx*0.35); ey=Math.round(by+ry*0.15); }
  else if(sp.body==='horse'){ ex=Math.round(cx+rx*0.4); ey=Math.round(by-ry*0.72); }
  else if(sp.body==='shrimp'){ ex=Math.round(cx+rx*0.78); ey=Math.round(by-ry*0.30); }
  var er=Math.max(1,Math.round(L*0.055));
  if(sp.id==='siltlurker'){
    circ(c,ex,ey,er,P[0]); // blind: sealed socket
  } else {
    circ(c,ex,ey,er+1,SH.edge);
    circ(c,ex,ey,er,'#f2fbff');
    if(er>1) circ(c,ex+Math.max(1,Math.round(er*0.22)),ey,Math.max(1,Math.round(er*0.72)), mixHex(SH.acc,'#0d1620',0.40));
    circ(c,ex+Math.max(1,Math.round(er*0.3)),ey,Math.max(1,Math.round(er*0.52)),'#0d1620');
    px(c,ex-1,ey-1,'#ffffff');
    if(er>2) px(c,ex-2,ey-1,'#d8f2ff');
    rp(c,ex-er,ey-er-1,er*2+1,1,SH.edge);
  }
  /* --- mouth --- */
  if(!oddBody) rp(c,cx+Math.round(rx*0.86),by+Math.round(ry*0.12),Math.max(1,Math.round(L*0.06)),1,P[0]);

  /* --- texture (PIXEL_ART_SPEC §4.5) --- */
  var n = 26+detail*12;
  for(i=0;i<n;i++){
    var a2=rnd()*6.283, r2=Math.sqrt(rnd())*0.85;
    var tx=Math.round(cx+Math.cos(a2)*rx*r2), ty2=Math.round(by+Math.sin(a2)*ry*r2);
    px(c,tx,ty2, rnd()<0.5?P[1]:P[3]);
  }
}

/* ---------- target ring: a DASHED OUTLINE, deliberately unlike any soft creature halo.
     Baked once at start - never generated inside the game loop (PIXEL_ART_SPEC §7). ---------- */
function makeRing(r,th,col,dashes){
  var sz=r*2+3;
  return makeSprite(sz,sz,function(c,w,h){
    var cx=w>>1, cy=h>>1, ri=r-th;
    for(var y=-r;y<=r;y++){
      for(var x=-r;x<=r;x++){
        var d2=x*x+y*y;
        if(d2>r*r || d2<ri*ri) continue;
        var seg=Math.floor(((Math.atan2(y,x)+Math.PI)/(Math.PI*2))*dashes*2);
        if(seg%2===0) px(c,cx+x,cy+y,col);
      }
    }
  });
}

/* ---------- glow halo (separate additive layer, never inside silhouette) ---------- */
function makeGlow(r,col){
  return makeSprite(r*2+2,r*2+2,function(c,w,h){
    var cx=w>>1, cy=h>>1;
    for(var i=r;i>=1;i--){
      var a=Math.pow(1-i/r,2)*0.5;
      c.fillStyle='rgba('+col+','+a.toFixed(3)+')';
      circ(c,cx,cy,i,'rgba('+col+','+a.toFixed(3)+')');
    }
  });
}

/* ============================================================
   ASSET BAKE
   ============================================================ */
var SPR = { fish:{}, glow:{}, ring:{}, decor:{}, food:{}, bg:null, far:null, mid:null, floorL:null,
            front:null, rays:null, glass:null, caustic:[], plantsMid:[], egg:null };

/* Sprites are baked on FIRST USE, not all at boot. With 46 species x 3 ranks x 6 frames
   an eager bake would be ~830 canvases and well over 50 MB on a phone. */
function fishFrames(id,rank){
  var sp=SPECIES[id];
  if(!sp){ sp=SPECIES.guppy; id='guppy'; }              // render must never crash
  rank=Math.max(0,Math.min(RANK_LEN.length-1,rank|0));
  var byId=SPR.fish[id] || (SPR.fish[id]=[]);
  if(byId[rank]) return byId[rank];
  var arr=[], sz=creatureCanvasSize(sp,rank);
  for(var f=0;f<FRAMES;f++){
    (function(f){ arr.push(makeSprite(sz.w,sz.h,function(c){ drawCreature(c,sp,rank,f); })); })(f);
  }
  byId[rank]=arr;
  return arr;
}
function fishGlow(id){
  var sp=SPECIES[id];
  if(!sp || !sp.glow) return null;
  if(SPR.glow[id]===undefined) SPR.glow[id]=makeGlow(Math.round(RANK_LEN[2]*0.55),hexToRgb(sp.glow));
  return SPR.glow[id];
}
/* ---------- shade helpers (PIXEL_ART_SPEC 15.3: shadows go COLD, lights go WARM).
     They derive extra steps from each species' own palette, so all 46 palettes stay
     untouched. Called only while BAKING a sprite - never in the game loop. ---------- */
function _hx(h){ var n=parseInt(h.slice(1),16); return [(n>>16)&255,(n>>8)&255,n&255]; }
function _hex(r,g,b){
  r=Math.max(0,Math.min(255,Math.round(r))); g=Math.max(0,Math.min(255,Math.round(g))); b=Math.max(0,Math.min(255,Math.round(b)));
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}
function mixHex(a,b,t){ var A=_hx(a),B=_hx(b); return _hex(A[0]+(B[0]-A[0])*t, A[1]+(B[1]-A[1])*t, A[2]+(B[2]-A[2])*t); }
function coolHex(h,t){ var A=_hx(h); return _hex(A[0]-A[0]*t*0.30, A[1]-A[1]*t*0.10, A[2]+(255-A[2])*t*0.16); }
function warmHex(h,t){ var A=_hx(h); return _hex(A[0]+(255-A[0])*t*0.30, A[1]+(255-A[1])*t*0.16, A[2]-A[2]*t*0.12); }

function hexToRgb(h){
  var n=parseInt(h.slice(1),16);
  return ((n>>16)&255)+','+((n>>8)&255)+','+(n&255);
}

function bakeFood(){
  for(var i=0;i<FOODS.length;i++){
    (function(f){
      SPR.food[f.id]=makeSprite(6,6,function(c){
        circ(c,3,3,2,'#1a1208'); circ(c,3,3,1,f.col); px(c,2,2,'#ffffff');
      });
    })(FOODS[i]);
  }
  SPR.egg = makeSprite(10,12,function(c){
    ell(c,5,6,4,5,'#0e2a33'); ell(c,5,6,3,4,'#4fb0a8'); ell(c,4,5,2,3,'#9ff0e0'); px(c,3,4,'#ffffff');
  });
}

/* water background: value noise + dithering, no flat fills (PIXEL_ART_SPEC §5) */
function bakeBackground(){
  var B0=biome(), WATER=B0.water;
  var rnd=mulberry32(0xA11CE), wv=makeWaves(rnd,4);
  SPR.bg = makeSprite(W,H,function(c){
    var B=3;
    for(var y=0;y<H;y+=B){
      for(var x=0;x<W;x+=B){
        var depth = 1 - (y/H);
        var n = noise(wv,x,y)*0.22 + (rnd()-0.5)*0.14;
        var v = depth*1.5 + n - 0.35;
        var s = step(v*2-1,WATER.length);
        rp(c,x,y,Math.min(B,W-x),B,WATER[s]);
      }
    }
    if(B0.surface){
      for(var x2=0;x2<W;x2++){
        var hh = 2 + Math.round(Math.sin(x2*0.05)*1.5 + Math.sin(x2*0.017)*1.5);
        rp(c,x2,SURFACE-6+hh,1,3,'#3ab4c0');
        rp(c,x2,SURFACE-3+hh,1,2,'#7fe0e0');
      }
    } else {
      /* no surface down here - just the dark closing over you */
      for(var x3=0;x3<W;x3+=2){
        for(var y3=0;y3<SURFACE+40;y3+=2){
          if(rnd()<0.25) rp(c,x3,y3,2,2,'#04070e');
        }
      }
    }
  });
}
/* FAR LAYER - the shape of the horizon is what makes a place a place */
function bakeFar(){
  var B0=biome(), T=B0.far;
  var rnd=mulberry32(0xFA71), wv=makeWaves(rnd,3);
  SPR.far = makeSprite(W,H,function(c){
    var x,y,n,s2;
    if(B0.id==='pond'){                      /* rolling hills */
      for(x=0;x<W;x+=3){
        var h1 = 300 + noise(wv,x*2,0)*40;
        for(y=Math.round(h1);y<FLOOR+40;y+=3){
          n=noise(wv,x,y)*0.5+(rnd()-0.5)*0.14;
          rp(c,x,y,Math.min(3,W-x),Math.min(3,FLOOR+40-y),T[step(n,T.length)]);
        }
      }
    } else if(B0.id==='reef'){                /* a wall pierced with arches */
      for(x=0;x<W;x+=3){
        var h2 = 250 + noise(wv,x*1.5,0)*70;
        for(y=Math.round(h2);y<FLOOR+40;y+=3){
          var hole = noise(wv,x*3+100,y*3);
          if(hole>0.42) continue;             /* the holes ARE the reef */
          n=noise(wv,x,y)*0.5+(rnd()-0.5)*0.14;
          rp(c,x,y,Math.min(3,W-x),Math.min(3,FLOOR+40-y),T[step(n,T.length)]);
        }
      }
    } else if(B0.id==='kelp'){                /* a canopy overhead, strands hanging down */
      for(x=0;x<W;x+=3) for(y=SURFACE;y<SURFACE+70;y+=3){
        n=noise(wv,x,y*2)*0.6+(rnd()-0.5)*0.14;
        if(n>-0.2) rp(c,x,y,3,3,T[step(n,T.length)]);
      }
      for(var k=0;k<22;k++){
        var sx=Math.round(rnd()*W), len=120+rnd()*260;
        for(y=SURFACE+40;y<SURFACE+40+len;y+=3){
          var xo=Math.round(Math.sin(y*0.02+k)*10);
          rp(c,sx+xo,y,4,3,T[y%6<3?0:1]);
        }
      }
    } else {                                  /* trench: two walls closing in */
      for(y=0;y<FLOOR+40;y+=3){
        var t=y/(FLOOR+40);
        var lw = Math.round(60 + t*210 + noise(wv,0,y*2)*40);

var DECOR_F = 6;                 /* animation frames baked per decor variant */

/* Decor is drawn for a given phase (0..1) so it can be baked into a short loop.
   Rock stays rock: stone never sways, it shimmers. Only living things bend. */
function drawDecor(c,id,w,h,seed,ph){
  var P=DPAL[id], rnd=mulberry32(seed), i, base=h-1, cx=w>>1;
  ph = ph||0;
  var TAU=6.28318, wob=Math.sin(ph*TAU), wob2=Math.sin(ph*TAU+2.1);
  /* the same 8-step ramp idea as the creatures, so decor sits in the same light */
  var R=[ coolHex(P[0],0.20), mixHex(P[0],P[1],0.45), mixHex(P[0],P[1],0.80), P[1],
          mixHex(P[1],P[2],0.5), P[2], mixHex(P[2],P[3],0.5), warmHex(P[3],0.18) ];
  function rmp(i2){ return R[i2<0?0:(i2>7?7:i2)]; }
  function cl(x){ return Math.max(1,Math.min(w-2,x)); }

  if(id==='kelp'){
    /* a holdfast of roots, then five blades that bend more the higher they go */
    for(i=0;i<7;i++){
      var rx0=6+Math.round(rnd()*(w-12));
      rp(c,rx0,base-2,3+Math.round(rnd()*4),2,rmp(1));
      px(c,rx0,base-3,rmp(2));
    }
    for(var b=0;b<5;b++){
      var bx=8+b*11, lean=(rnd()*2-1)*3, top=Math.round(h*(0.06+rnd()*0.20));
      var swayAmp=2.6+b*0.4;
      for(var y=base;y>=top;y--){
        var t=(base-y)/(base-top);
        var xo=Math.round(Math.sin(t*3+b)*3 + lean*t + Math.sin(ph*TAU + b*1.3 + t*2.2)*swayAmp*t*t);
        var wd=Math.max(2,Math.round(5-t*2.6));
        rp(c,cl(bx+xo-wd-1),y,wd*2+2,1,rmp(0));            // dark outline
        rp(c,cl(bx+xo-wd),y,wd*2,1,rmp(2));                // shadow side
        rp(c,cl(bx+xo-wd),y,Math.max(1,wd),1,rmp(4));      // base
        rp(c,cl(bx+xo-wd+1),y,Math.max(1,wd-1),1,rmp(6));  // lit left edge
        px(c,cl(bx+xo),y, rmp(3));                          // central vein
        if(y%5===0) px(c,cl(bx+xo+wd-1),y,rmp(1));          // serrated right edge
        if(y%9===0) px(c,cl(bx+xo-wd+1),y,rmp(7));          // sheen fleck
        if(y%17===0){ px(c,cl(bx+xo-1),y,rmp(5)); px(c,cl(bx+xo+1),y,rmp(2)); }
      }
      for(i=0;i<3;i++){
        var byy=top+Math.round((base-top)*(0.22+i*0.26));
        var bt=(base-byy)/(base-top);
        var bxo=Math.round(Math.sin(bt*3+b)*3 + lean*bt + Math.sin(ph*TAU+b*1.3+bt*2.2)*swayAmp*bt*bt);
        circ(c,cl(bx+bxo+2),byy,2,rmp(1)); circ(c,cl(bx+bxo+2),byy,1,rmp(6)); px(c,cl(bx+bxo+1),byy-1,rmp(7));
      }
    }
  } else if(id==='coral'){
    for(i=0;i<9;i++){                                        // rubble around the base
      var rbx=3+Math.round(rnd()*(w-6));
      rp(c,rbx,base-2,2+Math.round(rnd()*3),2,rmp(1)); px(c,rbx,base-3,rmp(4));
    }
    for(i=0;i<7;i++){
      var ccx=8+i*10, ch2=Math.round(h*(0.34+rnd()*0.46)), bend=(rnd()*2-1)*3;
      for(var y2=base;y2>base-ch2;y2--){
        var t2=(base-y2)/ch2;
        var xo2=Math.round(Math.sin(t2*3+i)*3 + bend*t2 + Math.sin(ph*TAU+i*0.9)*1.5*t2*t2);
        var wd2=Math.max(2,Math.round(5-t2*3));
        rp(c,cl(ccx+xo2-wd2),y2,wd2*2,1,rmp(0));
        rp(c,cl(ccx+xo2-wd2+1),y2,Math.max(1,wd2*2-2),1,rmp(3));
        px(c,cl(ccx+xo2-wd2+1),y2,rmp(6));
        if(y2%3===0) px(c,cl(ccx+xo2+wd2-1),y2,rmp(1));      // pore texture
        if(y2%6===0) px(c,cl(ccx+xo2),y2,rmp(5));
      }
      /* a side branch halfway up */
      if(i%2===0){
        var sby=base-Math.round(ch2*0.55);
        for(var sj2=0;sj2<Math.round(ch2*0.28);sj2++){
          var sxo=Math.round(Math.sin(ph*TAU+i)*1.2*(sj2/8));
          rp(c,cl(ccx+3+sj2+sxo),sby-sj2,2,1,rmp(2));
          px(c,cl(ccx+3+sj2+sxo),sby-sj2,rmp(5));
        }
      }
      var tipx=ccx+Math.round(Math.sin(3)*3+bend), tipy=base-ch2;
      var pulse=0.5+0.5*Math.sin(ph*TAU+i*1.25);
      circ(c,cl(tipx),tipy,3,rmp(0));
      circ(c,cl(tipx),tipy,2,rmp(pulse>0.6?7:4));
      px(c,cl(tipx),tipy-1,rmp(pulse>0.35?7:6));
      for(var pj=0;pj<5;pj++){
        var pa=pj*1.26+ph*TAU*0.5;
        px(c, cl(tipx+Math.round(Math.cos(pa)*3)), tipy+Math.round(Math.sin(pa)*3), rmp(pj%2?6:5));
      }
    }
  } else if(id==='grotto'){
    dome(c,cx,base,Math.round(w*0.48),h-2,rmp(0));
    dome(c,cx,base,Math.round(w*0.46),h-4,rmp(2));
    dome(c,cx-1,base,Math.round(w*0.42),h-7,rmp(3));
    dome(c,cx-2,base,Math.round(w*0.36),h-11,rmp(4));
    dome(c,cx-4,base,Math.round(w*0.25),h-17,rmp(6));
    dome(c,cx,base,Math.round(w*0.20),Math.round(h*0.62),rmp(0));
    dome(c,cx,base,Math.round(w*0.17),Math.round(h*0.58),'#05161d');
    for(i=0;i<7;i++){                                        // cracks
      var kx=Math.round(6+rnd()*(w-12)), ky=Math.round(base-4-rnd()*(h*0.55)), kl=3+Math.round(rnd()*8);
      for(var kj=0;kj<kl;kj++){ px(c, cl(kx+kj), ky+Math.round(kj*0.6), rmp(1)); px(c, cl(kx+kj), ky+Math.round(kj*0.6)+1, rmp(4)); }
    }
    for(i=0;i<44;i++) px(c,Math.round(2+rnd()*(w-4)),Math.round(base-rnd()*(h-6)), rnd()<0.5?rmp(2):rmp(6));
    for(i=0;i<9;i++){                                        // moss patches on the top
      var mx=Math.round(8+rnd()*(w-16)), my=Math.round(base-h*0.45-rnd()*h*0.35);
      rp(c,cl(mx),my,2+Math.round(rnd()*2),1,rmp(5)); px(c,cl(mx),my-1,rmp(7));
    }
    for(i=0;i<6;i++){                                        // rim light on the upper left
      px(c, cl(Math.round(cx-w*0.30+i*2)), base-Math.round(h*0.72)+i, rmp(7));

    /* the rock is still - what lives on it moves: anemones and cave motes */
    for(i=0;i<10;i++){
      var ax=Math.round(w*0.10+i*w*0.085), ay=base-Math.round(h*(0.46+((i%3)*0.09)));

        var axx=cl(ax+Math.round(aw*(aj/alen)));
        px(c, axx, ay-aj, rmp(aj>alen-3?6:3));
        if(aj>alen-2) px(c, axx+1, ay-aj, rmp(7));
      }
    }
    for(i=0;i<10;i++){                                       // motes drifting through the mouth
      var mp=((ph+i*0.1)%1);
      px(c, cl(cx-8+Math.round(Math.sin(mp*TAU+i)*7)), base-4-Math.round(mp*h*0.46), rmp(i%2?6:7));
    }
  } else if(id==='crystal'){
    for(i=0;i<8;i++){                                        // shattered chips at the base
      var chx=3+Math.round(rnd()*(w-6));
      rp(c,chx,base-2,2+Math.round(rnd()*2),2,rmp(1)); px(c,chx,base-3,rmp(6));
    }
    for(i=0;i<6;i++){
      var sx=6+i*9, sh2=Math.round(h*(0.30+rnd()*0.62)), sw=3+Math.round(rnd()*3);
      var lean2=(rnd()*2-1)*4;
      spike(c,sx,base,sw+1,sh2,lean2,rmp(0));
      spike(c,sx,base-1,sw,sh2-2,lean2,rmp(3));
      spike(c,sx-1,base-2,Math.max(1,sw-2),sh2-5,lean2,rmp(5));
      spike(c,sx-1,base-3,Math.max(1,sw-3),sh2-9,lean2,rmp(6));
      for(var fj=2;fj<sh2-4;fj+=3){                          // facet seams
        px(c, cl(sx+Math.round(lean2*(fj/sh2))), base-fj, rmp(2));
        px(c, cl(sx+Math.round(lean2*(fj/sh2))-1), base-fj, rmp(6));
      }
      /* a band of inner light travels up the shard - the whole shard breathes */
      var gpos=((ph+i*0.17)%1);
      var gy=base-3-Math.round(gpos*(sh2-8));
      for(var gj=0;gj<4;gj++){
        var gyy=gy+gj;
        if(gyy<base-2 && gyy>base-sh2)
          rp(c, cl(sx+Math.round(lean2*((base-gyy)/sh2))-1), gyy, Math.max(1,sw-1), 1, rmp(gj<2?7:6));
      }
      px(c,cl(sx),base-sh2+2,rmp(7));
    }
  } else if(id==='vent'){
    dome(c,cx,base,Math.round(w*0.48),h-2,rmp(0));
    dome(c,cx,base,Math.round(w*0.45),h-4,rmp(2));
    dome(c,cx-1,base,Math.round(w*0.40),h-7,rmp(3));
    dome(c,cx-2,base,Math.round(w*0.32),h-10,rmp(5));
    for(i=0;i<5;i++){                                        // mineral crust rings
      var cry=base-2-i*Math.round(h*0.12);
      var crw=Math.round(w*(0.40-i*0.05));
      rp(c,cx-crw,cry,crw*2,1,rmp(1));
      rp(c,cx-crw+1,cry-1,Math.max(1,crw),1,rmp(6));
    }
    dome(c,cx,base,4,Math.round(h*0.55),rmp(0));
    dome(c,cx,base,3,Math.round(h*0.50),'#0a1c24');
    for(i=0;i<26;i++) px(c,Math.round(2+rnd()*(w-4)),Math.round(base-rnd()*(h-6)), rnd()<0.5?rmp(6):rmp(2));
    /* glowing cracks that pulse with the vent */
    var glow=0.5+0.5*Math.sin(ph*TAU);
    for(i=0;i<4;i++){
      var gx2=cx-8+i*5, gy2=base-6-i*2;
      px(c,cl(gx2),gy2, glow>0.5?rmp(7):rmp(5));
      px(c,cl(gx2+1),gy2+1, glow>0.5?rmp(6):rmp(4));
    }
    /* heat shimmer climbing out of the mouth, three plumes on a loop */
    for(i=0;i<6;i++){
      var pr=((ph+i/6)%1);
      var ry2=base-Math.round(h*0.46)-Math.round(pr*h*0.50);
      var rw=1+Math.round(pr*5);
      if(ry2>0){
        for(var pk=-1;pk<=1;pk++){
          px(c,cl(cx-rw+pk),ry2,rmp(pk===0?7:6));
          px(c,cl(cx+rw+pk),ry2,rmp(pk===0?7:6));
        }
        px(c,cl(cx-rw+1),ry2+1,rmp(5)); px(c,cl(cx+rw-1),ry2+1,rmp(5));
        px(c,cl(cx),ry2-1,rmp(7));
      }
    }
    for(i=0;i<8;i++){                                        // crust that glitters as heat passes
      var gtx=cl(4+Math.round(rnd()*(w-8))), gty=base-2-Math.round(rnd()*h*0.5);
      px(c,gtx,gty, (Math.sin(ph*TAU+i)>0.2)?rmp(7):rmp(3));
    }
    circ(c,cx,base-Math.round(h*0.50),2, glow>0.5?rmp(7):rmp(4));
    if(glow>0.75) circ(c,cx,base-Math.round(h*0.50),3,rmp(6));
  } else if(id==='idol'){
    rp(c,cx-15,base-7,30,8,rmp(0)); rp(c,cx-14,base-6,28,6,rmp(2)); rp(c,cx-13,base-6,26,1,rmp(5));
    ell(c,cx,base-24,11,16,rmp(0)); ell(c,cx,base-24,10,15,rmp(2));
    ell(c,cx-1,base-26,8,12,rmp(4)); ell(c,cx-2,base-28,5,8,rmp(6));
    ell(c,cx,base-48,9,11,rmp(0)); ell(c,cx,base-48,8,10,rmp(2)); ell(c,cx-1,base-50,6,7,rmp(5));
    for(i=0;i<5;i++){                                        // carved bands
      var byy2=base-13-i*7; rp(c,cx-8,byy2,16,1,rmp(1)); rp(c,cx-7,byy2-1,14,1,rmp(6));
    }
    for(i=0;i<6;i++){                                        // runes
      var rux=cx-6+((i%3)*6), ruy=base-18-Math.floor(i/3)*10;
      px(c,rux,ruy,rmp(1)); px(c,rux+1,ruy,rmp(1)); px(c,rux,ruy+1,rmp(1)); px(c,rux+1,ruy-1,rmp(6));
    }
    for(i=0;i<30;i++) px(c,Math.round(cx-12+rnd()*24),Math.round(base-8-rnd()*48), rnd()<0.5?rmp(1):rmp(6));
    for(i=0;i<7;i++){                                        // moss creeping up the base
      var mox=cx-12+Math.round(rnd()*24);
      px(c,cl(mox),base-8-Math.round(rnd()*6),rmp(5));
    }
    var eye=0.5+0.5*Math.sin(ph*TAU);
    circ(c,cx,base-50,3,rmp(0));
    circ(c,cx,base-50,2, eye>0.55?rmp(7):rmp(3));
    if(eye>0.8){ px(c,cx,base-51,rmp(7)); circ(c,cx,base-50,3,rmp(6)); circ(c,cx,base-50,2,rmp(7)); }
    var shy=base-18-Math.round(((ph+0.35)%1)*36);
    for(var sj=-7;sj<=7;sj++) px(c, cl(cx+sj), shy+Math.round(Math.abs(sj)*0.3), rmp(6));
  }
}

function bakeDecor(){
  for(var i=0;i<DECOR.length;i++){
    var d=DECOR[i]; SPR.decor[d.id]=[];
    for(var v=0;v<2;v++){
      for(var f=0;f<DECOR_F;f++){
        (function(d,v,f){
          SPR.decor[d.id].push(makeSprite(d.w,d.h,function(c,w,h){
            drawDecor(c,d.id,w,h,0x5EED+d.id.length*97+v*31, f/DECOR_F);
          }));
        })(d,v,f);
      }
    }
  }
}
/* The one place that turns (variant, frame) into a baked sprite. The game loop only
   ever picks an already-baked image - decor is never drawn from scratch per frame. */
function decorImg(id,v,f){
  var arr=SPR.decor[id]; if(!arr||!arr.length) return null;
  v=((v|0)%2+2)%2; f=(((f|0)%DECOR_F)+DECOR_F)%DECOR_F;
  return arr[v*DECOR_F+f] || arr[0];
}

function drawOrnament(c,kind,w,h,seed){
  var rnd=mulberry32(seed), base=h-1, cx=w>>1, i;
  if(kind==='castle'){
    var P=['#2a2f36','#4c525c','#6d7580','#929aa5','#c2cad4'];   // stone
    for(var t=0;t<3;t++){
      var tx=14+t*30, tw=18, th=Math.round(h*(0.5+ (t===1?0.35:0)));
      rp(c,tx-1,base-th,tw+2,th+1,P[0]);
      rp(c,tx,base-th,tw,th,P[1]);
      rp(c,tx+1,base-th+1,Math.round(tw*0.5),th-2,P[2]);   // light from upper-left
      /* crenellations */
      for(var b=0;b<3;b++) rp(c,tx+b*7,base-th-4,4,4,P[1]);
      /* a dark doorway */
      rp(c,tx+tw/2-3,base-10,6,10,'#0a0f14');
      /* a window with a glow */
      rp(c,tx+tw/2-2,base-th+6,4,5,'#12313d');
      px(c,tx+tw/2-1,base-th+7,'#7fe0e0');
    }
    for(i=0;i<40;i++) px(c,Math.round(2+rnd()*(w-4)),Math.round(base-rnd()*h*0.7), rnd()<0.5?P[0]:P[3]);
  } else if(kind==='ship'){
    var Wd=['#2a1a0e','#4a2f18','#6e4a28','#9c7040','#c89858'];  // wood
    /* a broken hull, tilted */
    for(var y=0;y<Math.round(h*0.5);y++){
      var wy=base-y, half=Math.round(w*0.42*(1-y/(h*0.6)));
      var lean=Math.round(y*0.4);
      rp(c,cx-half+lean,wy,half*2,1,Wd[0]);
      rp(c,cx-half+lean+1,wy,half*2-2,1,Wd[1]);
      if(y%4===0) rp(c,cx-half+lean+1,wy,Math.max(1,half),1,Wd[2]);   // planks
    }
    /* a broken mast leaning */
    for(i=0;i<Math.round(h*0.55);i++){
      var mx=cx+Math.round(i*0.5)+6, my=base-Math.round(h*0.35)-i;
      if(my<0) break;
      rp(c,mx,my,3,1,Wd[0]); px(c,mx+1,my,Wd[3]);
    }
    /* a torn sail */
    for(i=0;i<14;i++) px(c,cx+8+Math.round(rnd()*16),base-Math.round(h*0.4)-Math.round(rnd()*20),'#8a9098');
    for(i=0;i<30;i++) px(c,Math.round(2+rnd()*(w-4)),Math.round(base-rnd()*h*0.4), rnd()<0.5?Wd[0]:Wd[4]);
  } else if(kind==='arch'){
    var Cr=['#3a1030','#6e2050','#a83a78','#e07ab0','#ffd0f0'];  // coral
    var legW=12, r=Math.round(w*0.36);
    /* two legs */
    for(var lg=0;lg<2;lg++){
      var lx=(lg?w-legW-8:8);
      for(var yy=base;yy>base-Math.round(h*0.6);yy--){
        var xo=Math.round(Math.sin((base-yy)*0.06+lg)*2);
        rp(c,lx+xo,yy,legW,1,Cr[0]);
        rp(c,lx+xo+1,yy,legW-2,1,Cr[2]);
        if(yy%6===0) px(c,lx+xo+3,yy,Cr[4]);
      }
    }
    /* the arch across the top - half-dome band */
    for(var a=0;a<=180;a+=4){
      var rad=a*Math.PI/180;
      var ax=cx-Math.round(Math.cos(rad)*r), ay=base-Math.round(h*0.55)-Math.round(Math.sin(rad)*r*0.5);
      rp(c,ax-6,ay,12,4,Cr[0]); rp(c,ax-5,ay,10,3,Cr[1]); px(c,ax,ay,Cr[3]);
    }
    for(i=0;i<26;i++) px(c,Math.round(2+rnd()*(w-4)),Math.round(base-rnd()*h*0.7), rnd()<0.5?Cr[0]:Cr[4]);
  }
}
function bakeOrnaments(){
  SPR.orn={};
  var sizes={castle:[110,90], ship:[130,80], arch:[120,110]};
  for(var k in sizes){
    (function(k){
      SPR.orn[k]=makeSprite(sizes[k][0],sizes[k][1],function(c,w,h){ drawOrnament(c,k,w,h,0x0C0+k.length*53); });
    })(k);
  }
}
var _glassFills=null;
function bakeGlass(){
  var sk=equipped('skin').val;
  _glassFills=[];
  SPR.glass = makeSprite(W,H,function(c){
    var _origFill=Object.getOwnPropertyDescriptor(c,'fillStyle');

    var F = sk ? sk.frame : '#0a1a22', F2 = sk ? sk.edge : '#20505e';
    rp(c,0,0,W,SURFACE-8,'#061018');
    rp(c,0,SURFACE-9,W,2,F2);
    rp(c,0,0,8,H,F); rp(c,W-8,0,8,H,F);
    rp(c,8,0,2,H,F2); rp(c,W-10,0,2,H,F2);
    rp(c,0,H-8,W,8,F); rp(c,0,H-10,W,2,F2);
    for(var i=0;i<70;i++){
      c.fillStyle='rgba(2,10,16,0.014)';
      c.fillRect(i,i,W-i*2,1); c.fillRect(i,H-1-i,W-i*2,1);
      c.fillRect(i,i,1,H-i*2); c.fillRect(W-1-i,i,1,H-i*2);
    }
    for(var k=0;k<3;k++){
      var x=60+k*300;
      for(var y=SURFACE;y<H-20;y++){
        c.fillStyle='rgba(200,255,255,0.025)';
        c.fillRect(x+Math.round(y*0.12),y,6,1);
      }
    }
    if(sk){
      _glassFills.push(sk.frame, sk.edge, sk.substrate);
      /* a substrate band just inside the bottom frame - dithered, never a flat fill */
      var rnd=mulberry32(0x5C1B), band=biomeDef(G.biome), sub=sk.substrate;
      for(var yb=0;yb<10;yb++){
        for(var xb=8;xb<W-8;xb+=2){
          var jit=(rnd()-0.5)*0.3;
          c.fillStyle = (yb/10 + jit) < 0.5 ? sub : F;
          c.fillRect(xb,H-18+yb,2,1);
        }
      }
    } else {
      _glassFills.push('#0a1a22','#20505e');
    }
  });
}

      unlocked:G.unlocked, achs:G.achs, badges:G.badges, patron:G.patron, showcase:G.showcase.map(function(z){return {s:z.sp,r:z.rank,x:Math.round(z.x),y:Math.round(z.y),dir:z.dir,nm:z.custom||''};}),

      owned:G.owned, cosmetic:G.cosmetic, muted:AU.muted?1:0, tips:G.tips,
