function num(v,def,lo,hi){
  v=Number(v);
  if(!isFinite(v)) return def;
  if(v<lo) return lo; if(v>hi) return hi;
  return v;
}
function load(){
  var d=null;
  try{ d=JSON.parse(localStorage.getItem(SAVE_KEY)||'null'); }catch(e){ d=null; }
  if(!d||typeof d!=='object') return false;
  G.name = (typeof d.name==='string')? d.name.slice(0,14) : '';
  G.pearls = num(d.pearls,60,0,PEARL_CAP);
  G.spawnTimer = num(d.spawnTimer,0,0,SPAWN_COOLDOWN);
  G.discovered = {};
  if(d.discovered && typeof d.discovered==='object'){
    for(var k in d.discovered) if(SPECIES[k]) G.discovered[k]=true;
  }
  G.unlocked = {};
  if(d.unlocked && typeof d.unlocked==='object'){
    for(var k2 in d.unlocked) if(LOCKED_BASE.indexOf(k2)>=0) G.unlocked[k2]=true;
  }
  G.achs = {};
  if(d.achs && typeof d.achs==='object'){
    for(var k3 in d.achs){ for(var ai=0;ai<ACHS.length;ai++) if(ACHS[ai].id===k3) G.achs[k3]=true; }
  }
  G.badges = {};
  if(d.badges && typeof d.badges==='object'){
    for(var kb in d.badges) if(badgeDef(kb)) G.badges[kb]=true;
  }
  G.stars = num(d.stars,0,0,9999);
  G.patron = {};
  if(d.patron && typeof d.patron==='object'){ for(var kp in d.patron) if(patronDef(kp)) G.patron[kp]=true; }
  G.scDecor = [];
  if(Array.isArray(d.scDecor)){
    for(var di=0;di<d.scDecor.length && di<20;di++){
      var sd=d.scDecor[di];
      if(sd && decorDef(sd.id)) G.scDecor.push({ id:sd.id, x:num(sd.x,480,40,920) });
    }
  }
  G.showcase = [];
  if(Array.isArray(d.showcase)){
    for(var si=0;si<d.showcase.length && si<60;si++){
      var sc=d.showcase[si];
      if(sc && SPECIES[sc.s||sc.sp]){
        G.showcase.push({ sp:sc.s||sc.sp, rank:num(sc.r!==undefined?sc.r:sc.rank,2,0,3),
          x:num(sc.x,480,20,940), y:num(sc.y,240,120,380), dir:sc.dir===-1?-1:1,
          bob:gameRnd()*6.28, name:(SPECIES[sc.s||sc.sp].name), custom:(typeof sc.nm==='string'?sc.nm.slice(0,12):'') });
      }
    }
  }
  G.owned = {tint_none:true,frame_none:true,orn_none:true,skin_none:true};
  if(d.owned && typeof d.owned==='object'){ for(var ko in d.owned) if(cosmeticDef(ko)) G.owned[ko]=true; }
  G.cosmetic = {tint:'tint_none',frame:'frame_none',ornament:'orn_none',skin:'skin_none'};
  if(d.cosmetic && typeof d.cosmetic==='object'){
    if(cosmeticDef(d.cosmetic.tint) && G.owned[d.cosmetic.tint]) G.cosmetic.tint=d.cosmetic.tint;
    if(cosmeticDef(d.cosmetic.frame) && G.owned[d.cosmetic.frame]) G.cosmetic.frame=d.cosmetic.frame;
    if(cosmeticDef(d.cosmetic.ornament) && G.owned[d.cosmetic.ornament]) G.cosmetic.ornament=d.cosmetic.ornament;
    if(cosmeticDef(d.cosmetic.skin) && G.owned[d.cosmetic.skin]) G.cosmetic.skin=d.cosmetic.skin;
  }
  AU.muted = !!d.muted;
  G.tips = {};
  if(d.tips && typeof d.tips==='object'){
    for(var k5 in d.tips) if(tipDef(k5)) G.tips[k5]=true;
  }
  G.tip=null; G.tipGap=0;
  G.stats = {merges:0,mutants:0,chimeras:0,released:0,fed:0};
  if(d.stats && typeof d.stats==='object'){
    for(var k4 in G.stats) G.stats[k4]=num(d.stats[k4],0,0,999999);
  }
  G.biomesOwned={pond:true};
  if(d.biomesOwned && typeof d.biomesOwned==='object'){
    for(var b0 in d.biomesOwned) if(biomeDef(b0).id===b0) G.biomesOwned[b0]=true;
  }
  G.biome = (typeof d.biome==='string' && biomeDef(d.biome).id===d.biome && G.biomesOwned[d.biome]) ? d.biome : 'pond';
  G.decor=[];
  if(Array.isArray(d.decor)){
    for(var q0=0;q0<d.decor.length && G.decor.length<DECOR_MAX;q0++){
      var dd0=d.decor[q0];
      if(!dd0 || !decorDef(dd0.id)) continue;                      // unknown decor -> dropped
      G.decor.push({ id:dd0.id, x:num(dd0.x,W/2,20,W-20)|0, v:num(dd0.v,0,0,1)|0 });
    }
  }
  G.quests=[];
  if(Array.isArray(d.quests)){
    for(var q1=0;q1<d.quests.length && G.quests.length<3;q1++){
      var qq=d.quests[q1];
      if(!qq || !questDef(qq.id)) continue;
      G.quests.push({ id:qq.id, prog:num(qq.prog,0,0,9999) });
    }
  }
  fillQuests();
  recalcEnv();
  G._savedAt = num(d.savedAt,0,0,1e15);
  G.fish=[];
  if(Array.isArray(d.fish)){
    for(var i=0;i<d.fish.length && i<80;i++){
      var f=d.fish[i];
      if(!f||!SPECIES[f.s]) continue;                    // unknown skin -> drop
      var nf=makeFish(f.s, num(f.r,0,0,3)|0, num(f.x,W/2,20,W-20), num(f.y,240,SURFACE+10,FLOOR-10));
      nf.age = num(f.a,0,0,1);
      nf.ripe = num(f.rp,RIPEN,0,RIPEN);
      nf.ready = (nf.age>=1 && nf.ripe<=0);
      if(f.d) for(var a=0;a<AXES.length;a++) nf.diet[AXES[a]] = num(f.d[AXES[a]],0,0,100);
      G.fish.push(nf);
    }
  }
  return true;
}

/* ---------- fish factory ---------- */
var fishId=1;
function makeFish(spId,rank,x,y){
  var sp=SPECIES[spId];
  return {
    id:fishId++, sp:spId, rank:rank|0, age:0,
    x:x, y:y, vx:(gameRnd()-0.5)*30, vy:0, dir:gameRnd()<0.5?-1:1,
    tx:x, ty:y, hunger:0.4, frame:gameRnd()*FRAMES, diet:newDiet(),
    z: 0.5+gameRnd()*0.5, held:false, breed: 12+gameRnd()*20, bob:gameRnd()*6.28,
    flash:0, bottom: (sp.body==='flat'||sp.move==='crawl'||sp.body==='snail'),
    /* every fish owns a patch of the tank - without this they all drift to the middle.
       homes are handed out along a golden-ratio sequence, so they spread evenly
       instead of clumping the way plain random does. */
    homeX: 60+((fishId*0.6180339887)%1)*(W-120),
    homeY: (sp.body==='flat'||sp.move==='crawl'||sp.body==='snail') ? (FLOOR-40-((fishId*0.7548776662)%1)*40)
         : (sp.move==='drift') ? (SURFACE+50+((fishId*0.7548776662)%1)*160)
         : (SURFACE+56+((fishId*0.7548776662)%1)*(FLOOR-SURFACE-130)),
    roam: 80+gameRnd()*110,
    retarget: gameRnd()*4,
    pace: 0.8+gameRnd()*0.5,
    _flip:false,
    ripe: RIPEN,        // counts down once the fish is an adult
    ready:false, mate:null
  };
}
function discover(id){
  if(G.discovered[id]) return false;
  G.discovered[id]=true; addPearls(120);
  /* a star for each new species - but NOT the four you start with for free */
  if(BASE_IDS.indexOf(id)<0) addStars(1);
  if(G.sess && G.sess.found.length<8) G.sess.found.push(id);
  sfx('discover');
  checkBadges();
  recalcEnv();                 // a wider codex needs a roomier tank
  questEvent('discover',1);
  return true;
}
function addPearls(n){ G.pearls=Math.min(PEARL_CAP,Math.max(0,G.pearls+n)); }
function speciesCount(){ var n=0; for(var k in G.discovered) if(G.discovered[k]) n++; return n; }

/* ---------- oxygen ---------- */
function recalcEnv(){
  var i, a;
  for(a=0;a<AXES.length;a++) G.env[AXES[a]]=0;
  /* Merging needs a PAIR of the same species and rank. Every species you discover
     adds three more buckets to sort fish into, so pairs get rarer as you get better.
     Capacity has to grow with the codex or a good player gets punished with a stall. */
  var cap=150 + Math.max(0, speciesCount()-4)*9;
  var B0=biome();
  for(a in B0.axes) G.env[a]=(G.env[a]||0)+B0.axes[a];   // the biome itself leans
  for(i=0;i<G.decor.length;i++){
    var d=decorDef(G.decor[i].id);
    if(!d) continue;
    G.env[d.axis]+=1;
    cap+=d.o2;
  }
  G.oxyCap=cap;
}
function recalcOxygen(){
  var u=0;
  for(var i=0;i<G.fish.length;i++) u+=RANK_O2[G.fish[i].rank];
  G.oxyUse=u; G.stagnant = u>G.oxyCap;
}

/* ============================================================
   MERGE — the heart of the game
   ============================================================ */
/* what would happen if these two met? null = nothing */
function isFinalForm(id){
  var sp=SPECIES[id];
  if(!sp) return false;
  if(sp.evolveTo && Object.keys(sp.evolveTo).length) return false;   // can still evolve
  /* a mutant that can still cross into a chimera is not final */
  if(sp.mutantOf && CHIMERA[chimeraKey(id,id)]) return false;
  return sp.rank===undefined ? true : true;
}
function mergeKind(a,b){
  if(!a||!b||a===b) return null;
  if(a.age<1||b.age<1) return null;
  var spA=SPECIES[a.sp], spB=SPECIES[b.sp];
  if(!spA||!spB) return null;
  /* mutants are unstable: two ADULT L3 mutants cross, even across different lines */
  if(spA.mutantOf && spB.mutantOf && a.rank===2 && b.rank===2)
    return CHIMERA[chimeraKey(a.sp,b.sp)] ? 'chimera' : null;
  if(a.sp!==b.sp) return null;
  if(a.rank===b.rank){
    if(a.rank<2) return 'rank';
    if(a.rank>=3) return 'apex';        // an elder is the very top - nothing above it
    /* two L3 of the same species: 'evolve' if the branch continues. If it does not
       (a final form, a chimera), the pair becomes ONE ELDER of that same species -
       so the 30 dead-end species finally have somewhere to go. */
    var branches=spA.evolveTo && Object.keys(spA.evolveTo).length;
    return branches ? 'evolve' : 'elder';
  }
  return 'unstable';
}
function tryMerge(a,b){
  var kind=mergeKind(a,b);
  if(!kind) return false;
  if(kind==='apex'){
    /* an elder already is the top. We refuse rather than silently eat a fish. */
    toast('AN ELDER IS THE VERY TOP - NOTHING GROWS BEYOND IT');
    return false;
  }
  var sp=SPECIES[a.sp];
  var x=(a.x+b.x)/2, y=(a.y+b.y)/2;
  var diet=newDiet(), i;
  for(i=0;i<AXES.length;i++) diet[AXES[i]]=a.diet[AXES[i]]+b.diet[AXES[i]];
  var spA=a.sp, spB=b.sp;
  removeFish(a); removeFish(b);

  var res=null, coins=0, title=null, sub=null, isNew=false;

  if(kind==='chimera'){
    var target=CHIMERA[chimeraKey(spA,spB)];
    if(target && gameRnd()<CHIMERA_CHANCE){
      res=makeFish(target,0,x,y); res.age=1;
      coins=200; isNew=discover(target);
      title='CHIMERA!'; sub=SPECIES[target].name;
    } else {
      /* the cross fails - but the fish are NOT lost. They fall back to L1 of their
         own kind. You lose the growth, not the animals. 90% total loss was a
         punishment, not a risk, and it walled off 13 of the 14 chimeras. */
      var ra=makeFish(spA,0,x-20,y); ra.age=1;
      var rb=makeFish(spB,0,x+20,y); rb.age=1;
      G.fish.push(ra,rb);
      addPearls(15);
      burst(x,y,30,'#7fa8b8');
      questEvent('merge',1); questEvent('cross',1); bumpStat('merges',1); sfx('fail');
      G.event={ title:'CROSS FAILED', sub:'BOTH FELL BACK TO RANK 1', id:null, t:EVENT_T, new:false, fail:true };
      G.timeScale=0.3;
      recalcOxygen(); save();
      return true;
    }
  } else if(kind==='rank'){
    res=makeFish(spA,a.rank+1,x,y); res.diet=diet; res.age=1;
    coins = a.rank===0 ? 10 : 25;
  } else if(kind==='evolve'){
    var axis=null, best=-1;
    for(var k=0;k<sp.axes.length;k++){
      var ax=sp.axes[k];
      if(diet[ax]>best){ best=diet[ax]; axis=ax; }
    }
    if(best<=0 && sp.axes.length) axis=sp.axes[Math.floor(gameRnd()*sp.axes.length)];
    var tgt = axis ? sp.evolveTo[axis] : null;
    if(!tgt){
      res=makeFish(spA,2,x,y); res.diet=diet; res.age=1; coins=20;
      toast('THIS LINE ENDS HERE - FOR NOW');
    } else {
      res=makeFish(tgt,0,x,y); res.age=1;
      coins=60; isNew=discover(tgt);
      title=isNew?'NEW SPECIES':'EVOLVED'; sub=SPECIES[tgt].name;
    }
  } else if(kind==='elder'){
    /* two grown finals of the same kind become ONE elder of that kind. Not a new
       species - a fourth stage of one you already own, so the 46 ceiling holds. */
    res=makeFish(spA,3,x,y); res.diet=diet; res.age=1;
    coins=90;
    title='ELDER'; sub=SPECIES[spA].name;
    G.stats.elders=(G.stats.elders||0)+1;
  } else { /* unstable: mismatched ranks */
    if(gameRnd()<0.25 && sp.mutant){
      res=makeFish(sp.mutant,0,x,y); res.age=1;
      coins=50; isNew=discover(sp.mutant);
      title='MUTANT!'; sub=SPECIES[sp.mutant].name;
    } else {
      res=makeFish(spA,Math.min(a.rank,b.rank),x,y); res.diet=diet; res.age=1;
      coins=8; toast('UNSTABLE CROSS - FELL BACK');
    }
  }
  if(res){ res.ripe=RIPEN; res.ready=false; res.mate=null; }
  addPearls(coins);
  sfx(kind==='evolve' && title ? 'evolve' : 'merge');
  bumpStat('merges',1);
  questEvent('merge',1);
  if(kind==='evolve' && title) questEvent('evolve',1);
  if(title==='MUTANT!'){ questEvent('mutant',1); bumpStat('mutants',1); sfx('mutant'); }
  if(title==='CHIMERA!'){ questEvent('cross',1); bumpStat('chimeras',1); sfx('chimera'); }
  if(title==='ELDER'){ questEvent('elder',1); sfx('evolve'); }
  if(res.rank===2) questEvent('l3',1);
  G.fish.push(res);
  burst(x,y,title?30:12,title?'#b8f6ff':'#8fd8c8');
  if(title){ G.event={title:title,sub:sub,id:res.sp,t:EVENT_T,new:isNew}; G.timeScale=0.15; }
  recalcOxygen(); save();
  return true;
}
function removeFish(f){
  var i=G.fish.indexOf(f);
  if(i>=0) G.fish.splice(i,1);
}
function sellPrice(f){
  if(!f) return 0;
  var sp=SPECIES[f.sp];
  var p = 4 + f.rank*6 + (sp.base?0:6) + ((sp.mutantOf||sp.chimera)?10:0);
  if(f.rank===2 && isFinalForm(f.sp)) p += 12;   // a final form is worth keeping around for
  if(f.rank>=3) p += 40;                         // an elder took two grown finals to make
  return p;
}
function settleFish(f){
  if(!f) return;
  var hs=SPECIES[f.sp];
  G.showcase.push({ sp:f.sp, rank:f.rank, x:120+gameRnd()*720, y:140+gameRnd()*220,
                    dir:gameRnd()<0.5?1:-1, bob:gameRnd()*6.28, name:(hs?hs.name:'?') });
  removeFish(f);
  burst(f.x,f.y,20,'#ffe0a0');
  for(var i=0;i<12;i++) G.bubbles.push({x:f.x+(gameRnd()-0.5)*20,y:f.y,r:1+Math.round(gameRnd()*2),v:30+gameRnd()*24,w:gameRnd()*6.28});
  sfx('discover');
  G.stats.settled=(G.stats.settled||0)+1;
  recalcOxygen(); save();
  toast((hs?hs.name:'FISH')+' MOVED TO YOUR SHOWCASE TANK');
}
function releaseFish(f){
  if(!f) return;
  var gain=sellPrice(f);
  addPearls(gain);
  removeFish(f);
  burst(f.x,f.y,18,'#bff0ff');
  for(var i=0;i<10;i++) G.bubbles.push({x:f.x+(gameRnd()-0.5)*20,y:f.y,r:1+Math.round(gameRnd()*2),v:40+gameRnd()*30,w:gameRnd()*6.28});
  sfx('release');
  G.stats.released=(G.stats.released||0)+1;
  recalcOxygen(); save();
  toast('SOLD FOR '+gain+' PEARLS  -  STILL IN YOUR CODEX');
}
function toast(msg){ G.toast={msg:msg,t:2.2}; }
function rollQuest(exclude){
  var taken={}, i;
  for(i=0;i<G.quests.length;i++) taken[G.quests[i].id]=true;
  if(exclude) taken[exclude]=true;                 // the one just finished must not come straight back
  var pool=QUEST_POOL.filter(function(q){ return !taken[q.id]; });
  if(!pool.length) pool=QUEST_POOL.filter(function(q){ return !taken[q.id] || q.id!==exclude; });
  if(!pool.length) pool=QUEST_POOL;
  var q=pool[Math.floor(gameRnd()*pool.length)];
  return { id:q.id, prog:0 };
}
function fillQuests(exclude){ while(G.quests.length<3) G.quests.push(rollQuest(exclude)); }
function checkAchs(){
  for(var i=0;i<ACHS.length;i++){
    var a=ACHS[i];
    if(G.achs[a.id]) continue;
    if((G.stats[a.stat]||0) < a.goal) continue;
    G.achs[a.id]=true;
    G.unlocked[a.gives]=true;
    addStars(2);
    var sp=SPECIES[a.gives];
    G.event={ title:'UNLOCKED', sub:sp?sp.name:a.gives, id:a.gives, t:EVENT_T, new:true, ach:true };
    G.timeScale=0.15;
    addPearls(150);
    sfx('ach');
    save();
  }
}
function bumpStat(k,n){ G.stats[k]=(G.stats[k]||0)+(n||1); checkAchs(); checkBadges(); }
function checkBadges(){
  for(var i=0;i<BADGES.length;i++){
    var b=BADGES[i];
    if(G.badges[b.id]) continue;
    if(badgeStat(b) < b.goal) continue;
    G.badges[b.id]=true;
    addPearls(b.reward);
    addStars(b.id==='b_disc46'?5:(b.id==='b_disc25'?3:2));
    G.event={ title:'BADGE EARNED', sub:b.text+'  +'+b.reward+'  +'+(b.id==='b_disc46'?5:(b.id==='b_disc25'?3:2))+'\u2605', id:null, t:EVENT_T, new:false, badge:true };
    sfx('ach');
    save();
  }
}
function questEvent(ev,n){
  n=n||1;
  for(var i=0;i<G.quests.length;i++){
    var q=G.quests[i], d=questDef(q.id);
    if(!d || d.ev!==ev) continue;
    q.prog+=n;
    if(q.prog>=d.goal){
      addPearls(d.reward);
      sfx('quest');
      toast('QUEST DONE: +'+d.reward+' PEARLS');
      var done=q.id;
      G.quests.splice(i,1); i--;
      fillQuests(done);
    }
  }
}
function burst(x,y,n,col){
  for(var i=0;i<n;i++){
    var a=gameRnd()*6.283, s=20+gameRnd()*120;
    G.parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:0.5+gameRnd()*0.7,t:0,col:col});
  }
}

/* ============================================================
   SIMULATION
   ============================================================ */
function tankFull(){ return G.oxyUse+RANK_O2[0] > G.oxyCap; }
function setBiome(id){
  var d=biomeDef(id);
  if(!G.biomesOwned[id]){
    if(G.pearls<d.cost){ toast('NOT ENOUGH PEARLS'); sfx('nope'); return false; }
    addPearls(-d.cost); G.biomesOwned[id]=true;
  }
  G.biome=id;
  bakeScene();                       // every layer is regenerated, not recoloured
  AU.bpm=d.bpm; SC=d.scale; AU.step=0;
  recalcEnv(); recalcOxygen();
  sfx('decor');
  toast(d.name+'  -  '+d.desc);
  save();
  return true;
}
function decorAt(x){
  for(var i=G.decor.length-1;i>=0;i--){
    var d=decorDef(G.decor[i].id);
    if(!d) continue;
    if(Math.abs(x-G.decor[i].x) < d.w*0.5+4) return i;
  }
  return -1;
}
function placeDecor(x){
  var d=G.placing ? decorDef(G.placing) : DECOR[G.buildIdx];
  if(!d) return;
  if(G.decor.length>=DECOR_MAX){ toast('NO ROOM LEFT ON THE FLOOR'); return; }
  if(G.pearls<d.cost){ toast('NOT ENOUGH PEARLS'); sfx('nope'); return; }
  x=Math.max(40,Math.min(W-40,x));
  if(decorAt(x)>=0){ toast('SOMETHING IS ALREADY THERE'); return; }
  addPearls(-d.cost);
  G.decor.push({ id:d.id, x:Math.round(x), v:Math.floor(gameRnd()*2) });
  recalcEnv(); recalcOxygen(); questEvent('decor',1);
  sfx('decor');
  burst(x,FLOOR-10,14,'#9ee08a');
  toast(d.name+' PLANTED  (+'+d.axis+(d.o2?'  +'+d.o2+' O2':'')+')');
  save();
}
function removeDecor(i){
  var d=decorDef(G.decor[i].id);
  if(!d) return;
  G.decor.splice(i,1);
  var back=Math.round(d.cost*0.5);
  addPearls(back);
  recalcEnv(); recalcOxygen(); sfx('decor'); save();
  toast('REMOVED '+d.name+'  (+'+back+' PEARLS BACK)');
}
function spawnFry(){
  var pool=availableBase();
  var id=pool[Math.floor(gameRnd()*pool.length)];
  var f=makeFish(id,0,80+gameRnd()*(W-160),SURFACE+40+gameRnd()*60);
  G.fish.push(f); discover(id);
  G.parts.push({x:f.x,y:f.y,vx:0,vy:0,life:0.6,t:0,col:'#9ff0e0'});
  burst(f.x,f.y,10,'#9ff0e0');
  recalcOxygen(); save();
}
function feedBaby(f){
  /* one tap = one mouthful: drop hunger and push growth, exactly like eating a pellet.
     About three taps takes a fresh fry to full grown, as it used to. */
  f.hunger=Math.max(0, f.hunger-0.34);
  f.age=Math.min(1, f.age + 0.34);
  f.diet[AXES[0]]=Math.min(100, (f.diet[AXES[0]]||0)+1.5);
  burst(f.x, f.y-4, 4, '#cfe9d8');
  bumpStat('fed',1); questEvent('feed',1);
  sfx('feed');
  if(f.age>=1){ f.ripe=RIPEN; f.ready=false; burst(f.x,f.y,10,'#bff0ff'); toast('ALL GROWN UP!'); }
}
function dropFood(x,y){
  var f=FOODS[G.foodIdx];
  if(f.cost>0){
    if(G.pearls<f.cost){ toast('NOT ENOUGH PEARLS'); sfx('nope'); return; }
    addPearls(-f.cost);
  }
  for(var i=0;i<4;i++){
    G.pellets.push({x:x+(gameRnd()-0.5)*26,y:y+(gameRnd()-0.5)*14,vy:14+gameRnd()*10,food:f.id,axis:f.axis,taken:false});
  }
  if(f.axis) questEvent('special',1);
  G.stats.fed=(G.stats.fed||0)+1;
  sfx('feed');
}
function update(dt){
  G.t+=dt; G.frames++;
  musicTick();
  tipTick(dt);
  var i,f;

  if(G.event){
    G.event.t-=dt;
    if(G.event.t<=0){ G.event=null; G.timeScale=1; }
  }
  if(G.toast){ G.toast.t-=dt; if(G.toast.t<=0) G.toast=null; }
  if(G.spawnTimer>0){ G.spawnTimer=Math.max(0,G.spawnTimer-dt); }

  /* pellets sink */
  for(i=G.pellets.length-1;i>=0;i--){
    var p=G.pellets[i];
    p.y+=p.vy*dt; p.x+=Math.sin(G.t*2+p.y*0.05)*6*dt;
    if(p.y>FLOOR-4 || p.taken) G.pellets.splice(i,1);
  }

  /* fish */
  var pending=[];
  for(i=0;i<G.fish.length;i++){
    f=G.fish[i];
    var sp=SPECIES[f.sp];
    if(f.flash>0) f.flash-=dt;

    if(f.held) continue;

    f.hunger=Math.min(1,f.hunger+dt*0.022);

    /* seek food */
    var target=null, bd=1e9;
    for(var j=0;j<G.pellets.length;j++){
      var q=G.pellets[j];
      var d2=(q.x-f.x)*(q.x-f.x)+(q.y-f.y)*(q.y-f.y);
      if(d2<bd && d2<230*230){ bd=d2; target=q; }
    }
    if(target){
      f.tx=target.x; f.ty=target.y;
      if(bd<12*12){
        target.taken=true;
        f.hunger=Math.max(0,f.hunger-0.34);
        f.age=Math.min(1,f.age+(0.10+(target.axis?0.06:0))*(G.stagnant?0.5:1));
        if(target.axis) f.diet[target.axis]=Math.min(100,f.diet[target.axis]+2.5);
        burst(target.x,target.y,3,'#cfe9d8');
      }
    } else if(f.ready && f.mate){
      f.tx=f.mate.x; f.ty=f.mate.y;       // courtship beats wandering
    } else {
      f.retarget-=dt;
      f.homeX += (gameRnd()-0.5)*14*dt;   // the patch itself drifts, slowly
      f.homeY += (gameRnd()-0.5)*8*dt;
      f.homeX = Math.max(70,Math.min(W-70,f.homeX));
      f.homeY = Math.max(SURFACE+50,Math.min(FLOOR-40,f.homeY));
      if((Math.abs(f.tx-f.x)<26 && Math.abs(f.ty-f.y)<26) || f.retarget<=0){
        f.retarget = 3.5+gameRnd()*5;
        f.tx = Math.max(36,Math.min(W-36, f.homeX+(gameRnd()*2-1)*f.roam));
        f.ty = Math.max(SURFACE+26,Math.min(FLOOR-26, f.homeY+(gameRnd()*2-1)*f.roam*0.45));
      }
    }

    /* move */
    var mv = sp.move||'swim';
    var spd = RANK_LEN[f.rank]*0.75 * f.pace
            * (G.stagnant?0.45:1)
            * (sp.axes.indexOf('FLOW')>=0?1.4:1)
            * (f.bottom?0.7:1)
            * (mv==='drift'?0.30:(mv==='hover'?0.42:(mv==='crawl'?0.55:1)));
    var dx=f.tx-f.x, dy=f.ty-f.y, dl=Math.hypot(dx,dy)||1;
    f.vx += (dx/dl*spd - f.vx)*Math.min(1,dt*1.6);
    f.vy += (dy/dl*spd*0.7 - f.vy)*Math.min(1,dt*1.6);
    /* who is my kind, ripe, and closest? Home ranges mean they would never
       bump into each other by chance, so ripe fish go looking. */
    f.mate=null;
    if(f.ready && !f.held && !G.event){
      var mb=1e9;
      for(var m2=0;m2<G.fish.length;m2++){
        var cand=G.fish[m2];
        if(cand===f || !cand.ready || cand.held) continue;
        var mk=mergeKind(f,cand);
        /* AUTO only climbs the ladder. Two ripe MUTANTS are also "same kind and
           rank" - but that pairing is the 10%/90% gamble, and the game must never
           gamble the player's mutants away on its own. */
        if(mk!=='rank' && mk!=='evolve') continue;
        var md=Math.hypot(cand.x-f.x,cand.y-f.y);
        if(md<mb){ mb=md; f.mate=cand; }
      }
      if(f.mate && mb < (RANK_LEN[f.rank]+RANK_LEN[f.mate.rank])*0.24) pending.push([f,f.mate]);
    }

    /* separation */
    var sx=0, sy=0;
    for(var s2=0;s2<G.fish.length;s2++){
      var o=G.fish[s2];
      if(o===f || o===f.mate) continue;   // a courting pair must be allowed to touch
      var ox=f.x-o.x, oy=f.y-o.y, od=Math.hypot(ox,oy);
      var need=(RANK_LEN[f.rank]+RANK_LEN[o.rank])*0.40;
      if(od<need && od>0.001){ sx+=ox/od*(need-od); sy+=oy/od*(need-od); }
      else if(od<=0.001){ sx+=1; sy+=1; }
    }
    f.vx += Math.max(-90,Math.min(90,sx*3))*dt*2;
    f.vy += Math.max(-90,Math.min(90,sy*3))*dt*2;
    f.x+=f.vx*dt; f.y+=f.vy*dt;
    f.bob+=dt*(mv==='drift'?1.2:3);
    f.y+=Math.sin(f.bob)*(mv==='drift'?22:6)*dt;   // jellyfish pulse instead of swim
    if(f.x<26){ f.x=26; f.tx=f.x+80+gameRnd()*160; f.homeX=Math.max(f.homeX,90); f.vx=Math.abs(f.vx); }
    if(f.x>W-26){ f.x=W-26; f.tx=f.x-80-gameRnd()*160; f.homeX=Math.min(f.homeX,W-90); f.vx=-Math.abs(f.vx); }
    if(f.y<SURFACE+16){ f.y=SURFACE+16; f.ty=f.y+60+gameRnd()*90; f.vy=Math.abs(f.vy); }
    if(f.y>FLOOR-10){ f.y=FLOOR-10; f.ty=f.y-60-gameRnd()*90; f.vy=-Math.abs(f.vy); }
    if(Math.abs(f.vx)>3) f.dir = f.vx<0?-1:1;
    f.frame = (f.frame + dt*(4+Math.min(6,Math.abs(f.vx)*0.12))) % FRAMES;

    /* The tank leans on every fish - and old leanings fade.
       Without the decay every axis creeps to 100, argmax becomes a coin toss and the
       player's whole lever dies: you could never re-steer a fish either. */
    for(var ea=0;ea<AXES.length;ea++){
      var eax=AXES[ea];
      f.diet[eax] *= (1 - dt*0.004);                 // half-life about three minutes
      if(G.env[eax]>0) f.diet[eax]=Math.min(100,f.diet[eax]+G.env[eax]*dt*0.10);
    }
    if(!f._ax40){
      for(var eb=0;eb<AXES.length;eb++) if(f.diet[AXES[eb]]>=40){ f._ax40=true; questEvent('axis40',1); break; }
    }

    /* an adult ripens for a minute, then looks for its own kind (RIPEN) */
    if(f.age>=1){
      if(f.ripe>0){ f.ripe-=dt; if(f.ripe<=0){ f.ripe=0; f.ready=true; } }
    } else { f.ripe=RIPEN; f.ready=false; }

    /* grow with time when fed */
    if(f.hunger<0.6) f.age=Math.min(1,f.age+dt*0.02*(G.stagnant?0.5:1));

    /* breed. Base species are prolific; everything else is slow but never zero -
       an evolved fish with no possible partner would be a dead end. */
    if(f.age>=1 && f.hunger<0.45 && !G.stagnant){
      f.breed-=dt*(sp.base?1:0.4);
      if(f.breed<=0){
        f.breed=20+gameRnd()*20;
        if(G.oxyUse+RANK_O2[0] <= G.oxyCap && G.fish.length<44){
          var kid=makeFish(f.sp,0,f.x+(gameRnd()-0.5)*30,f.y+10);
          G.fish.push(kid); recalcOxygen();
          burst(kid.x,kid.y,6,'#bff0ff');
        }
      }
    }
  }

  /* couples that touched this frame - merged after the loop, never during it */
  for(i=0;i<pending.length;i++){
    var pa=pending[i][0], pb=pending[i][1];
    if(G.fish.indexOf(pa)<0 || G.fish.indexOf(pb)<0) continue;
    tryMerge(pa,pb);
  }

  /* particles */
  for(i=G.parts.length-1;i>=0;i--){
    var pt=G.parts[i];
    pt.t+=dt; pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.vy+=12*dt; pt.vx*=0.96;
    if(pt.t>=pt.life) G.parts.splice(i,1);
  }
  /* ambient bubbles */
  if(G.bubbles.length<40 && gameRnd()<dt*8){
    G.bubbles.push({x:20+gameRnd()*(W-40),y:FLOOR-4,r:1+Math.round(gameRnd()*2),v:16+gameRnd()*24,w:gameRnd()*6.28});
  }
  for(i=0;i<G.decor.length;i++){
    if(G.decor[i].id==='vent' && G.bubbles.length<70 && gameRnd()<dt*7){
      G.bubbles.push({x:G.decor[i].x+(gameRnd()-0.5)*8,y:FLOOR-26,r:1+Math.round(gameRnd()*2),v:34+gameRnd()*30,w:gameRnd()*6.28});
    }
  }
  for(i=G.bubbles.length-1;i>=0;i--){
    var b=G.bubbles[i]; b.y-=b.v*dt; b.w+=dt*2;
    if(b.y<SURFACE) G.bubbles.splice(i,1);
  }
  recalcOxygen();
}

var cv=document.getElementById('cv');
var ctx=cv.getContext('2d');
function drawScene(c){
  c.drawImage(SPR.bg,0,0);
  c.drawImage(SPR.far,0,0);
  c.drawImage(SPR.mid,0,0);
  /* mid plants */
  for(var i=0;i<SPR.plantsMid.length;i++){
    var p=SPR.plantsMid[i];
    c.drawImage(p, 40+i*240, FLOOR-p.height+10);
  }
  c.drawImage(SPR.floorL,0,FLOOR-8);
  var orn=equipped('ornament');
  if(orn.val && SPR.orn[orn.val]){
    var oimg=SPR.orn[orn.val];
    c.drawImage(oimg, Math.round(W*0.5-oimg.width/2), FLOOR-oimg.height+8);
  }
  /* decor sits on the floor, behind everything alive */
  for(var di=0;di<G.decor.length;di++){
    var dd=G.decor[di], def=decorDef(dd.id);
    if(!def) continue;
    var dimg=decorImg(dd.id, dd.v||0, Math.floor(G.t*5 + (dd.x||0)*0.07));
    if(!dimg) continue;
    c.drawImage(dimg, Math.round(dd.x-dimg.width/2), FLOOR-dimg.height+6);
    if(G.buildOpen && G.buildTab==='decor'){
      /* name tag so you can tell what you planted */
      var def2=decorDef(dd.id);
      text(c, def2?def2.name.split(' ')[0]:'', dd.x, FLOOR-dimg.height-30, 6, '#bfe8f0', 'center');
      /* an explicit little bin button - the ONLY way to remove, so nothing goes by accident */
      var bxx=dd.x, byy=FLOOR-dimg.height-20;
      circ(c,bxx,byy,10,'#7a2030'); circ(c,bxx,byy,9,'#b83048');
      rp(c,bxx-4,byy-1,8,2,'#ffe0e8'); rp(c,bxx-1,byy-4,2,8,'#ffe0e8');
      dd._bin={x:bxx-12,y:byy-12,w:24,h:24};
    } else { dd._bin=null; }
  }
  /* caustics on floor */
  c.globalCompositeOperation='lighter';
  c.drawImage(SPR.caustic[Math.floor(G.t*6)%6],0,FLOOR-30);
  c.globalCompositeOperation='source-over';

  /* far-plane fish, then haze, then near-plane fish */
  var far=[], near=[];
  for(var k=0;k<G.fish.length;k++) (G.fish[k].z<0.75?far:near).push(G.fish[k]);
  far.sort(byY); near.sort(byY);
  for(var a=0;a<far.length;a++) drawFish(c,far[a],0.78);
  c.fillStyle='rgba(28,110,126,0.28)'; c.fillRect(0,SURFACE-8,W,FLOOR-SURFACE+16);
  for(var b=0;b<near.length;b++) drawFish(c,near[b],1);

  /* a ghost of what you are about to plant, exactly where it will stand */
  /* a translucent piece stuck to the finger, shown ONLY while actively placing.
     No more stray dashed line at the left edge - the ghost simply does not exist
     unless you are holding something. */
  if(G.placing){
    var gd=decorDef(G.placing);
    var gimg=gd ? decorImg(gd.id,0,0) : null;
    if(gimg){
      /* the piece sits ON THE FLOOR at the finger's x; if the finger hasn't touched
         yet, park it at centre. It always stands on the floor, never floats. */
      var gx2 = G.ptrIn ? G.ptr.x : W/2;
      gx2 = Math.max(120+gimg.width/2, Math.min(W-40-gimg.width/2, gx2));  // stay clear of MENU/left wall
      var spot = decorAt(gx2);
      var blocked = spot>=0 || G.pearls<gd.cost || G.decor.length>=DECOR_MAX;
      var col = blocked ? '#ff5050' : '#00ff5a';
      var gxl = Math.round(gx2-gimg.width/2), gyt = FLOOR-gimg.height+6;
      /* the translucent piece, standing on the floor */
      c.globalAlpha = blocked ? 0.4 : 0.72;
      c.drawImage(gimg, gxl, gyt);
      c.globalAlpha = 1;
      /* a tidy baseline marker directly beneath it - a bracket, not a stray line */
      c.globalAlpha = 0.85;
      rp(c, gxl, FLOOR+4, gimg.width, 2, col);
      rp(c, gxl, FLOOR+4, 2, 6, col);
      rp(c, gxl+gimg.width-2, FLOOR+4, 2, 6, col);
      c.globalAlpha = 1;
      var lbl = G.pearls<gd.cost ? 'NOT ENOUGH PEARLS'
              : (G.decor.length>=DECOR_MAX ? 'NO ROOM LEFT'
              : (spot>=0 ? 'SPOT TAKEN - MOVE OVER' : 'TAP HERE TO PLACE'));
      panel(c, gx2-90, gyt-26, 180, 18, 'rgba(6,26,34,0.85)');
      text(c, lbl, gx2, gyt-22, 7, col, 'center');
    }
  }

  /* pellets */
  for(var p2=0;p2<G.pellets.length;p2++){
    var q=G.pellets[p2];
    c.drawImage(SPR.food[q.food], Math.round(q.x-3), Math.round(q.y-3));
  }
  /* particles */
  for(var t=0;t<G.parts.length;t++){
    var pt=G.parts[t];
    var al=1-pt.t/pt.life;
    c.globalAlpha=Math.max(0,al); c.fillStyle=pt.col;
    c.fillRect(pt.x|0,pt.y|0,2,2); c.globalAlpha=1;
  }
  /* bubbles */
  c.globalAlpha=0.5;
  for(var u=0;u<G.bubbles.length;u++){
    var bb=G.bubbles[u];
    circ(c,bb.x+Math.sin(bb.w)*4,bb.y,bb.r,'#bff2ff');
  }
  c.globalAlpha=1;
  /* light */
  c.globalCompositeOperation='lighter';
  c.drawImage(SPR.rays,0,0);
  c.globalCompositeOperation='source-over';
  c.drawImage(SPR.front,0,0);
  var tint=equipped('tint');
  if(tint.val){ c.fillStyle=tint.val; c.fillRect(0,SURFACE,W,H-SURFACE); }
  c.drawImage(SPR.glass,0,0);

  var fr=equipped('frame');
  if(fr.val){ c.fillStyle=fr.val; c.fillRect(0,0,W,4); c.fillRect(0,H-4,W,4); c.fillRect(0,0,4,H); c.fillRect(W-4,0,4,H); }
}
function byY(a,b){ return a.y-b.y; }
function drawFish(c,f,alpha){
  var sp=SPECIES[f.sp];
  var arr=fishFrames(f.sp,f.rank);
  var img=arr[Math.floor(f.frame)%FRAMES] || arr[0];
  if(!img) return;
  var scale = (f.age<0.34?0.62:(f.age<1?0.82:1)) * (alpha<1?0.88:1);
  var w=Math.max(2,Math.round(img.width*scale)), h=Math.max(2,Math.round(img.height*scale));
  var x=Math.round(f.x-w/2), y=Math.round(f.y-h/2);
  var gl=fishGlow(f.sp);
  if(gl){
    var g=gl;
    var gw=Math.max(4,Math.round(g.width*(RANK_LEN[f.rank]/RANK_LEN[2])*scale));
    c.globalCompositeOperation='lighter';
    c.globalAlpha=0.6*alpha;
    c.drawImage(g,Math.round(f.x-gw/2),Math.round(f.y-gw/2),gw,gw);
    c.globalAlpha=1; c.globalCompositeOperation='source-over';
  }
  c.globalAlpha=alpha * (G.stagnant?0.7:1);
  if(f.held){ c.globalAlpha=1; }
  f._flip = (f.dir<0);
  if(f._flip){
    c.save(); c.translate(x+w,y); c.scale(-1,1); c.drawImage(img,0,0,w,h); c.restore();
  } else {
    c.drawImage(img,x,y,w,h);
  }
  c.globalAlpha=1;
  /* ready glyph + the minute ticking away */
  if(f.age>=1 && !f.held && alpha>0.9){
    var topY=Math.round(f.y-RANK_LEN[f.rank]*0.42)-12;
    var isLeaf = isFinalForm(f.sp);
    if(f.ready && isLeaf){
      /* a final form: a small calm crown, not the green "ready to merge" chain -
         merging it leads nowhere and used to just eat one fish */
      c.globalAlpha=0.7+Math.sin(G.t*3+f.bob)*0.2;
      var cyy=topY+4;
      rp(c,Math.round(f.x)-7,cyy+4,14,2,'#c8a44e');
      for(var cr=0;cr<3;cr++) rp(c,Math.round(f.x)-6+cr*5,cyy,2,4,'#e8cc70');
      px(c,Math.round(f.x),cyy-1,'#fff0c0');
      c.globalAlpha=1;
    } else if(f.ready && SPR.ready){
      var rimg2=SPR.ready;
      var bobY=Math.round(Math.sin(G.t*4+f.bob)*2);
      c.globalAlpha=0.85+Math.sin(G.t*5+f.bob)*0.15;
      c.drawImage(rimg2,Math.round(f.x-rimg2.width/2),topY+bobY);
      c.globalAlpha=1;
    } else if(f.ripe>0 && f.ripe<RIPEN){
      var bw=Math.round(RANK_LEN[f.rank]*0.42);
      var fw=Math.round((1-f.ripe/RIPEN)*bw);
      rp(c,Math.round(f.x-bw/2)-1,topY+8,bw+2,3,'rgba(6,32,42,0.55)');
      if(fw>0) rp(c,Math.round(f.x-bw/2),topY+9,fw,1,'rgba(190,240,250,0.75)');
    }
  }

  /* drag target hint: dashed ring in a reserved signal colour, never a soft halo.
     green = safe, orange = risky, red = you may lose both. */
  if(G.drag && G.drag!==f){
    var kind=mergeKind(G.drag,f);
    var ly=Math.round(f.y-RANK_LEN[f.rank]*0.78)-16;
    /* an elder is the true top: honest grey, never a green promise */
    if(kind==='apex'){
      c.globalAlpha=0.5+Math.sin(G.t*5)*0.2;
      var rr=Math.round(RANK_LEN[f.rank]*0.6);
      for(var da=0;da<16;da++){ var an=da/16*6.28; if(da%2) continue;
        px(c,Math.round(f.x+Math.cos(an)*rr),Math.round(f.y+Math.sin(an)*rr),'#9aa4b2'); }
      c.globalAlpha=1;
      text(c,'NOTHING BEYOND AN ELDER',f.x,ly,8,'#c8a44e','center');
    } else if(kind){
      var key = kind==='chimera' ? 'chimera' : (kind==='unstable' ? 'unstable' : 'ok');
      var rimg = SPR.ring[key] ? SPR.ring[key][f.rank] : null;
      if(rimg){
        c.globalAlpha=0.6+Math.sin(G.t*9)*0.35;
        c.drawImage(rimg,Math.round(f.x-rimg.width/2),Math.round(f.y-rimg.height/2));
        c.globalAlpha=1;
      }
      if(kind==='chimera')      text(c,'30% CHIMERA',f.x,ly,9,SIGNAL.chimera,'center');
      else if(kind==='unstable')text(c,'25% MUTANT',f.x,ly,8,SIGNAL.unstable,'center');
      else if(kind==='elder')   text(c,'\u2605 MAKE AN ELDER',f.x,ly,9,'#ffd98a','center');
    }
  }
}

/* A phone squeezes the 960x540 field to about 0.72 of itself, so an 8px label
   lands as 5.8 real pixels. The brief says never below 11 - and it was right.
   One place to enforce it, instead of 70 literals. */
var UI_SCALE = 1.5, UI_MIN = 14;   // 14 logical px = ~10 real px on a phone. 11 was still too small.
function ts(size){ return Math.max(UI_MIN, Math.round(size*UI_SCALE)); }

  c.fillStyle='#04121a'; c.fillText(s,x+2,y+2);
  c.fillStyle=col; c.fillText(s,x,y);
}

}

function sessionStart(){

             mutants:G.stats.mutants|0, chimeras:G.stats.chimeras|0,

}

/* THE RULE: the tank grows and breeds while you are gone, but it NEVER merges.
   A merge is the moment a new creature appears, and that has to happen in front
   of the child - not in an empty room. You come back to a tank full of ripe fish. */
var AWAY_CAP = 8*3600;
function runAway(sec){
  sec=Math.max(0,Math.min(AWAY_CAP,sec));
  if(sec<120) return null;
  var grown=0, hatched=0, i;
  for(i=0;i<G.fish.length;i++){
    var f=G.fish[i];
    if(f.age<1){
      var before=f.age;
      f.age=Math.min(1, f.age + sec*0.006);      // slow: nobody was feeding them
      if(before<1 && f.age>=1){ grown++; f.ripe=RIPEN; }
    }
    if(f.age>=1) f.ripe=Math.max(0, f.ripe - sec);
    f.ready = (f.age>=1 && f.ripe<=0);
    f.hunger=Math.min(1, f.hunger + sec*0.0004);  // and they are hungry when you return
  }
  var adults=G.fish.filter(function(x){ return x.age>=1; });
  var want=Math.floor(adults.length * sec/900);
  for(i=0;i<want && i<10;i++){
    recalcOxygen();
    if(G.oxyUse+RANK_O2[0] > G.oxyCap || G.fish.length>=44) break;
    var par=adults[Math.floor(gameRnd()*adults.length)];
    if(!par) break;
    var kid=makeFish(par.sp,0,80+gameRnd()*(W-160),SURFACE+60+gameRnd()*180);
    G.fish.push(kid); hatched++;
  }
  recalcOxygen();
  if(!grown && !hatched) return null;
  return { grown:grown, hatched:hatched, sec:sec };
}
function awayText(sec){
  var h=Math.floor(sec/3600), m=Math.round((sec%3600)/60);
  if(h>0) return h+'h '+m+'m';
  return m+'m';
}

    text(c,'HOLD A FINAL FORM OVER THE BOTTOM BAR IN THE TANK',W/2,H/2+8,8,'#9fc8c0','center');
    text(c,'AND CHOOSE  \u2605 KEEP IN SHOWCASE  INSTEAD OF SELLING',W/2,H/2+28,8,'#9fc8c0','center');
  }

  /* the trophy fish - stand still in MOVE mode so you can arrange them, drift otherwise */
  for(var i=0;i<G.showcase.length;i++){
    var z=G.showcase[i];
    if(G.scTool!=='move' || G.scDrag===z){
      // gentle drift when not arranging
      if(G.scDrag!==z){ z.x += Math.sin(G.t*0.5+z.bob)*0.25*z.dir;
        if(z.x<80){ z.x=80; z.dir=1; } if(z.x>W-80){ z.x=W-80; z.dir=-1; } }
    }
    var by=(G.scDrag===z)?z.y:z.y+Math.sin(G.t*1.1+z.bob)*5;
    var frames=fishFrames(z.sp,z.rank);
    var img=frames[Math.floor(G.t*3+z.bob)%frames.length]||frames[0];
    var gl=fishGlow(z.sp);
    if(gl){ c.globalAlpha=0.5; c.drawImage(gl,Math.round(z.x-gl.width/2),Math.round(by-gl.height/2)); c.globalAlpha=1; }
    c.save();
    if(z.dir<0){ c.translate(Math.round(z.x),0); c.scale(-1,1); c.drawImage(img,Math.round(-img.width/2),Math.round(by-img.height/2)); }
    else c.drawImage(img,Math.round(z.x-img.width/2),Math.round(by-img.height/2));
    c.restore();
    rp(c,Math.round(z.x)-6,Math.round(by-img.height/2)-8,12,2,'#c8a44e');   // gold crown
    /* a custom name under the fish, if given */
    if(z.custom) text(c, z.custom, z.x, by+img.height/2+4, 7, '#ffe0a0', 'center');
    /* in move mode, a faint handle ring so it reads as draggable */
    if(G.scTool==='move'){ c.globalAlpha=0.3; rp(c,Math.round(z.x)-1,Math.round(by)-1,2,2,'#eafffb'); c.globalAlpha=1; }
  }

  /* the decor ghost being placed follows the finger, on the floor */
  if(G.scPlacing){
    var gd=decorDef(G.scPlacing), gimg=gd?decorImg(gd.id,0,0):null;
    if(gimg){
      var gx=G.ptrIn?Math.max(40+gimg.width/2,Math.min(W-40-gimg.width/2,G.ptr.x)):W/2;
      c.globalAlpha=0.7; c.drawImage(gimg, Math.round(gx-gimg.width/2), FLOOR-gimg.height+6); c.globalAlpha=1;
      rp(c, Math.round(gx-gimg.width/2), FLOOR+4, gimg.width, 2, '#00ff5a');
      panel(c,gx-70,FLOOR-gimg.height-24,140,18,'rgba(6,26,34,0.85)');
      text(c,'TAP TO PLACE',gx,FLOOR-gimg.height-20,7,'#00ff5a','center');
    }
  }

  /* the tool bar */
  var tools=[['move','MOVE'],['decorate','DECORATE'],['name','NAME']];
  var tw=200, gap=10, totalT=tools.length*tw+(tools.length-1)*gap, tx0=(W-totalT)/2;
  BTN={};
  for(var t=0;t<tools.length;t++){
    var on=(G.scTool===tools[t][0]), bx=tx0+t*(tw+gap);
    panel(c,bx,H-42,tw,30, on?'#175f6d':'#0e3a47');
    text(c,tools[t][1],bx+tw/2,H-34,9, on?'#eafffb':'#8fb8c0','center');
    BTN['sctool'+t]={x:bx,y:H-42,w:tw,h:30,_k:tools[t][0]};
  }
  panel(c,12,H-42,86,30,'#175f6d'); text(c,'BACK',55,H-34,9,'#eafffb','center');
  BTN.back={x:12,y:H-42,w:86,h:30};

  /* a one-line hint for the active tool */
  var hint = G.scTool==='move' ? 'DRAG YOUR FISH TO ARRANGE THEM'
           : G.scTool==='decorate' ? 'PICK A DECOR BELOW, THEN TAP THE FLOOR'
           : 'TAP A FISH TO NAME IT';
  text(c,hint,W/2,H-58,7,'#9fe8dc','center');

  /* decorate mode: a little tray of owned decor to pick from */
  if(G.scTool==='decorate'){
    var owned=DECOR;   // all decor kinds are buildable; showcase placement is free (cosmetic)
    var sw2=Math.min(120,Math.floor((W-40)/owned.length)-6), sy=H-104;
    for(var k=0;k<owned.length;k++){
      var sx=20+k*(sw2+6), sel=(G.scPlacing===owned[k].id);
      panel(c,sx,sy,sw2,40, sel?'#175f6d':'#0a2a36');
      var di2=decorImg(owned[k].id,0,0);
      if(di2){ var ds=Math.min(sw2/di2.width,36/di2.height,1); c.drawImage(di2, Math.round(sx+sw2/2-di2.width*ds/2), Math.round(sy+38-di2.height*ds), Math.round(di2.width*ds), Math.round(di2.height*ds)); }
      BTN['scdec'+k]={x:sx,y:sy,w:sw2,h:40,_id:owned[k].id};
    }
  }
}

function codexPages(){ return Math.ceil(SPECIES_ORDER.length/CODEX_PER_PAGE); }
function codexCell(i){
  var k=i%CODEX_PER_PAGE, cols=5, cw=182, ch=96;
  return { x:16+(k%cols)*(cw+4), y:52+Math.floor(k/cols)*(ch+4), w:cw, h:ch };

function foodForAxis(ax){
  for(var i=0;i<FOODS.length;i++) if(FOODS[i].axis===ax) return FOODS[i].name;
  return 'ANY FOOD';
}
/* where does this creature come from? shown even for locked ones - it IS the hint */
function codexHint(id){
  var sp=SPECIES[id], k;
  if(sp.base && !sp.locked) return 'ALREADY IN YOUR TANK';
  if(sp.base && sp.locked){
    for(var ac=0;ac<ACHS.length;ac++) if(ACHS[ac].gives===id) return 'ACHIEVEMENT: '+ACHS[ac].text;
    return 'EARNED WITH AN ACHIEVEMENT';
  }
  if(sp.chimera){
    for(k in CHIMERA) if(CHIMERA[k]===id){
      var pr=k.split('+');
      return 'CROSS '+nameOf(pr[0])+' + '+nameOf(pr[1])+', BOTH MUTANTS AT L3   (30%)';
    }
  }
  if(sp.mutantOf) return 'MERGE MISMATCHED RANKS OF '+nameOf(sp.mutantOf)+'   (25% CHANCE)';
  for(k in SPECIES){
    var par=SPECIES[k];
    for(var ax in par.evolveTo){
      if(par.evolveTo[ax]===id) return 'FEED '+foodForAxis(ax)+' TO '+par.name+', THEN L3 + L3';
    }
  }
  return 'UNKNOWN';
}
/* wrap on real width (monospace: one em per char at the LIFTED size), so the text
   never spills past the panel however the font scale changes */
function wrapText(c,str,x,y,size,col,maxW,lineH){
  var em=ts(size), perLine=Math.max(6,Math.floor(maxW/em));
  var words=str.split(' '), line='', n=0;
  for(var i=0;i<words.length;i++){
    var w=words[i];
    if(line && (line.length+1+w.length)>perLine){ text(c,line,x,y+n*lineH,size,col); n++; line=w; }
    else line = line ? line+' '+w : w;
  }
  if(line) text(c,line,x,y+n*lineH,size,col);
  return n+1;
}

  return '#9fe8dc';
}

var view={sx:1,ox:0,oy:0};
function resize(){
  /* the visual viewport is the true drawable area in a standalone iPad app;
     window.inner* can lag or include a strip that is not really there */
  var vv=window.visualViewport;
  var aw=(vv&&vv.width)||window.innerWidth||W;
  var ah=(vv&&vv.height)||window.innerHeight||H;
  var s=Math.min(aw/W,ah/H);
  var dpr=Math.min(2,window.devicePixelRatio||1);
  cv.style.width=Math.round(W*s)+'px'; cv.style.height=Math.round(H*s)+'px';
  cv.width=Math.round(W*dpr); cv.height=Math.round(H*dpr);
  ctx=cv.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  view.sx=s;
}
function toLogical(e){
  var r=cv.getBoundingClientRect();
  return { x:(e.clientX-r.left)/r.width*W, y:(e.clientY-r.top)/r.height*H };
}
function hit(b,p){ return b && p.x>=b.x && p.x<=b.x+b.w && p.y>=b.y && p.y<=b.y+b.h; }
function fishAt(p){
  for(var i=G.fish.length-1;i>=0;i--){
    var f=G.fish[i];
    var L=RANK_LEN[f.rank];
    if(Math.abs(p.x-f.x)<L*0.6 && Math.abs(p.y-f.y)<Math.max(14,L*0.42)) return f;
  }
  return null;
}
function onDown(e){
  armAudio();                        // iOS: never before the first touch
  var p=toLogical(e);
  G.ptr.x=p.x; G.ptr.y=p.y;
  if(G.scene==='menu'){
    if(BTN.showcase && hit(BTN.showcase,p)){ G.scene='showcase'; return; }
    if(G.confirmNew){
      if(hit(BTN.yes,p)){ G.confirmNew=false; newGame(); G.scene='tank'; }
      else if(hit(BTN.no,p)) G.confirmNew=false;
      return;
    }
    if(hit(BTN.cont,p)){ G.scene='tank'; sessionStart(); save(); }
    else if(hit(BTN.newg,p)) G.confirmNew=true;
    else if(hit(BTN.museum,p)){ G.scene='museum'; G.museumSel=null; G.museumPage=0; }
    else if(hit(BTN.awards,p)) G.scene='awards';
    else if(hit(BTN.shop,p)) G.scene='shop';
    else if(hit(BTN.board,p)){ G.scene='board'; lbSubmit(); lbFetch(); }
    return;
  }
  if(G.scene==='summary'){
    if(hit(BTN.sumOk,p)){ G.scene='menu'; sessionStart(); save(); }
    return;
  }
  if(G.scene==='awards'){ if(hit(BTN.back,p)) G.scene='menu'; return; }
  if(G.scene==='shop'){
    if(hit(BTN.back,p)){ G.scene='menu'; return; }
    for(var t2=0;t2<4;t2++){ if(BTN['stab'+t2] && hit(BTN['stab'+t2],p)){ G.shopTab=BTN['stab'+t2]._k; return; } }
    for(var sk in BTN){
      if(sk.indexOf('cos')!==0 || !hit(BTN[sk],p)) continue;
      var cm=cosmeticDef(BTN[sk]._id);
      if(!cm) continue;
      if(!G.owned[cm.id]){
        if((G.stars||0)<cm.cost){ toast('NOT ENOUGH STARS'); sfx('nope'); return; }
        addStars(-cm.cost); G.owned[cm.id]=true; sfx('quest');
      }
      G.cosmetic[cm.kind]=cm.id;
      if(cm.kind==='skin') bakeGlass();      // the skin lives in the baked glass layer
      save();
      return;
    }
    return;
  }
  if(G.scene==='showcase'){
    if(hit(BTN.back,p)){ G.scPlacing=null; G.scDrag=null; G.scene='menu'; save(); return; }
    // tool switch
    for(var t=0;t<3;t++){ if(BTN['sctool'+t] && hit(BTN['sctool'+t],p)){ G.scTool=BTN['sctool'+t]._k; G.scPlacing=null; G.scDrag=null; return; } }
    if(G.scTool==='decorate'){
      // pick a decor to place (tap tray), or place the held one on the floor
      for(var k in BTN){ if(k.indexOf('scdec')===0 && hit(BTN[k],p)){ G.scPlacing = (G.scPlacing===BTN[k]._id)?null:BTN[k]._id; return; } }
      if(G.scPlacing && p.y<H-110){
        if(G.scDecor.length>=12){ toast('SHOWCASE IS FULL'); sfx('nope'); return; }
        var gd=decorDef(G.scPlacing);
        G.scDecor.push({ id:G.scPlacing, x:Math.max(60,Math.min(W-60,p.x)) });
        sfx('decor'); save(); return;
      }
      return;
    }
    if(G.scTool==='name'){
      // tap a fish to rename it
      var nf=scFishAt(p);
      if(nf){ askShowcaseName(nf); }
      return;
    }
    // move tool: pick up a fish to drag it
    var mf=scFishAt(p);
    if(mf){ G.scDrag=mf; }
    return;
  }
  if(G.scene==='patron'){
    if(hit(BTN.back,p)){ G.scene='museum'; return; }
    for(var fk in BTN){ if(fk.indexOf('fund')===0 && hit(BTN[fk],p)){ fundPlaque(BTN[fk]._id); return; } }
    return;
  }
  if(G.scene==='museum'){
    if(G.museumSel){ if(hit(BTN.back,p)) G.museumSel=null; return; }
    if(BTN.patron && hit(BTN.patron,p)){ G.scene='patron'; return; }
    if(hit(BTN.back,p)){ G.scene='menu'; return; }
    for(var mk in BTN){ if(mk.indexOf('m_')===0 && hit(BTN[mk],p) && G.discovered[BTN[mk]._id]){ G.museumSel=BTN[mk]._id; return; } }
    return;
  }
  if(G.scene==='board'){
    if(hit(BTN.back,p)) G.scene='menu';
    else if(hit(BTN.week,p)) LB.tab='week';
    else if(hit(BTN.all,p)) LB.tab='all';
    else if(hit(BTN.refresh,p)) lbFetch();
    return;
  }
  if(G.scene==='codex'){
    if(G.codexSel){ if(hit(BTN.back,p)) G.codexSel=null; return; }
    if(hit(BTN.back,p)){ G.scene='tank'; return; }
    if(hit(BTN.prev,p)){ G.codexPage=(G.codexPage-1+codexPages())%codexPages(); return; }
    if(hit(BTN.next,p)){ G.codexPage=(G.codexPage+1)%codexPages(); return; }
    var cf=G.codexPage*CODEX_PER_PAGE, ct=Math.min(SPECIES_ORDER.length,cf+CODEX_PER_PAGE);
    for(var ci=cf;ci<ct;ci++){
      if(hit(codexCell(ci),p)){ G.codexSel=SPECIES_ORDER[ci]; return; }
    }
    return;
  }
  if(G.audioPanel){
    if(hit(BTN.audioTest,p)) audioTest();
    else if(hit(BTN.audioMuteBtn,p)) audioMute(!AU.muted);
    else if(hit(BTN.audioClose,p)) G.audioPanel=false;
    return;
  }
  if(G.event) return;
  if(G.confirmMerge){
    var cb=G.confirmBtns||{};
    if(cb.yes && hit(cb.yes,p)){
      var cm2=G.confirmMerge; G.confirmMerge=null;
      if(G.fish.indexOf(cm2.a)>=0 && G.fish.indexOf(cm2.b)>=0) tryMerge(cm2.a,cm2.b);
    } else if(cb.no && hit(cb.no,p)){
      G.confirmMerge=null; sfx('nope');
    }
    return;      // any tap while the dialog is up is consumed by it
  }
  if(dismissTip()) return;
  /* food tray */
  if(G.feedOpen){
    var ty=H-58-FOODS.length*30-8;
    for(var i=0;i<FOODS.length;i++){
      if(p.x>16 && p.x<256 && p.y>ty+4+i*30 && p.y<ty+30+i*30){ G.foodIdx=i; G.feedOpen=false; return; }
    }
  }
  if(G.buildOpen){
    if(hit(BTN.tab0,p)){ G.buildTab='decor'; G.placing=null; return; }
    if(hit(BTN.tab1,p)){ G.buildTab='tank'; G.placing=null; return; }
    if(G.buildTab==='tank'){
      for(var vj=0;vj<BIOMES.length;vj++){
        if(hit(BTN['bio'+vj],p)){ if(BIOMES[vj].id!==G.biome) setBiome(BIOMES[vj].id); return; }
      }
    } else {
      for(var bj=0;bj<DECOR.length;bj++){
        if(hit(BTN['slot'+bj],p)){
          var picked=DECOR[bj];
          if(G.placing===picked.id){ G.placing=null; }           // tap again = put it back
          else if(G.pearls<picked.cost){ toast('NOT ENOUGH PEARLS'); sfx('nope'); }
          else if(G.decor.length>=DECOR_MAX){ toast('NO ROOM - REMOVE SOMETHING FIRST'); sfx('nope'); }
          else { G.placing=picked.id; G.buildIdx=bj; sfx('decor'); }
          return;
        }
      }
    }
  }
  if(G.away){ if(hit(BTN.awayOk,p) || true){ G.away=null; } return; }
  if(hit(BTN.mute,p)){
    var nowT=Date.now();
    if(G._lastMuteTap && nowT-G._lastMuteTap<400){ G.audioPanel=true; G._lastMuteTap=0; return; }
    G._lastMuteTap=nowT;
    audioMute(!AU.muted);
    return;
  }
  if(hit(BTN.menu,p)){ G.scene = sessionEmpty() ? 'menu' : 'summary'; G.feedOpen=G.buildOpen=G.questsOpen=false; G.audioPanel=false; G.placing=null; save(); lbSubmit(); return; }
  if(BTN.rename && hit(BTN.rename,p)){ askName(); return; }
  if(hit(BTN.feed,p)){ G.feedOpen=!G.feedOpen; G.buildOpen=false; G.questsOpen=false; return; }
  if(hit(BTN.build,p)){ G.buildOpen=!G.buildOpen; G.feedOpen=false; G.questsOpen=false; G.ptrIn=false; G.placing=null; return; }
  if(hit(BTN.quests,p)){ G.questsOpen=!G.questsOpen; G.feedOpen=false; G.buildOpen=false; return; }
  if(hit(BTN.life,p)){
    if(tankFull()) toast('TANK IS FULL - MERGE SOME FISH FIRST');
    else if(G.spawnTimer<=0){ spawnFry(); G.spawnTimer=SPAWN_COOLDOWN; }
    else toast('EGG NOT READY');
    return;
  }
  if(hit(BTN.speed,p)){ G.speed = G.speed===1?2:(G.speed===2?4:1); return; }
  if(hit(BTN.codex,p)){ G.scene='codex'; G.codexSel=null; G.codexPage=0; return; }
  if(p.y>H-68 || p.y<44) return;
  if(G.buildOpen && G.buildTab==='decor'){
    /* the bin buttons come first - they are the only way to remove anything */
    for(var rb=0;rb<G.decor.length;rb++){
      var bb=G.decor[rb]._bin;
      if(bb && hit(bb,p)){ removeDecor(rb); return; }
    }
    /* only places if you are holding a piece; a taken spot is refused clearly */
    if(G.placing){
      if(decorAt(p.x)>=0){ toast('TAKEN - TAP AN EMPTY SPOT'); sfx('nope'); return; }
      placeDecor(p.x);

      return;
    }
    if(decorAt(p.x)>=0){ toast('TAP THE RED BIN TO REMOVE'); return; }
    toast('PICK A PIECE FROM THE TRAY FIRST');
    return;
  }

  var f=fishAt(p);
  if(f && f.age>=1){ G.drag=f; f.held=true; G.dragOff.x=f.x-p.x; G.dragOff.y=f.y-p.y; }
  else if(f){ feedBaby(f); }        // tap a baby to feed it directly - a few taps grow it up
  else dropFood(p.x,p.y);
}
function onMove(e){
  var p=toLogical(e);
  G.ptr.x=p.x; G.ptr.y=p.y; G.ptrIn=true;
  if(G.scene==='showcase' && G.scDrag){ G.scDrag.x=Math.max(60,Math.min(W-60,p.x)); G.scDrag.y=Math.max(60,Math.min(FLOOR-30,p.y)); return; }
  if(!G.drag) return;
  G.drag.x=Math.max(24,Math.min(W-24,p.x+G.dragOff.x));
  G.drag.y=Math.max(SURFACE+14,Math.min(FLOOR-8,p.y+G.dragOff.y));
  G.drag.vx=0; G.drag.vy=0;
}
function onUp(){
  if(G.scene==='showcase' && G.scDrag){ G.scDrag=null; save(); return; }
  if(!G.drag) return;
  var d=G.drag; d.held=false; G.drag=null;
  if(G.ptr.y>H-68){
    /* final form? honour the two-zone choice: left = settle, right = sell */
    if(isFinalForm(d.sp) && G.dropZones){
      if(G.ptr.x < G.dropZones.settle.x + G.dropZones.settle.w) settleFish(d);
      else releaseFish(d);
    } else {
      releaseFish(d);
    }
    G.dropZones=null;
    return;
  }
  var best=null,bd=1e9;
  for(var i=0;i<G.fish.length;i++){
    var f=G.fish[i];
    if(f===d) continue;
    var dd=Math.hypot(f.x-d.x,f.y-d.y);
    if(dd<bd){ bd=dd; best=f; }
  }
  if(best && bd<52){
    var kind=mergeKind(d,best);
    /* the two gambles must be confirmed, so a stray drop never spends a fish:
       unstable = 25% mutant, chimera = 10% and both may dissolve. The safe ladder
       (rank / evolve) merges straight away as before. */
    if(kind==='unstable' || kind==='chimera'){
      d.held=false; best.held=false;
      G.confirmMerge={ a:d, b:best, kind:kind };
      return;
    }
    if(!tryMerge(d,best)) toast('THEY MUST BE THE SAME KIND, BOTH ADULT');
  }
}

  G.owned={tint_none:true,frame_none:true,orn_none:true,skin_none:true}; G.cosmetic={tint:'tint_none',frame:'frame_none',ornament:'orn_none',skin:'skin_none'};
  G.stats={merges:0,mutants:0,chimeras:0,released:0,fed:0};

  G.fish=[]; G.decor=[]; G.quests=[]; G.pellets=[]; G.parts=[]; G.bubbles=[];
  G.biome='pond'; G.biomesOwned={pond:true};
  G.event=null; G.timeScale=1; G.spawnTimer=0; G.codexSel=null; G.speed=1;
  G.sess=null; G.away=null;
  firstFish(); fillQuests(); recalcEnv(); recalcOxygen();
  AU.bpm=biomeDef('pond').bpm; SC=biomeDef('pond').scale;
  bakeScene(); save();
}
function firstFish(){
  for(var i=0;i<BASE_IDS.length;i++){
    for(var k=0;k<3;k++){
      var f=makeFish(BASE_IDS[i],0,110+i*210+k*36,120+gameRnd()*260);
      f.age = k<2 ? 1 : 0.4;   // two adults of each kind: a merge is possible immediately
      G.fish.push(f);
    }
    discover(BASE_IDS[i]);
  }
  G.pearls=60;
  recalcOxygen();
}
var lastT=0;
function frame(ts){
  try{
    if(!lastT) lastT=ts;
    var dt=Math.min(0.05,(ts-lastT)/1000); lastT=ts;
    var steps = (G.scene==='tank'? G.speed:1);
    var sdt=dt*G.timeScale;
    for(var i=0;i<steps;i++) update(sdt);
    render();
  }catch(err){
    if(typeof console!=='undefined') console.error('loop error',err);
  }
  requestAnimationFrame(frame);
}
function boot(){
  bakeAll();
  var had=load();
  if(!had || !G.fish.length){ newGame(); }
  fillQuests(); recalcEnv(); recalcOxygen(); checkAchs();
  if(had && G._savedAt) G.away = runAway((Date.now()-G._savedAt)/1000);
  if(G.cosmetic.skin && G.cosmetic.skin!=='skin_none') bakeGlass();
  sessionStart();
  AU.bpm=biome().bpm; SC=biome().scale;
  if(G.biome!=='pond') bakeScene();
  if(LB_URL) lbFetch();
  resize();
  window.addEventListener('resize',resize);
  window.addEventListener('orientationchange',function(){ setTimeout(resize,60); setTimeout(resize,300); });
  if(window.visualViewport){ window.visualViewport.addEventListener('resize',resize); }
  /* iPad reports the real size a beat late when the app first opens or returns */
  document.addEventListener('visibilitychange',function(){ if(!document.hidden) setTimeout(resize,60); });
  setTimeout(resize,100); setTimeout(resize,500);
  cv.addEventListener('pointerdown',onDown);
  cv.addEventListener('pointermove',onMove);
  cv.addEventListener('pointerleave',function(){ G.ptrIn=false; });
  cv.addEventListener('pointercancel',function(){ G.ptrIn=false; });
  cv.addEventListener('pointerup',onUp);
  cv.addEventListener('pointercancel',onUp);
  cv.addEventListener('pointerleave',onUp);
  document.addEventListener('visibilitychange',function(){
    save();
    /* iOS suspends the context when the app goes to the background;
       without this the sound comes back dead after switching apps */
    if(!document.hidden) armAudio();
  });
  /* every kind of first gesture arms the sound */
  var arm=function(){ armAudio(); };
  document.addEventListener('pointerdown',arm,true);
  document.addEventListener('touchstart',arm,true);
  document.addEventListener('mousedown',arm,true);
  document.addEventListener('click',arm,true);
  document.addEventListener('keydown',arm,true);
  if(!G.name) askName();
  requestAnimationFrame(frame);
}
function askName(){
  if(typeof document==='undefined') return;
  var ov=document.getElementById('nameOv'); if(!ov) return;
  var inp=document.getElementById('nameIn'), ok=document.getElementById('nameOk');
  inp.value = G.name && G.name!=='GARDENER' ? G.name : '';
  ov.style.display='flex';
  ok.textContent = G.name ? 'OK' : 'START';
  ok.onclick=function(){
    var v=(inp.value||'GARDENER').trim().slice(0,14);
    G.name=v||'GARDENER'; ov.style.display='none'; save();
  };
}

/* ---------- PWA ----------
   The service worker is skipped inside sandboxes (itch.io) and on localhost:
   there it only fights the host. index.html is network-first inside sw.js,
   otherwise an update never reaches a phone that already has the app. */
try{
  var host = (window.location && window.location.hostname) || '';
  var proto = (window.location && window.location.protocol) || '';
  /* A service worker must not run inside a sandbox. itch.io does NOT serve from
     itch.io - it serves from a CDN like v6p9d9t4.ssl.hwcdn.net, inside an iframe.
     Checking the hostname alone would have missed it, so the iframe test is the
     one that actually does the work. */
  var framed = false;
  try{ framed = (window.self !== window.top); }catch(err){ framed = true; }
  var USE_SW = proto==='https:' && !framed &&
               !/itch|hwcdn|itch\.zone|localhost|127\.0\.0\.1/.test(host);
  if(USE_SW && typeof navigator!=='undefined' && navigator.serviceWorker){
    window.addEventListener('load',function(){
      navigator.serviceWorker.register('./sw.js').catch(function(){});
    });
  }
}catch(e){}
})();
